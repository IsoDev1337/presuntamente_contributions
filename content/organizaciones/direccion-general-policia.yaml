descripcion_corta: |
  Organismo público del Ministerio del Interior del Reino de España
  encargado de la dirección, coordinación y ejecución de las funciones
  encomendadas al Cuerpo Nacional de Policía, instituto armado de
  naturaleza civil dependiente del Gobierno de la Nación. En el
  organigrama del periodo 2012-2016 figuraba la Dirección Adjunta
  Operativa (DAO) como segunda autoridad ejecutiva del cuerpo.
