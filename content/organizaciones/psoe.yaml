descripcion_corta: |
  Partido político español de orientación socialdemócrata, fundado en
  1879 y refundado en su forma actual en 1976. Una de las dos
  formaciones con mayor representación parlamentaria de la democracia
  española, ha ocupado el gobierno del Reino de España en varias
  etapas (1982-1996 bajo Felipe González, 2004-2011 bajo José Luis
  Rodríguez Zapatero, y desde 2018 bajo Pedro Sánchez). En el contexto
  del procedimiento penal seguido ante el Juzgado de Instrucción nº 19
  de Madrid contra Alberto González Amador, ejerce la acusación
  popular, solicitando 5 años de prisión y multa por presuntos
  delitos contra la Hacienda Pública en concurso medial con falsedad
  en documento mercantil, delito contable continuado y pertenencia a
  grupo criminal.
