descripcion_corta: |
  Juzgado Central de Instrucción nº 6 de la Audiencia Nacional. Tramita
  diligencias previas en materia penal con ámbito nacional. Es el
  órgano instructor de las Diligencias Previas 96/2017 conocidas como
  Caso Tándem (caso Villarejo) y de sus piezas separadas, entre las
  que figura la pieza séptima conocida mediáticamente como Operación
  Kitchen. Desde 2016 está titular el magistrado Manuel García-Castellón
  García-Lomas.
