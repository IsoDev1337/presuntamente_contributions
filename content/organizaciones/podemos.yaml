descripcion_corta: |
  Formación política española de izquierdas constituida formalmente
  como partido en 2014. Ha integrado coaliciones electorales bajo
  denominaciones diversas (Unidos Podemos, Unidas Podemos, Sumar) y
  ha participado en el Gobierno de coalición presidido por Pedro
  Sánchez entre 2020 y 2023. En la pieza separada nº 7 de las
  Diligencias Previas 96/2017 del Juzgado Central de Instrucción nº 6
  de la Audiencia Nacional, conocida mediáticamente como Operación
  Kitchen, ejerce la acusación popular.
