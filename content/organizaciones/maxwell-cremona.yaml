descripcion_corta: |
  Mercantil española de ingeniería y procesos medioambientales cuyo
  administrador único es Alberto González Amador. Figura como persona
  jurídica investigada en el procedimiento penal seguido ante el
  Juzgado de Instrucción nº 19 de Madrid por presuntos delitos contra
  la Hacienda Pública en concurso medial con falsedad en documento
  mercantil, en relación con los ejercicios 2020 y 2021 de su Impuesto
  sobre Sociedades. La cuantía cuantificada del perjuicio a la Hacienda
  Pública por su tributación irregular es de 350.951 euros, conforme al
  informe de la AEAT que sostiene la denuncia inicial.
