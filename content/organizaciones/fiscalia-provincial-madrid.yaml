descripcion_corta: |
  Fiscalía con jurisdicción provincial en Madrid. Interviene en los
  procedimientos penales seguidos ante los juzgados de instrucción del
  partido judicial de Madrid. En el caso Begoña Gómez ha sostenido desde
  la apertura de las diligencias previas, y de forma reiterada en
  sucesivos recursos, que no aprecia indicios de delito y ha solicitado
  el archivo de la causa.
