descripcion_corta: |
  Universidad pública con sede en Madrid. Fundada en 1499 (Alcalá) y
  trasladada a Madrid en 1836. En el procedimiento del caso Begoña Gómez
  es la institución titular de la Cátedra Extraordinaria de
  Transformación Social Competitiva que codirige la investigada y
  aparece personada como perjudicada en octubre de 2025.
