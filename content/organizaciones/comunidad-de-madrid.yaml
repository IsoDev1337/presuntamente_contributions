descripcion_corta: |
  Administración autonómica española correspondiente a la Comunidad
  de Madrid, con sede en la capital del Reino. Titular indirecta de
  la empresa pública Canal de Isabel II. En el procedimiento penal
  Lezo seguido ante el Juzgado Central de Instrucción nº 6 de la
  Audiencia Nacional figura personada como acusación particular por
  los presuntos perjuicios patrimoniales derivados de las
  adjudicaciones controvertidas durante los gobiernos del Partido
  Popular bajo los mandatos de Esperanza Aguirre, Ignacio González
  y Cristina Cifuentes.
