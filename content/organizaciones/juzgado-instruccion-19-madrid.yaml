tipo: juzgado
descripcion_corta: |
  Juzgado unipersonal de instrucción del partido judicial de Madrid con
  sede en el complejo de Plaza de Castilla. Instruye el procedimiento
  por presunto fraude fiscal y falsedad documental contra Alberto
  González Amador y otros cuatro procesados. Inicialmente bajo la
  titularidad de la magistrada Inmaculada Iglesias, jubilada en agosto
  de 2025, y desde octubre de 2025 bajo la titularidad del magistrado
  Antonio Viejo por designación de la Comisión Permanente del CGPJ.
