descripcion_corta: |
  Tribunal con sede en Madrid que conoce, entre otras materias, los
  recursos de apelación frente a resoluciones de los Juzgados de
  Instrucción del partido judicial de Madrid. En el procedimiento del
  caso Begoña Gómez resuelve los recursos contra las resoluciones del
  Juzgado de Instrucción nº 41 de Madrid.
