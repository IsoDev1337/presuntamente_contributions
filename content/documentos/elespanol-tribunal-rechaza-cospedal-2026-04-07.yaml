titulo: "El Español — El tribunal de 'Kitchen' desoye al PSOE: no suspende el juicio y rechaza que Cospedal vuelva a ser investigada (7 abr 2026)"
tipo: articulo_prensa
nivel_fuente: 4
nivel_fuente_justificacion: |
  Cobertura periodística de El Español sobre el auto de la magistrada
  Teresa Palacios, presidenta de la Sección Cuarta de la Sala de lo
  Penal de la Audiencia Nacional, dictado el 7 de abril de 2026, que
  rechaza la petición del Partido Socialista Obrero Español de
  suspender el juicio oral del caso Kitchen y reabrir la investigación
  contra María Dolores de Cospedal García. Cumple V-13 al cruzarse en
  línea editorial distinta con la cobertura de Estrella Digital sobre
  el mismo auto.
