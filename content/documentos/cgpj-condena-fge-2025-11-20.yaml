id: cgpj-condena-fge-2025-11-20
titulo: "Nota CGPJ — El Tribunal Supremo condena a Álvaro García Ortiz por un delito de revelación de secretos a pena de multa y dos años de inhabilitación para el cargo de Fiscal General del Estado (20 nov 2025)"
tipo: nota_prensa_institucional
nivel_fuente: 1
nivel_fuente_justificacion: |
  Nota oficial del CGPJ publicada en `poderjudicial.es` anunciando
  la lectura del fallo condenatorio de la Sala Segunda del Tribunal
  Supremo contra Álvaro García Ortiz, dictado "por mayoría de sus
  miembros", con dos votos particulares disidentes presentados por
  las magistradas Ana María Ferrer García y Susana Polo García. La
  nota recoge el contenido del fallo: condena por delito de
  revelación de datos reservados del art. 417.1 CP a multa de 12
  meses con cuota diaria de 20 euros, inhabilitación especial para
  el cargo de Fiscal General del Estado por 2 años, costas
  procesales incluyendo las de la acusación particular y diez mil
  euros de indemnización por daños morales al perjudicado. Dominio
  en la lista blanca DominiosOficiales. Cumple V-12.
