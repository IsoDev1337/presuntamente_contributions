id: eldiario-velasco-sustituido-castellon-2017-05-31
titulo: "elDiario.es — Velasco será sustituido por el juez que pedía Ignacio González en una grabación (31 may 2017)"
tipo: articulo_prensa
nivel_fuente: 4
nivel_fuente_justificacion: |
  Cobertura periodística del 31 de mayo de 2017 firmada por Pedro
  Águeda en elDiario.es que recoge el regreso de Manuel María
  García-Castellón García-Lomas al Juzgado Central de Instrucción nº 6
  de la Audiencia Nacional tras 16 años como magistrado de enlace en
  el extranjero, ocupando la plaza dejada por Eloy Velasco Núñez al
  ascender a la nueva Sala de Apelación. La pieza contextualiza el
  nombramiento en la conversación grabada de noviembre de 2016 entre
  el entonces presidente de la Comunidad de Madrid Ignacio González y
  Eduardo Zaplana, en la que el primero expresaba su deseo de apartar
  a Velasco del JCI nº 6 y de devolver a García-Castellón a la plaza.
  Nivel 4 por tratarse de cobertura periodística; respaldo de fuente
  cruzada con la nota CGPJ del 17 de mayo de 2017 que acredita la
  decisión administrativa institucional de la Comisión Permanente.
