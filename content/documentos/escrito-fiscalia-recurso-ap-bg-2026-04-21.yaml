id: escrito-fiscalia-recurso-ap-bg-2026-04-21
titulo: "Escrito de la Fiscalía Provincial de Madrid de 21 de abril de 2026 ante la Audiencia Provincial de Madrid (caso Begoña Gómez): recurso de apelación contra el auto de procesamiento del 13 de abril de 2026"
tipo: escrito_fiscalia
nivel_fuente: 2
nivel_fuente_justificacion: |
  Escrito procesal de la Fiscalía Provincial de Madrid presentado el
  21 de abril de 2026 ante la Audiencia Provincial de Madrid mediante
  el cual el Ministerio Fiscal recurre el auto del Juzgado de
  Instrucción nº 41 de Madrid del 13 de abril de 2026, solicitando el
  archivo de la causa respecto de todos los delitos y todos los
  procesados y, subsidiariamente, el sobreseimiento provisional. El
  nivel 2 se asigna por tipo y origen (escrito procesal del Ministerio
  Fiscal, documento oficial secundario o instructor conforme a [doc 01
  — "Enums catalogados"](docs/diseno/01-modelo-de-datos.md#3-enums-catalogados)),
  no por publicación oficial: el texto íntegro no se ha localizado en
  `fiscal.es` (la práctica habitual de la institución es publicar
  memorias anuales y disposiciones generales, no escritos procesales
  concretos). La existencia, fecha y contenido sustancial constan en
  la cobertura cruzada de Infobae, Moncloa.com, TheObjective y El
  Debate publicada el 22 de abril de 2026, lo que justifica
  `estado_acceso: acceso_restringido_pero_citable`.
productor_organizacion_id: fiscalia-provincial-madrid
