titulo: "The Objective: el juez Pedraz rechaza la personación en la causa de Leire Díez de García-Castellón (4 junio 2026)"
tipo: articulo_prensa
nivel_fuente: 4
nivel_fuente_justificacion: |
  Cobertura de The Objective (diario digital de línea editorial de derecha, redacción propia)
  sobre el auto del JCI nº 5 de la Audiencia Nacional (magistrado Santiago Pedraz) que rechaza
  la personación del magistrado jubilado Manuel García-Castellón en la causa del caso Leire Díez.
  Recoge que la decisión se adopta "por el momento" en tanto las diligencias del Juzgado de
  Instrucción nº 9 de Madrid no se acumulen a la causa de la Audiencia Nacional. Cruzado con
  Confilegal (jurídico independiente) y Público (izquierda) para V-13.
