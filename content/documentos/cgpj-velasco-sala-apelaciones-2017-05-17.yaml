titulo: "Nota CGPJ — Eloy Velasco y Enrique López obtienen las dos plazas de magistrado de la nueva Sala de Apelación de la Audiencia Nacional (17 may 2017)"
tipo: nota_prensa_institucional
nivel_fuente: 1
nivel_fuente_justificacion: |
  Nota oficial del Consejo General del Poder Judicial publicada en
  `poderjudicial.es` el 17 de mayo de 2017 anunciando que la Comisión
  Permanente del CGPJ acordó, por 6 votos a favor frente a 2, adjudicar
  las dos plazas de magistrado de la nueva Sala de Apelación de la
  Audiencia Nacional (de reciente creación) a Eloy Velasco Núñez y a
  Enrique López López. La nota precisa que la Sala comenzaría a operar
  el 1 de junio de 2017 y que la plaza del Juzgado Central de
  Instrucción nº 6, vacante por el ascenso de Velasco, se ofrecería al
  concurso de traslados nº 4/2017. Es el documento institucional que
  desencadena el cambio en la titularidad del JCI nº 6, asumido
  posteriormente por Manuel María García-Castellón García-Lomas tras
  resolverse el concurso de traslados. Dominio en la lista blanca
  DominiosOficiales. Cumple V-12.
