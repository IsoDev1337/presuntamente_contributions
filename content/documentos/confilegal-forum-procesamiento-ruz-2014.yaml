nivel_fuente_justificacion: |
  Cobertura del medio jurídico Confilegal (línea editorial distinta de
  Público.es) que recoge expresamente el auto de procesamiento del juez Pablo
  Ruz de octubre de 2014 contra 32 exresponsables de Fórum Filatélico por
  estafa continuada cualificada, falseamiento de cuentas anuales, insolvencia
  punible y blanqueo. Aporta la segunda línea editorial exigida por V-13 para
  el hecho del procesamiento. URL verificada el 2026-06-03.
