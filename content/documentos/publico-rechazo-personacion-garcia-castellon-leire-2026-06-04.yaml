id: publico-rechazo-personacion-garcia-castellon-leire-2026-06-04
titulo: "Público: el juez Pedraz rechaza la petición de García-Castellón para personarse en el caso Leire (4 junio 2026)"
tipo: articulo_prensa
nivel_fuente: 4
nivel_fuente_justificacion: |
  Cobertura de Público (línea editorial de izquierda, redacción propia) sobre el auto del JCI
  nº 5 de la Audiencia Nacional (magistrado Santiago Pedraz) que rechaza la petición del
  magistrado jubilado Manuel García-Castellón de personarse como acusación particular en la
  causa del caso Leire Díez. Recoge que García-Castellón alegaba ser perjudicado por la presunta
  red al sostener que Leire Díez habría buscado información sobre él y vertido afirmaciones
  falsas para perjudicarle, y que el magistrado vincula el rechazo a que esos hechos se investigan
  en el Juzgado de Instrucción nº 9 de Madrid y no están aún acumulados a la causa de la Audiencia
  Nacional. Cruzado con Confilegal (jurídico independiente) y The Objective (derecha) para V-13.
