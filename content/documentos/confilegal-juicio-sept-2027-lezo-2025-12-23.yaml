titulo: "Confilegal — La Audiencia Nacional fija para septiembre de 2027 el juicio contra Ignacio González por el caso Lezo (23 dic 2025)"
tipo: articulo_prensa
nivel_fuente: 4
nivel_fuente_justificacion: |
  Cobertura periodística jurídica del señalamiento por la Sección
  Segunda de la Sala de lo Penal de la Audiencia Nacional del
  juicio oral de la pieza del campo de golf del Canal de Isabel II
  del caso Lezo para los días 13 al 30 de septiembre de 2027.
  Detalla la composición de la acusación: Fiscalía Anticorrupción
  (6 años de prisión y multa de 550.000 euros para cada uno de los
  cinco procesados — Ignacio González, su hermano Pablo Manuel
  González, su cuñado Juan José Caballero, el socio José Antonio
  Clemente Marín y el ex director gerente del Canal Ildefonso de
  Miguel) y Comunidad de Madrid como acusación particular (16
  años para Ignacio González). Confilegal es publicación
  especializada en información jurídica. Verificado por cruce con
  cobertura de eldiario.es, El Plural, El Debate e Infobae. Nivel
  4 por tratarse de un medio de comunicación.
