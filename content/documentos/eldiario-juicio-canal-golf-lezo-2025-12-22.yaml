id: eldiario-juicio-canal-golf-lezo-2025-12-22
titulo: "eldiario.es — La Audiencia Nacional juzgará a Ignacio González por el campo de golf del Canal 23 años después (22 dic 2025)"
tipo: articulo_prensa
nivel_fuente: 4
nivel_fuente_justificacion: |
  Cobertura periodística de la providencia de la Sección Segunda de
  la Sala de lo Penal de la Audiencia Nacional, de la que es
  ponente el magistrado Fernando Andreu, que señala el juicio oral
  de la pieza del campo de golf del Canal de Isabel II del caso
  Lezo para los días 13 al 30 de septiembre de 2027. Recoge las
  peticiones de pena de la Fiscalía Anticorrupción (seis años de
  prisión y multa de 550.000 euros para cada uno de los cinco
  acusados) y de la Comunidad de Madrid como acusación particular
  (dieciséis años para Ignacio González). Detalla los hechos
  atribuidos: modificación sustancial en 2004 del proyecto
  adjudicado originalmente a ACS-Dragados para beneficiar a
  familiares del entonces vicepresidente madrileño mediante
  subcontrata con la sociedad familiar TCT, que habría obtenido
  más de tres millones de euros por el cambio del proyecto y
  504.780 euros adicionales por gestión y explotación,
  distribuidos en cuarenta y nueve entregas en sobres de
  efectivo. Cruzado con la cobertura de Confilegal del 23 de
  diciembre de 2025, El Plural del 24 de diciembre de 2025, El
  Debate del 25 de diciembre de 2025 e Infobae del 23 de
  diciembre de 2025. Nivel 4 por tratarse de un medio de
  comunicación.
