id: eldiario-informe-asuntos-internos-kitchen-2020-07
titulo: "elDiario.es — Asuntos Internos remite a la Audiencia Nacional un informe que apunta a la cúpula de Interior por la Operación Kitchen (jul 2020)"
tipo: articulo_prensa
nivel_fuente: 4
nivel_fuente_justificacion: |
  Cobertura periodística de elDiario.es sobre el informe elaborado por
  la Unidad de Asuntos Internos de la Dirección General de la Policía
  remitido al Juzgado Central de Instrucción nº 6 de la Audiencia
  Nacional en torno al verano de 2020 dentro de la pieza separada nº
  7 de las Diligencias Previas 96/2017 (Operación Kitchen). El
  documento policial primario no se ha localizado publicado íntegramente
  con URL canónica en lista blanca DominiosOficiales, por lo que se
  modela como N4 con cobertura cruzada. Cumple V-13 al cruzarse con
  la cobertura de Infobae sobre el mismo informe.
