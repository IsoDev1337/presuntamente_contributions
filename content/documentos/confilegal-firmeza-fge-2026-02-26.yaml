titulo: "Confilegal — El Supremo ratifica la condena a García Ortiz por revelación de secretos al desestimar los incidentes de nulidad (26 feb 2026)"
tipo: articulo_prensa
nivel_fuente: 4
nivel_fuente_justificacion: |
  Cobertura periodística de la desestimación, por Acuerdo de la Sala
  Segunda del Tribunal Supremo del 26 de febrero de 2026, de los
  incidentes de nulidad de actuaciones planteados contra la
  Sentencia 1000/2025 por la defensa de Álvaro García Ortiz y por
  el Ministerio Fiscal. Tras esta desestimación la sentencia
  condenatoria adquiere firmeza en la jurisdicción ordinaria,
  quedando expedita la vía del recurso de amparo ante el Tribunal
  Constitucional. Verificado por cruce con cobertura de Infobae,
  Moncloa.com y Mundiario coincidentes en fecha y contenido. Nivel
  4 por tratarse de un medio de comunicación.
