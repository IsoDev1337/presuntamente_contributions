titulo: "El Español — Escassi, Rosauro Varo, Joaquín Goyache: quién es quién en la lista de más de 30 testigos que pide Begoña Gómez en su juicio (18 mayo 2026)"
tipo: articulo_prensa
nivel_fuente: 4
nivel_fuente_justificacion: |
  Cobertura periodística que detalla la lista de más de treinta
  testigos propuestos por la defensa de Begoña Gómez en su escrito
  de conclusiones provisionales del 18 de mayo de 2026. El artículo
  identifica nombres y roles de testigos clave, incluyendo al rector
  de la Universidad Complutense de Madrid Joaquín Goyache, al
  director de relaciones institucionales de Google España Miguel
  Escassi, al empresario Rosauro Varo y a directivos de Reale
  Seguros, Fundación La Caixa, Indra y Telefónica. Nivel 4 por
  tratarse de un medio de comunicación; se cruza con cobertura
  coetánea de Infobae y otros medios, cumpliendo V-13.
