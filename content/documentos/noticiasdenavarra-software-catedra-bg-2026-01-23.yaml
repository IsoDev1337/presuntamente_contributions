  Cobertura periodística que recoge los datos oficiales publicados por
  la Universidad Complutense de Madrid sobre el coste de desarrollo del
  software de la Cátedra de Transformación Social Competitiva. El dato
  procede de la propia UCM (113.509,32 € de gasto total). Nivel 4 por
  tratarse de cobertura periodística; respaldo cruzado por Artículo 14
  en línea editorial distinta y por la propia UCM como fuente
  institucional citada en el medio.
