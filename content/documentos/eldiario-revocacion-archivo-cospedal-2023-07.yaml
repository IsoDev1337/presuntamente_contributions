id: eldiario-revocacion-archivo-cospedal-2023-07
titulo: "elDiario.es — La Sala de Apelaciones de la Audiencia Nacional revoca el archivo y ordena reincorporar la causa contra Cospedal y López del Hierro en la pieza Kitchen (jul 2023)"
tipo: articulo_prensa
nivel_fuente: 4
nivel_fuente_justificacion: |
  Cobertura periodística de elDiario.es sobre el auto de la Sala de
  Apelaciones de la Audiencia Nacional, dictado en julio de 2023, por
  el que se estima el recurso interpuesto por la Fiscalía Anticorrupción
  y las acusaciones populares contra el sobreseimiento confirmado en
  diciembre de 2022 por el Juzgado Central de Instrucción nº 6 y se
  acuerda la reincorporación de la causa contra María Dolores de
  Cospedal García y de Ignacio López del Hierro en la pieza separada
  nº 7 de las Diligencias Previas 96/2017 (Operación Kitchen). El
  auto íntegro no se localiza públicamente publicado con URL canónica
  en lista blanca DominiosOficiales, por lo que se modela como N4 con
  cobertura cruzada. Cumple V-13 al cruzarse con la cobertura de El
  País sobre el mismo auto.
