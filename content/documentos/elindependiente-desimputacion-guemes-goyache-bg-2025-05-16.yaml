id: elindependiente-desimputacion-guemes-goyache-bg-2025-05-16
titulo: "El Independiente — Varapalo de la Audiencia de Madrid al juez Peinado: desimputa al rector de la Complutense y a Güemes (16 mayo 2025)"
tipo: articulo_prensa
nivel_fuente: 4
nivel_fuente_justificacion: |
  Cobertura periodística directa del auto de la Audiencia Provincial
  de Madrid, fechado el 13 de mayo de 2025 y conocido públicamente el
  16 de mayo, por el que se estiman parcialmente los recursos de los
  defensas en el caso Begoña Gómez y se revoca la condición de
  investigado del rector de la UCM Joaquín Goyache y del directivo
  del IE Juan José Güemes. La cobertura incluye cita literal de la
  motivación del tribunal respecto del exconsejero ("sin que
  existan indicios de que su contratación estuviera relacionada
  con su condición de esposa del presidente") y de la exclusión de
  los hechos relativos a esa contratación por exceder del objeto
  de la instrucción. Nivel 4 por tratarse de un medio de
  comunicación. Se cruza con cobertura coetánea de Moncloa.com y
  con la cobertura retrospectiva de Moncloa.com de octubre de 2025
  en línea editorial distinta, cumpliendo V-13.
