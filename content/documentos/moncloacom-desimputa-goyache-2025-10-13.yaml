id: moncloacom-desimputa-goyache-2025-10-13
titulo: "Moncloa.com — El largo viaje de la UCM en el caso Begoña Gómez: de imputados a perjudicados (13 octubre 2025)"
tipo: articulo_prensa
nivel_fuente: 4
nivel_fuente_justificacion: |
  Cobertura periodística que recapitula la trayectoria procesal de la
  UCM en el caso Begoña Gómez, incluida la revocación por la Audiencia
  Provincial de Madrid (16 de mayo de 2025) de la condición de
  investigado del rector Joaquín Goyache y la posterior personación de
  la UCM como perjudicada el 6 de octubre de 2025. Nivel 4 por tratarse
  de un medio de comunicación; se incluye como respaldo cruzado del
  hito de desimputación y del rol UCM-perjudicada.
