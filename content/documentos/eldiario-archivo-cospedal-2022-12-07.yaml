titulo: "elDiario.es — García Castellón confirma el archivo definitivo respecto de Cospedal y López del Hierro en la pieza Kitchen (dic 2022)"
tipo: articulo_prensa
nivel_fuente: 4
nivel_fuente_justificacion: |
  Cobertura periodística de elDiario.es sobre el auto del Juzgado
  Central de Instrucción nº 6 de la Audiencia Nacional del 7 de
  diciembre de 2022 por el que se confirma el sobreseimiento
  provisional acordado en julio de 2021 respecto de María Dolores de
  Cospedal García y de Ignacio López del Hierro en la pieza separada
  nº 7 de las Diligencias Previas 96/2017 (Operación Kitchen) y se
  desestiman los recursos planteados por las acusaciones. El auto
  íntegro no se localiza públicamente publicado con URL canónica en
  lista blanca DominiosOficiales, por lo que se modela como N4 con
  cobertura cruzada. Cumple V-13 al cruzarse con la cobertura de
  Infobae sobre el mismo auto.
