id: confilegal-rechazo-personacion-garcia-castellon-leire-2026-06-04
titulo: "Confilegal: Pedraz rechaza por ahora la personación del juez jubilado García-Castellón en la causa de Leire Díez (4 junio 2026)"
tipo: articulo_prensa
nivel_fuente: 4
nivel_fuente_justificacion: |
  Cobertura de Confilegal (diario jurídico independiente, redacción propia) sobre el auto del
  JCI nº 5 de la Audiencia Nacional (magistrado Santiago Pedraz) que rechaza "por el momento"
  la personación del magistrado jubilado Manuel García-Castellón como acusación particular en
  la causa del caso Leire Díez. Recoge la cita literal del razonamiento del magistrado: "los
  hechos alegados por García-Castellón están siendo investigados actualmente en unas diligencias
  tramitadas por el Juzgado de Instrucción número 9 de Madrid, cuyo titular es el juez Arturo
  Zamarriego, pero todavía no forman parte de las actuaciones acumuladas". Cruzado con Público
  (izquierda) y The Objective (derecha) para V-13.
