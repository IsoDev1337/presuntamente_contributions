titulo: "The Objective — García Ortiz pide al TC que anule la condena por revelación de secretos del novio de Ayuso (13 abr 2026)"
tipo: articulo_prensa
nivel_fuente: 4
nivel_fuente_justificacion: |
  Cobertura periodística de la presentación, el 13 de abril de 2026,
  del recurso de amparo de la defensa del condenado Álvaro García
  Ortiz ante el Tribunal Constitucional, alegando vulneración del
  derecho a la presunción de inocencia y del derecho a un proceso con
  todas las garantías. Cobertura cruzada V-13 con El Independiente
  (recurso paralelo de la Fiscalía del 10-abr-2026) y Moncloa.com.
  Nivel 4 por tratarse de un medio de comunicación.
