titulo: "Infobae — Begoña Gómez pide su absolución de cara al futuro juicio porque no hay 'delito alguno' (18 mayo 2026)"
tipo: articulo_prensa
nivel_fuente: 4
nivel_fuente_justificacion: |
  Cobertura periodística del escrito de conclusiones provisionales
  presentado por la defensa de Begoña Gómez ante el Juzgado de
  Instrucción nº 41 de Madrid el 18 de mayo de 2026. La cobertura
  recoge la petición de libre absolución de la investigada respecto
  de los cuatro delitos por los que fue procesada y la solicitud
  accesoria de imposición de costas a las acusaciones por presunta
  "temeridad y mala fe". Nivel 4 por tratarse de un medio de
  comunicación; se cruza con cobertura coetánea de El Español y
  TheObjective en línea editorial distinta, cumpliendo V-13.
