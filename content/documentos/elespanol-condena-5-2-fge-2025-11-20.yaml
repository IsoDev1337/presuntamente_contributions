nivel_fuente_justificacion: |
  Cobertura periodística de la lectura del fallo condenatorio del 20
  de noviembre de 2025 con detalle del resultado de la votación de
  la Sala Segunda (cinco votos condenatorios frente a dos
  absolutorios) y desglose de la composición del tribunal. Verificada
  por cruce con la nota oficial del CGPJ del mismo día (que cita
  "mayoría de los miembros" pero no el desglose numérico) y con
  cobertura de Infobae, Moncloa.com, Confilegal y otros medios
  coincidentes en el resultado 5-2. Nivel 4 por tratarse de un medio
  de comunicación.
