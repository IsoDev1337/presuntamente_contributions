titulo: "Público: el juez Pedraz levanta parcialmente el secreto del sumario del caso Leire Díez y mantiene una pieza bajo reserva un mes más (1 junio 2026)"
tipo: articulo_prensa
nivel_fuente: 4
nivel_fuente_justificacion: |
  Cobertura de Público (línea editorial de izquierda) sobre el auto del JCI nº 5 AN del
  1 de junio de 2026 que levanta parcialmente el secreto de las actuaciones del caso Leire
  Díez. Recoge que el magistrado mantiene bajo reserva un mes más la pieza relativa a
  presuntas irregularidades en contratos públicos, en la que figuran como investigados Leire
  Díez, el expresidente de la SEPI Vicente Fernández y el empresario Antxon Alonso. Cruzado
  con The Objective (derecha) e Infobae (independiente) para V-13.
