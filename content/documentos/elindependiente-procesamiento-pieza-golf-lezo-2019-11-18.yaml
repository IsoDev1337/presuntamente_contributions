titulo: "El Independiente — El juez procesa a Ignacio González por fraude y malversación en el caso Lezo (18 nov 2019)"
tipo: articulo_prensa
nivel_fuente: 4
nivel_fuente_justificacion: |
  Cobertura periodística del auto del titular del Juzgado Central de
  Instrucción nº 6 de la Audiencia Nacional Manuel García-Castellón
  García-Lomas, fechado el 18 de noviembre de 2019, por el que se
  propuso el procesamiento del ex presidente de la Comunidad de
  Madrid Ignacio González González y de otros seis investigados
  por presuntos delitos relacionados con la compra en 2013 por el
  Canal de Isabel II de la sociedad brasileña Emissao por unos
  treinta millones de dólares (pieza Emissao). El auto archiva la
  causa frente a catorce investigados más. Cruzado con la
  cobertura coetánea de Público, El Economista y eldiario.es.
  Nivel 4 por tratarse de un medio de comunicación.
