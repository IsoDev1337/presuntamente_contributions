titulo: "TheObjective — La Fiscalía recurre la imputación del directivo del IE Juan José Güemes en el 'caso Gómez' (3 diciembre 2024)"
tipo: articulo_prensa
nivel_fuente: 4
nivel_fuente_justificacion: |
  Cobertura periodística del recurso presentado por la Fiscalía
  Provincial de Madrid el 3 de diciembre de 2024 contra el auto del
  Juzgado de Instrucción nº 41 de Madrid por el que se imputa a
  Juan José Güemes en el caso Begoña Gómez. El recurso de la
  Fiscalía sostiene que no se ha especificado el delito concreto
  atribuido al investigado ni se ha motivado mínimamente su
  presunta participación. Nivel 4 por tratarse de un medio de
  comunicación; se cruza con cobertura coetánea de Infobae y El
  Independiente en línea editorial distinta, cumpliendo V-13.
