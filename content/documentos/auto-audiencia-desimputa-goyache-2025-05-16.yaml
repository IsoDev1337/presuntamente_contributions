id: auto-audiencia-desimputa-goyache-2025-05-16
titulo: "Auto de la Audiencia Provincial de Madrid de 13 de mayo de 2025 (caso Begoña Gómez): revocación de la condición de investigado del rector de la UCM Joaquín Goyache y del directivo del IE Juan José Güemes"
tipo: auto_judicial
nivel_fuente: 4
nivel_fuente_justificacion: |
  Resolución de la Sección competente de la Audiencia Provincial de
  Madrid, de 24 páginas, fechada el 13 de mayo de 2025 y conocida
  públicamente el 16 de mayo, por la que se estiman los recursos de
  apelación contra las imputaciones del rector de la UCM Joaquín
  Goyache y del presidente del Centro Internacional de Gestión
  Emprendedora del IE Business School Juan José Güemes, acordadas
  por el Juzgado de Instrucción nº 41 de Madrid, al no apreciar
  indicios racionales de criminalidad. La misma resolución excluye
  del procedimiento los hechos relativos a la contratación de Begoña
  Gómez por el IE en 2018 como directora del Africa Center. La
  existencia, fecha, autor y contenido sustancial del auto están
  documentados de forma cruzada por al menos tres líneas editoriales
  distintas (Moncloa.com, El Independiente, El Español). No se ha
  localizado todavía nota institucional con URL canónica en
  poderjudicial.es ni publicación íntegra en CENDOJ. Nivel 4 por
  ausencia de documento oficial localizable; el hito derivado
  cumple V-13.
