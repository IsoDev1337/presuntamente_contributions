id: auto-audiencia-desimputa-goyache-2025-05-16
titulo: "Auto de la Audiencia Provincial de Madrid de 16 de mayo de 2025 (caso Begoña Gómez): revocación de la condición de investigado del rector de la UCM Joaquín Goyache"
tipo: auto_judicial
nivel_fuente: 4
nivel_fuente_justificacion: |
  Resolución de la Sección competente de la Audiencia Provincial de
  Madrid por la que se estima el recurso de apelación contra la
  imputación del rector de la UCM Joaquín Goyache acordada por el
  Juzgado de Instrucción nº 41 de Madrid, al no apreciar indicios
  racionales de criminalidad. La existencia, fecha, autor y contenido
  sustancial del auto están documentados de forma cruzada por cobertura
  multimedio (Infobae, Moncloa.com, El Español). No se ha localizado
  todavía nota institucional con URL canónica en poderjudicial.es ni
  publicación íntegra en CENDOJ. Nivel 4 por ausencia de documento
  oficial localizable; el hito derivado cumple V-13.
