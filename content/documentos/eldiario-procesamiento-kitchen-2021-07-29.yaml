id: eldiario-procesamiento-kitchen-2021-07-29
titulo: "elDiario.es — El juez García Castellón procesa a Fernández Díaz, Francisco Martínez, Eugenio Pino y Villarejo y archiva la causa contra Cospedal en la pieza Kitchen (jul 2021)"
tipo: articulo_prensa
nivel_fuente: 4
nivel_fuente_justificacion: |
  Cobertura periodística de elDiario.es sobre el auto del magistrado
  instructor del Juzgado Central de Instrucción nº 6 de la Audiencia
  Nacional, dictado el 29 de julio de 2021, por el que se transforma
  el procedimiento a abreviado en la pieza separada nº 7 de las
  Diligencias Previas 96/2017 (Operación Kitchen). En la misma
  resolución se acuerda el procesamiento de Jorge Fernández Díaz,
  Francisco Martínez Vázquez, Eugenio Pino Sánchez, José Manuel
  Villarejo Pérez y otros agentes del Cuerpo Nacional de Policía y
  simultáneamente el sobreseimiento provisional respecto de María
  Dolores de Cospedal García y de Ignacio López del Hierro. El auto
  íntegro no se localiza públicamente publicado con URL canónica en
  lista blanca DominiosOficiales, por lo que se modela como N4 con
  cobertura cruzada. Cumple V-13 al cruzarse con la cobertura de
  Infobae sobre el mismo auto.
