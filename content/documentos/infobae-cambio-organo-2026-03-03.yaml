nivel_fuente_justificacion: |
  Cobertura periodística del cambio de órgano judicial. Nivel 4 porque
  no se ha localizado nota oficial del CGPJ ni auto de inhibición/asunción
  con URL canónica en poderjudicial.es o CENDOJ. La nota CGPJ posterior
  del 19 de mayo de 2026 confirma narrativa mente que la asunción
  ocurrió en marzo tras inhibición del JI nº 15 de Madrid, lo que da
  verificación cruzada institucional al hito, pero no como documento
  primario propio.
