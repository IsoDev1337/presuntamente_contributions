id: eldiario-imputacion-fernandez-diaz-2019-04-02
titulo: "elDiario.es — El juez García Castellón imputa al ex ministro Jorge Fernández Díaz en la pieza Kitchen (abr 2019)"
tipo: articulo_prensa
nivel_fuente: 4
nivel_fuente_justificacion: |
  Cobertura periodística de elDiario.es sobre el auto del magistrado
  Manuel García-Castellón, titular del Juzgado Central de Instrucción
  nº 6 de la Audiencia Nacional, dictado el 2 de abril de 2019 por el
  que se acuerda la imputación del ex ministro del Interior del Reino
  de España Jorge Fernández Díaz como investigado en la pieza
  separada nº 7 de las Diligencias Previas 96/2017 (Operación
  Kitchen). Cumple V-13 al cruzarse con la cobertura de Infobae sobre
  el mismo hito.
