titulo: "elDiario.es — García Castellón cita como investigada a la ex ministra de Defensa Dolores de Cospedal en la pieza Kitchen (sept 2019)"
tipo: articulo_prensa
nivel_fuente: 4
nivel_fuente_justificacion: |
  Cobertura periodística de elDiario.es sobre la decisión del
  magistrado instructor del Juzgado Central de Instrucción nº 6 de la
  Audiencia Nacional, dictada en septiembre de 2019, por la que se
  acuerda la imputación de María Dolores de Cospedal García como
  investigada en la pieza separada nº 7 de las Diligencias Previas
  96/2017 del Caso Tándem. Cumple V-13 al cruzarse con la cobertura
  de laSexta sobre el mismo hito.
