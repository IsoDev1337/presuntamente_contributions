id: cgpj-cp-08jun2017-velasco-interino-jci6
titulo: "Acuerdo 2-3-1 de la Comisión Permanente del CGPJ del 8 de junio de 2017 — adscripción obligatoria en comisión de servicio sin relevación de funciones del magistrado Eloy Velasco Núñez para cubrir la vacante del Juzgado Central de Instrucción nº 6 hasta la incorporación efectiva de Manuel María García-Castellón García-Lomas"
tipo: otro
nivel_fuente: 1
nivel_fuente_justificacion: |
  Tipo `otro` por ausencia de valor enum específico para "acuerdo de
  órgano colegiado del CGPJ" (ver doc hermano
  `cgpj-cp-22jun2017-reingreso-castellon-jci6` para misma decisión).
  Documento sustantivo: acuerdo formal de la Comisión Permanente del
  Consejo General del
  Poder Judicial adoptado en la sesión celebrada el 8 de junio de 2017
  (acuerdo 2-3-1 del boletín de la sesión, página 18), por el que «de
  conformidad con lo dispuesto en el artículo 216 bis 1 párrafo 2 de
  la Ley Orgánica del Poder Judicial» se acuerda «la adscripción
  obligatoria, en régimen de comisión de servicio, sin relevación de
  funciones, de Eloy Velasco Núñez, magistrado de la Sala de Apelación
  de la Audiencia Nacional, para cubrir la vacante del Juzgado Central
  de Instrucción n.º 6 de la Audiencia Nacional, hasta la
  incorporación efectiva del magistrado Manuel García-Castellón
  García-Lomas». La medida se fundamenta en el acuerdo de la Sala de
  Gobierno de la Audiencia Nacional del 29 de mayo de 2017 que propone
  al CGPJ la adscripción del magistrado cesado como conocedor de los
  asuntos en tramitación.

  Dominio oficial en lista blanca (`poderjudicial.es`). Copia íntegra
  descargada del endpoint estable del CGPJ (`/stfls/CGPJ/SECRETARÍA
  GENERAL/ACUERDOS DE LA COMISIÓN PERMANENTE/FICHERO/20170608
