id: infolibre-juicio-navalcarnero-lopez-madrid-lezo-2021-06-07
titulo: "infoLibre — El juez del caso Lezo envía a juicio a Ignacio González y a López Madrid por las obras del tren de Navalcarnero (7 jun 2021)"
tipo: articulo_prensa
nivel_fuente: 4
nivel_fuente_justificacion: |
  Cobertura periodística del auto de apertura del juicio oral
  dictado el 4 de junio de 2021 por el titular del Juzgado Central
  de Instrucción nº 6 de la Audiencia Nacional Manuel María
  García-Castellón García-Lomas en la pieza separada nº 3 del
  caso Lezo, relativa a la presunta adjudicación irregular en
  2007 por el Consorcio Regional de Transportes de Madrid de las
  obras del tren ligero Móstoles Central-Navalcarnero. El
  artículo identifica con precisión a los seis procesados
  (Ignacio González, Javier López Madrid, Adrián de la Joya,
  Rafael Martín de Nicolás, Felicísimo Ramos e Ildefonso de
  Miguel), las peticiones de pena de la Fiscalía Anticorrupción
  (seis años y medio de prisión para López Madrid, Martín de
  Nicolás y Ramos; cuatro años para Ignacio González; cuatro
  años para Ildefonso de Miguel; tres años y medio para De la
  Joya), los presuntos delitos atribuidos (tráfico de
  influencias, cohecho, falsedad en documento mercantil y fraude
  a las administraciones públicas) y la mecánica que el
  instructor atribuye al plan presuntamente concertado: una
  oferta económica artificialmente baja seguida de modificados
  contractuales y aproximadamente 1,8 millones de euros en
  comisiones ilícitas. Cruzado con cobertura coetánea de El
  Español, eldiario.es y Público. Nivel 4 por tratarse de medio
  de comunicación.
