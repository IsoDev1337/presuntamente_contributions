titulo: "Estrella Digital — La Fiscalía rechaza frenar el juicio de Kitchen para volver a investigar a Cospedal y al PP (7 abr 2026)"
tipo: articulo_prensa
nivel_fuente: 4
nivel_fuente_justificacion: |
  Cobertura periodística de Estrella Digital sobre el rechazo de la
  Fiscalía Especial contra la Corrupción y la Criminalidad Organizada
  a la petición del Partido Socialista Obrero Español de suspender la
  vista oral del caso Kitchen y reinvestigar a María Dolores de
  Cospedal García el 7 de abril de 2026 al inicio del juicio. Cumple
  V-13 al cruzarse con la cobertura de El Español sobre el mismo
  trámite procesal.
