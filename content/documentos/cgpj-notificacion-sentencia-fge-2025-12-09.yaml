titulo: "Nota CGPJ — El Tribunal Supremo notifica la Sentencia 1000/2025 que condena por revelación de datos reservados al Fiscal General del Estado (9 dic 2025)"
tipo: nota_prensa_institucional
nivel_fuente: 1
nivel_fuente_justificacion: |
  Nota oficial del CGPJ publicada en `poderjudicial.es` anunciando
  la notificación a las partes de la Sentencia 1000/2025 de la Sala
  Segunda del Tribunal Supremo, dictada por mayoría de cinco
  magistrados frente a dos. La nota resume los fundamentos:
  "el fiscal general no puede responder a una noticia falsa
  mediante la comisión de un delito" y "García Ortiz, o alguien de
  su entorno con su conocimiento, filtró el correo electrónico" del
  2 de febrero de 2024 del abogado del perjudicado. Dominio en la
  lista blanca DominiosOficiales. Cumple V-12.
