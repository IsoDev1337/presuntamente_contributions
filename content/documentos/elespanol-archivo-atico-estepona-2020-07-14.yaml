titulo: "El Español — El juez cierra el 'caso ático' al concluir después de 7 años que «no hay indicios» contra Ignacio González (14 jul 2020)"
tipo: articulo_prensa
nivel_fuente: 4
nivel_fuente_justificacion: |
  Cobertura periodística del auto del Juzgado de Primera
  Instancia e Instrucción nº 5 de Estepona (Málaga) fechado el
  14 de julio de 2020 por el que se acuerda el sobreseimiento
  provisional del procedimiento sobre la adquisición del ático
  de lujo en esa localidad atribuido al ex presidente de la
  Comunidad de Madrid Ignacio González González y a su esposa
  Lourdes Cavero. Tras siete años de instrucción, el juez
  concluye que «no se han obtenido indicios» sobre el origen
  del dinero utilizado por la sociedad estadounidense Coast
  Investors para la adquisición del inmueble ni sobre la
  procedencia de los fondos en relación con el empresario
  Enrique Cerezo Torres. Cruzado con cobertura de eldiario.es,
  Público y The Objective coincidente en fecha y contenido.
  Nivel 4 por tratarse de un medio de comunicación.
