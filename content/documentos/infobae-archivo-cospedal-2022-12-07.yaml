nivel_fuente_justificacion: |
  Cobertura periodística de Infobae sobre el auto del Juzgado Central
  de Instrucción nº 6 de la Audiencia Nacional del 7 de diciembre de
  2022 por el que se confirma el sobreseimiento provisional respecto
  de María Dolores de Cospedal García y de Ignacio López del Hierro
  en la pieza separada nº 7 de las Diligencias Previas 96/2017
  (Operación Kitchen). Cumple V-13 al cruzarse en línea editorial
  distinta con la cobertura de elDiario.es sobre el mismo auto.
