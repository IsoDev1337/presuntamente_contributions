id: cgpj-nota-requerimiento-psoe-leire-2026-05-27
titulo: "Nota de la Oficina de Comunicación del CGPJ: la Audiencia Nacional requiere documentación al PSOE en la investigación sobre una presunta estructura orientada a desestabilizar procedimientos judiciales (27 mayo 2026)"
tipo: nota_prensa_institucional
nivel_fuente: 1
nivel_fuente_justificacion: |
  Nota oficial de la Oficina de Comunicación del Poder Judicial (CGPJ) publicada en
  poderjudicial.es el 27 de mayo de 2026. Es fuente N1 (comunicación oficial del órgano)
  sobre el requerimiento de documentación dirigido por el JCI nº 5 de la Audiencia Nacional
  (magistrado Santiago Pedraz) a la sede federal del PSOE. La nota nombra a los investigados
  (Santos Cerdán, María Leire Díez Castro, Javier Pérez Dolset, Gaspar Zarrías, Ismael Oliver,
  Jacobo Teijelo Casanova y Juan Sánchez Yepes) y enumera los delitos investigados:
  organización criminal, cohecho, revelación de secretos, inducción al falso testimonio,
  acusación falsa, falsedad en documento mercantil, prevaricación, tráfico de influencias y
  delito contra las instituciones del Estado. No incluye número de procedimiento ni cifras
  económicas. Sustituye al auto filtrado (N3) como respaldo oficial del marco de la
  investigación y del listado de delitos.
