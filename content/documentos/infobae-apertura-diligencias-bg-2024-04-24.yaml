titulo: "Infobae — Un juzgado de Madrid abre diligencias contra Begoña Gómez por la presunta comisión de tráfico de influencias (24 abril 2024)"
tipo: articulo_prensa
nivel_fuente: 4
nivel_fuente_justificacion: |
  Cobertura periodística que reporta la apertura de diligencias previas
  por auto del Juzgado de Instrucción nº 41 de Madrid del 16 de abril
  de 2024. Nivel 4 por tratarse de un medio de comunicación. La
  información se cruza con la cobertura de Maldita.es (verificación) y
  con la nota institucional del TSJ de Madrid difundida ese mismo día,
  cumpliendo V-13 en el conjunto de documentos que respaldan el hito.
