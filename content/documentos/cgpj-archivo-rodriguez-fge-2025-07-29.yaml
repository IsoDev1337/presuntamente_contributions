titulo: "Nota CGPJ — La Sala de lo Penal desestima el recurso del Fiscal General contra el auto de procedimiento abreviado y archiva la causa respecto a la fiscal provincial de Madrid (29 jul 2025)"
tipo: nota_prensa_institucional
nivel_fuente: 1
nivel_fuente_justificacion: |
  Nota oficial del CGPJ publicada en `poderjudicial.es` anunciando
  que la Sala de Apelaciones del Tribunal Supremo desestima el
  recurso de apelación del entonces Fiscal General del Estado contra
  el auto de procedimiento abreviado y archiva la causa respecto a
  la entonces fiscal jefa provincial de Madrid, Pilar Rodríguez
  Fernández, por estimar insuficientes los indicios de su
  participación en la filtración. Dominio en la lista blanca
  DominiosOficiales. Cumple V-12.
