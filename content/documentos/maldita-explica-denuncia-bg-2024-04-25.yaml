titulo: "Maldita.es — En qué consiste la denuncia de Manos Limpias contra Begoña Gómez por supuesto tráfico de influencias (25 abril 2024)"
tipo: articulo_prensa
nivel_fuente: 4
nivel_fuente_justificacion: |
  Cobertura periodística que explica el contenido de la denuncia de
  Manos Limpias presentada el 8 de abril de 2024 ante el Juzgado de
  Instrucción nº 41 de Madrid. Nivel 4 por tratarse de un medio de
  comunicación. La denuncia íntegra no se ha localizado publicada en
  un dominio oficial; la apertura formal de diligencias del 16 de abril
  de 2024 está cruzada por al menos otra línea editorial distinta
  (Infobae) y por la propia nota del TSJ de Madrid difundida ese día,
  por lo que el hito derivado cumple V-13 al apoyarse en documentos
  multimedio.
