titulo: "eldiario.es — El juez sienta en el banquillo a Ignacio González y López Madrid por el amaño del tren a Navalcarnero (jun 2021)"
tipo: articulo_prensa
nivel_fuente: 4
nivel_fuente_justificacion: |
  Cobertura periodística complementaria del auto de apertura del
  juicio oral del 4 de junio de 2021 dictado por el titular del
  Juzgado Central de Instrucción nº 6 de la Audiencia Nacional
  Manuel María García-Castellón García-Lomas en la pieza
  separada nº 3 del caso Lezo. El artículo subraya la
  mecánica que el instructor atribuye al plan: presunto acuerdo
  entre el consejero de OHL Javier López Madrid y el ex
  directivo de OHL Rafael Martín de Nicolás con el ex
  presidente de la Comunidad de Madrid Ignacio González y el ex
  director gerente del Canal de Isabel II Ildefonso de Miguel,
  con un reparto presunto de aproximadamente 1,8 millones de
  euros en comisiones. Cruzado con la cobertura coetánea de
  infoLibre y El Español. Nivel 4 por tratarse de medio de
  comunicación.
