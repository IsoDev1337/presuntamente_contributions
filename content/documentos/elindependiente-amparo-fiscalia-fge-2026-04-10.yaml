titulo: "El Independiente — La Fiscalía pide amparo al Constitucional para anular la condena a García Ortiz (10 abr 2026)"
tipo: articulo_prensa
nivel_fuente: 4
nivel_fuente_justificacion: |
  Cobertura periodística de la presentación, por el Ministerio
  Fiscal el 10 de abril de 2026, de un recurso de amparo ante el
  Tribunal Constitucional contra la Sentencia 1000/2025 del Tribunal
  Supremo, alegando vulneración de cinco derechos fundamentales del
  entonces Fiscal General del Estado. La cobertura precisa que el
  recurso del Ministerio Fiscal se suma al que presentaría días
  después la propia defensa del condenado. Nivel 4 por tratarse de
  un medio de comunicación.
