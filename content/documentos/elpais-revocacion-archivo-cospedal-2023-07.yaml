id: elpais-revocacion-archivo-cospedal-2023-07
titulo: "El País — La Audiencia Nacional reabre la pieza Kitchen contra Cospedal y López del Hierro (jul 2023)"
tipo: articulo_prensa
nivel_fuente: 4
nivel_fuente_justificacion: |
  Cobertura periodística de El País sobre el auto de la Sala de
  Apelaciones de la Audiencia Nacional dictado en julio de 2023 por
  el que se revoca el archivo provisional respecto de María Dolores
  de Cospedal García y de Ignacio López del Hierro y se ordena la
  reincorporación de la causa contra ambos en la pieza separada nº 7
  de las Diligencias Previas 96/2017 del Juzgado Central de
  Instrucción nº 6 de la Audiencia Nacional (Operación Kitchen).
  Cumple V-13 al cruzarse en línea editorial distinta con la cobertura
  de elDiario.es sobre el mismo auto.
