id: nota-cgpj-apertura-juicio-oral-pujol
titulo: "Nota del CGPJ: el juez de la Audiencia Nacional abre juicio oral contra el expresidente de la Generalitat de Cataluña y sus siete hijos"
tipo: nota_prensa_institucional
nivel_fuente: 1
nivel_fuente_justificacion: |
  Nota oficial del CGPJ publicada en poderjudicial.es (dominio oficial en lista
  blanca) sobre el auto del juez Santiago Pedraz de 15 de junio de 2021 que
  abrió juicio oral contra Jordi Pujol Soley, sus siete hijos y otros acusados.
  La nota enumera los delitos (asociación ilícita, blanqueo de capitales,
  falsedad documental y delitos contra la Hacienda Pública), lo que corrobora
  desde fuente N1 el cuadro de delitos del caso. URL verificada el 2026-06-03.
