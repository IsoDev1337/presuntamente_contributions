nivel_fuente_justificacion: |
  Cobertura periodística de la imputación del empresario Juan Carlos
  Barrabés acordada por el Juzgado de Instrucción nº 41 de Madrid el
  19 de julio de 2024, tras su declaración como testigo el 15 de julio
  de 2024. Nivel 4 por tratarse de un medio de comunicación. La
  información se cruza con cobertura de la cadena COPE en línea
  editorial distinta y con la confirmación posterior en el auto de
  procesamiento del 13 de abril de 2026, cumpliendo V-13.
