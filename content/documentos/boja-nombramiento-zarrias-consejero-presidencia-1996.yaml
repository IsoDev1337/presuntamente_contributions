id: boja-nombramiento-zarrias-consejero-presidencia-1996
titulo: "BOJA nº 45 (17 de abril de 1996) — Decreto del Presidente 133/96, de 16 de abril, por el que se designan los Consejeros de la Junta de Andalucía (incluye nombramiento de Gaspar Zarrías Arévalo como Consejero de la Presidencia)"
tipo: boletin_oficial
nivel_fuente: 1
nivel_fuente_justificacion: |
  Boletín Oficial de la Junta de Andalucía (BOJA) nº 45, publicado el 17 de abril
  de 1996. Contiene el Decreto del Presidente 133/96, de 16 de abril, firmado por
  Manuel Chaves González (Presidente de la Junta de Andalucía), por el que se
  designan los miembros del Consejo de Gobierno de la Junta de Andalucía.
  Gaspar Zarrías Arévalo aparece designado como "Consejero de la Presidencia".
  El PDF completo del boletín (26 páginas) fue descargado desde el histórico
  oficial del BOJA en juntadeandalucia.es (URL: /boja/1996/45/d3.pdf). El dominio
  juntadeandalucia.es es la fuente primaria y auditoria directa del órgano emisor.
  Productor: Junta de Andalucía (juntadeandalucia.es). PDF generado con iText
  2.0.5; fecha de creación del PDF: 25 de mayo de 2008 (digitalización del BOJA
  en papel). Cumple V-12.
