id: nota-sepi-aprobacion-plus-ultra-2021-03
titulo: "Nota institucional de la SEPI sobre la autorización del Consejo de Ministros para el préstamo a Plus Ultra"
tipo: nota_prensa_institucional
nivel_fuente: 3
nivel_fuente_justificacion: |
  Comunicación institucional de la SEPI, organismo público dependiente
  del Ministerio de Hacienda. Aunque su dominio (sepi.es) no está
  incluido en la lista blanca DominiosOficiales del modelo y por tanto
  no alcanza Nivel 1, la procedencia institucional y la verificación
  cruzada con cobertura multi-medio (Público, Hosteltur, El Liberal)
  justifican el Nivel 3.
