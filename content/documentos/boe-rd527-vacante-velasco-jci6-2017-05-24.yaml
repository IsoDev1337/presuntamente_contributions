id: boe-rd527-vacante-velasco-jci6-2017-05-24
titulo: "Real Decreto 527/2017, de 22 de mayo, por el que se destina a los Magistrados que se relacionan, como consecuencia del concurso resuelto por Acuerdo de la Comisión Permanente del CGPJ — Eloy Velasco Núñez es destinado a la Sala de Apelación de la Audiencia Nacional"
tipo: boletin_oficial
nivel_fuente: 1
nivel_fuente_justificacion: |
  Publicación oficial en el «Boletín Oficial del Estado» del miércoles
  24 de mayo de 2017 (núm. 123, código de verificación CVE
  BOE-A-2017-5738). Real Decreto firmado por el Rey Felipe VI y
  refrendado por el ministro de Justicia, en aplicación del Acuerdo
  de la Comisión Permanente del CGPJ del 17 de mayo de 2017 que
  adjudicó la plaza de la nueva Sala de Apelación de la Audiencia
  Nacional al magistrado Eloy Velasco Núñez, formalizando con ello la
  vacante del Juzgado Central de Instrucción nº 6 que ocupaba hasta
  entonces. Dominio oficial en lista blanca (`boe.es`). Copia íntegra
  descargada del endpoint estable
  `https://www.boe.es/boe/dias/2017/05/24/pdfs/BOE-A-2017-5738.pdf`
  (183 024 bytes) y servida desde el árbol del proyecto en
  `/documentos/lezo/boe-rd527-vacante-velasco-jci6.pdf` con hash
  SHA-256 verificable. XML estructurado del propio BOE descargado
  adicionalmente (21 271 bytes). Metadatos del PDF reflejan autoría
  del Consejo General del Poder Judicial (campo Author = "CONSEJO
  GENERAL DEL PODER JUDICIAL"), producción mediante Adobe PDF Library
  10.0.1 vía eBOE, fecha de creación 23 de mayo de 2017. Cumple V-12.
