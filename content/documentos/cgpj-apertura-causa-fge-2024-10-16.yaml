nivel_fuente_justificacion: |
  Nota oficial del Consejo General del Poder Judicial publicada en
  `poderjudicial.es` (dominio en la lista blanca DominiosOficiales del
  doc 01 §3) anunciando que la Sala Segunda del Tribunal Supremo abre
