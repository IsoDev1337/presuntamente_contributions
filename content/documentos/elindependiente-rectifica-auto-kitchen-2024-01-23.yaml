titulo: "El Independiente — García-Castellón elimina el delito de secuestro de 'Kitchen' y enfila el caso para juicio (ene 2024)"
tipo: articulo_prensa
nivel_fuente: 4
nivel_fuente_justificacion: |
  Cobertura periodística de El Independiente sobre el auto rectificador
  del 23 de enero de 2024 del magistrado instructor del Juzgado Central
  de Instrucción nº 6 de la Audiencia Nacional, Manuel García-Castellón,
  por el que se excluyen del auto de apertura del juicio oral los
  delitos de secuestro y de pertenencia a organización criminal en la
  pieza séptima de las Diligencias Previas 96/2017 (Operación
  Kitchen). Cumple V-13 al respaldarse cruzadamente con la nota
  oficial del CGPJ del mismo 23 de enero (N1).
