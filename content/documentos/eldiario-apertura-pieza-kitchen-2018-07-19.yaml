titulo: "elDiario.es — La Audiencia Nacional abre una pieza separada para investigar el supuesto espionaje a Bárcenas (jul 2018)"
tipo: articulo_prensa
nivel_fuente: 4
nivel_fuente_justificacion: |
  Cobertura periodística de elDiario.es, medio digital nacional español
  de información general, sobre la apertura por el Juzgado Central de
  Instrucción nº 6 de la Audiencia Nacional, en julio de 2018, de la
  pieza separada nº 7 de las Diligencias Previas 96/2017 del Caso
  Tándem para investigar la presunta operación parapolicial atribuida
  al Ministerio del Interior contra el ex tesorero del Partido Popular
  Luis Bárcenas. La pieza pasa a ser conocida mediáticamente como
  Operación Kitchen. Cumple V-13 al cruzarse con la cobertura de
  Infobae sobre el mismo hito.
