id: theobjective-levantamiento-secreto-leire-2026-06-01
titulo: "The Objective: Pedraz levanta parcialmente el secreto del sumario del caso Leire Díez al haberse practicado gran parte de las diligencias (1 junio 2026)"
tipo: articulo_prensa
nivel_fuente: 4
nivel_fuente_justificacion: |
  Cobertura de The Objective (línea editorial de derecha) sobre el auto del JCI nº 5 AN del
  1 de junio de 2026 que levanta parcialmente el secreto del sumario. Recoge la justificación
  del magistrado ("ya se han practicado gran parte de las diligencias que motivaron el
  secreto de la causa") y que se mantiene bajo reserva una pieza durante un mes para no
  perjudicar diligencias pendientes. Cruzado con Público (izquierda) e Infobae (independiente)
  para V-13.
