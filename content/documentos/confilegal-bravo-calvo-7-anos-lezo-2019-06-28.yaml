id: confilegal-bravo-calvo-7-anos-lezo-2019-06-28
titulo: "Confilegal — Anticorrupción reclama 7 años de cárcel para dos exconsejeros de Gallardón, Juan Bravo y Pedro Calvo, por el caso Lezo (28 jun 2019)"
tipo: articulo_prensa
nivel_fuente: 4
nivel_fuente_justificacion: |
  Cobertura periodística jurídica del escrito de calificación
  provisional de la Fiscalía Anticorrupción en la pieza Inassa
  del caso Lezo, presentado el 28 de junio de 2019. Detalla las
  peticiones de pena para los dos ex consejeros del gobierno de
  Alberto Ruiz-Gallardón (siete años de prisión y quince años
  de inhabilitación absoluta) y para los restantes veinte
  procesados (entre seis y siete años de prisión y de doce a
  quince años de inhabilitación), por presuntos delitos de
  malversación de caudales públicos en concurso con
  prevaricación. Confilegal es publicación especializada en
  información jurídica. Cruzado con cobertura de Madridiario y
  El Español coincidente. Nivel 4 por tratarse de un medio de
  comunicación.
