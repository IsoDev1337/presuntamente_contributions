nivel_fuente_justificacion: |
  Cobertura periodística de El Debate sobre el inicio de la vista oral
  del juicio del caso Kitchen el 6 de abril de 2026 ante la Sección
  Cuarta de la Sala de lo Penal de la Audiencia Nacional, con detalle
  de los procesados, las peticiones de pena de la Fiscalía Especial
  contra la Corrupción y la Criminalidad Organizada y las acusaciones
  populares y particulares personadas. Cumple V-13 al cruzarse en
  línea editorial distinta con la cobertura de Demócrata e Iustel
  sobre el inicio del juicio.
