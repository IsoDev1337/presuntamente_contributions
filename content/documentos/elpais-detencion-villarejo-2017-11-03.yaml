id: elpais-detencion-villarejo-2017-11-03
titulo: "El País — La Policía detiene al comisario José Manuel Villarejo en una operación contra el blanqueo de capitales (3 nov 2017)"
tipo: articulo_prensa
nivel_fuente: 4
nivel_fuente_justificacion: |
  Cobertura periodística de El País, diario nacional español de
  información general, sobre la detención del comisario jubilado del
  Cuerpo Nacional de Policía José Manuel Villarejo Pérez el 3 de
  noviembre de 2017, que dio origen a las Diligencias Previas 96/2017
  del Juzgado Central de Instrucción nº 6 de la Audiencia Nacional,
  conocidas como Caso Tándem y desplegadas en más de treinta piezas
  separadas, entre ellas la pieza séptima conocida mediáticamente como
  Operación Kitchen. Cumple V-13 al cruzarse con la cobertura de
  laSexta del mismo periodo.
