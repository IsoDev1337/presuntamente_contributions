id: cgpj-rectifica-auto-kitchen-2024-01-23
titulo: "Nota CGPJ — El juez rectifica el auto de apertura de juicio oral del 'caso Kitchen' (23 ene 2024)"
tipo: nota_prensa_institucional
nivel_fuente: 1
nivel_fuente_justificacion: |
  Nota oficial del Consejo General del Poder Judicial publicada en
  `poderjudicial.es` (dominio en la lista blanca DominiosOficiales de [doc 01 — "Enums catalogados"](docs/diseno/01-modelo-de-datos.md#3-enums-catalogados)) sobre la rectificación del auto de apertura del juicio
  oral acordada por el magistrado del Juzgado Central de Instrucción
  nº 6 de la Audiencia Nacional, Manuel García-Castellón, en la pieza
  séptima de las Diligencias Previas 96/2017 (Operación Kitchen). La
  rectificación excluye los delitos de secuestro y de pertenencia a
  organización criminal por superar éstos el límite de pena de nueve
  años establecido para el procedimiento abreviado. Cumple V-12.
