titulo: "El Español — El juez lleva al banquillo a López Madrid, Ignacio González y De la Joya por el tren de Navalcarnero (7 jun 2021)"
tipo: articulo_prensa
nivel_fuente: 4
nivel_fuente_justificacion: |
  Cobertura periodística complementaria del auto de apertura del
  juicio oral del 4 de junio de 2021 dictado por el titular del
  Juzgado Central de Instrucción nº 6 de la Audiencia Nacional
  Manuel María García-Castellón García-Lomas en la pieza
  separada nº 3 del caso Lezo (tren ligero Móstoles
  Central-Navalcarnero). El artículo añade detalle sobre el
  papel atribuido a Javier López Madrid en el escrito de
  acusación («ideó un plan consistente en asegurarse la
  adjudicación inicial» junto a Rafael Martín de Nicolás
  aprovechando su «estrecha relación personal» con Ignacio
  González) y refiere una cuantía aproximada de 2,5 millones de
  dólares en pagos de comisiones, complementaria a la cifra en
  euros referida por infoLibre. Cruzado con la cobertura
  coetánea de infoLibre y eldiario.es. Nivel 4 por tratarse de
  medio de comunicación.
