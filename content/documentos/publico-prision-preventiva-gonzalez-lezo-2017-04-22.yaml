titulo: "Público — El juez mantiene en prisión a Ignacio González por su papel decisivo en Lezo (abr 2017)"
tipo: articulo_prensa
nivel_fuente: 4
nivel_fuente_justificacion: |
  Cobertura periodística del auto del titular del Juzgado Central de
  Instrucción nº 6 de la Audiencia Nacional Eloy Velasco que acordó
  el 22 de abril de 2017 prisión provisional incondicional sin
  fianza para el ex presidente de la Comunidad de Madrid Ignacio
  González González, tres días después de su detención por la
  Unidad Central Operativa de la Guardia Civil. El mismo auto
  acordó prisión eludible con fianza de 100.000 euros para el ex
  director gerente del Canal de Isabel II Ildefonso de Miguel
  Rodríguez. Verificado por cruce con cobertura coetánea de
  Telemadrid, Madridiario y otros medios. Nivel 4 por tratarse de
  un medio de comunicación.
