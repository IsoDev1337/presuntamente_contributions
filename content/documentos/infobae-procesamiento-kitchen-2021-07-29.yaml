id: infobae-procesamiento-kitchen-2021-07-29
titulo: "Infobae — Procesamiento por la Operación Kitchen: el juez envía a juicio a Fernández Díaz, Pino, Martínez y Villarejo y archiva contra Cospedal (jul 2021)"
tipo: articulo_prensa
nivel_fuente: 4
nivel_fuente_justificacion: |
  Cobertura periodística de Infobae sobre el auto del magistrado
  instructor del Juzgado Central de Instrucción nº 6 de la Audiencia
  Nacional del 29 de julio de 2021 por el que se transforma el
  procedimiento a abreviado y se procesa a Jorge Fernández Díaz,
  Francisco Martínez Vázquez, Eugenio Pino Sánchez, José Manuel
  Villarejo Pérez y otros agentes del Cuerpo Nacional de Policía en
  la pieza separada nº 7 de las Diligencias Previas 96/2017
  (Operación Kitchen), acordándose simultáneamente el sobreseimiento
  provisional respecto de Cospedal y López del Hierro. Cumple V-13 al
  cruzarse en línea editorial distinta con la cobertura de elDiario.es
  sobre el mismo auto.
