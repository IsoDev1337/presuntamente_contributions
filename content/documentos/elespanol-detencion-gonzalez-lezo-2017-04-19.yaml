nivel_fuente_justificacion: |
  Cobertura periodística primaria del día de la operación policial
  coordinada por la Unidad Central Operativa de la Guardia Civil
  bajo el mando del coronel Manuel Sánchez Corbí, en la que fue
  detenido el ex presidente de la Comunidad de Madrid Ignacio
  González González junto a una docena de personas más. Verificado
  por cruce con cobertura coetánea de Público (sección «Operación
  Lezo: la batalla perdida de González contra Público») y de
  eldiario.es. Nivel 4 por tratarse de un medio de comunicación.
