  Cobertura audiovisual de laSexta, cadena de televisión nacional
  española integrada en Atresmedia, sobre la detención del comisario
  jubilado José Manuel Villarejo Pérez y la incoación de las
  Diligencias Previas 96/2017 del Juzgado Central de Instrucción nº 6
  de la Audiencia Nacional. Cumple V-13 al cruzarse en línea editorial
  distinta con la cobertura de El País del mismo periodo.
