id: iustel-incapacidad-garcia-castano-kitchen-2025
titulo: "Iustel — La Audiencia Nacional rechaza el intento del exjefe de la UCAO García Castaño de librarse de ser juzgado por la Operación Kitchen (2025)"
tipo: articulo_prensa
nivel_fuente: 4
nivel_fuente_justificacion: |
  Cobertura periodística especializada de Iustel sobre las
  resoluciones de la Sala de lo Penal de la Audiencia Nacional
  respecto al estado de salud del comisario procesado Enrique García
  Castaño, ex jefe de la Unidad Central de Apoyo Operativo (UCAO) de
  la Dirección General de la Policía, tras el ictus sufrido en 2022
  que derivó en incapacidad mental sobrevenida apreciada en la fase
  de enjuiciamiento. Cumple V-13 al cruzarse con la cobertura de El
  Debate sobre el mismo hecho procesal en el inicio del juicio el 6
  de abril de 2026.
