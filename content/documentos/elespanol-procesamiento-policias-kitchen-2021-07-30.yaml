nivel_fuente_justificacion: |
  Cobertura periodística de El Español sobre el auto del Juzgado
  Central de Instrucción nº 6 de la Audiencia Nacional del 29 de
  julio de 2021 por el que se procesa, en la pieza séptima de las
  Diligencias Previas 96/2017 (Operación Kitchen), a los ex
  comisarios José Luis Olivera Serrano, Marcelino Martín-Blas Aritio,
  Enrique García Castaño, Andrés Manuel Gómez Gordo, José Ángel
  Fuentes Gago y Bonifacio Díez Sevillano junto a Jorge Fernández
  Díaz, Francisco Martínez Vázquez, Eugenio Pino Sánchez, José Manuel
  Villarejo Pérez y Sergio Ríos Esgueva. Cumple V-13 al cruzarse con
  la cobertura ya catalogada de elDiario.es e Infobae sobre el mismo
  auto.
