nivel_fuente_justificacion: |
  Cobertura periodística del auto del Juzgado de Instrucción nº 41 de
  Madrid del 13 de abril de 2026 que cierra la instrucción y procesa a
  Begoña Gómez por cuatro delitos, archivando el de intrusismo
  profesional. Nivel 4 por tratarse de un medio de comunicación. La
  información está cruzada con la cobertura del mismo auto en
  El Español y en Libertad Digital, de líneas editoriales distintas,
  cumpliendo V-13.
