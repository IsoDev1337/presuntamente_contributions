biografia_corta: |
  Andrés Manuel Gómez Gordo es un inspector jefe español del Cuerpo
  Nacional de Policía, próximo profesional y personalmente a María
  Dolores de Cospedal García en el periodo en que ésta presidió la
  Junta de Comunidades de Castilla-La Mancha. Por auto del Juzgado
  Central de Instrucción nº 6 de la Audiencia Nacional fue investigado
  y, por auto del mismo órgano del 29 de julio de 2021, procesado en
  la pieza separada nº 7 de las Diligencias Previas 96/2017
  (Operación Kitchen) por su presunta función como nexo en el
  reclutamiento del confidente Sergio Ríos Esgueva y en la
  transmisión de información al ex Director Adjunto Operativo Eugenio
  Pino Sánchez y al ex secretario de Estado de Seguridad Francisco
  Martínez Vázquez. La Fiscalía Especial contra la Corrupción y la
  Criminalidad Organizada solicita en su escrito de acusación pena
  de prisión e inhabilitación por presuntos delitos de encubrimiento,
  malversación de caudales públicos y contra la intimidad. Rige el
  principio de presunción de inocencia mientras no recaiga sentencia
  firme en contrario.
