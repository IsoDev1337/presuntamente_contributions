biografia_corta: |
  Político español del Partido Popular nacido en Ponferrada
  (provincia de León). Fue presidente de Nuevas Generaciones del
  PP (1993-1997), diputado en la Asamblea de Madrid en varias
  legislaturas y consejero de Medio Ambiente del gobierno de la
  Comunidad de Madrid presidido por Alberto Ruiz-Gallardón entre
  2000 y 2003. Fue concejal del Ayuntamiento de Madrid hasta su
  dimisión en noviembre de 2012 tras su imputación en el caso
  Madrid Arena. Figura como procesado en la pieza Inassa del
  caso Lezo, cuya vista oral se inició ante la Sección Segunda
  de la Sala de lo Penal de la Audiencia Nacional el 24 de mayo
  de 2023. La Fiscalía Anticorrupción solicita para él siete
  años de prisión y quince años de inhabilitación absoluta por
  presuntos delitos de malversación de caudales públicos en
  concurso con prevaricación. Le es de aplicación la presunción
  de inocencia.
