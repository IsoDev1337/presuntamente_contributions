biografia_corta: |
  Político español del Partido Popular reconvertido en directivo
  académico. Tras una etapa en el Gobierno de España como Secretario
  General de Turismo (2000-2003) bajo el segundo mandato de José
  María Aznar, fue consejero de la Comunidad de Madrid en los
  gobiernos de Esperanza Aguirre, primero en Empleo y Mujer
  (2003-2007) y después en Sanidad (2007-2010). Desde marzo de 2010
  preside el Centro Internacional de Gestión Emprendedora (Center
  for Entrepreneurship & Innovation) de IE Business School, donde
  también ostenta la vicepresidencia de Asuntos Económicos desde
  2012. Compareció en el procedimiento del Juzgado de Instrucción
  nº 41 de Madrid relativo a la Cátedra de Transformación Social
  Competitiva, primero como testigo y posteriormente como
  investigado por la contratación de Begoña Gómez en 2018 como
  directora del Africa Center del IE. La Audiencia Provincial de
  Madrid revocó su condición de investigado en mayo de 2025 al
  considerar que no concurrían indicios racionales de criminalidad
  y que esa contratación excedía del objeto de la instrucción.
  Conforme al principio de presunción de inocencia, rige la
  inocencia mientras no recaiga resolución firme en contrario.
