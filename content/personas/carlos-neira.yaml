biografia_corta: |
  Carlos Neira Crespo es abogado español especializado en derecho
  fiscal. Como letrado de Alberto González Amador, dirigió su defensa
  en la causa que se sigue ante el Juzgado de Instrucción nº 19 de
  Madrid por presunto fraude fiscal y falsedad documental sobre la
  sociedad Maxwell Cremona Ingeniería y Procesos S.L. Fue autor
  material del correo electrónico remitido el 2 de febrero de 2024 a
  la Fiscalía Provincial de Madrid en el que se proponía un acuerdo
  de conformidad reconociendo la existencia de dos delitos contra la
  Hacienda Pública. La filtración a la prensa de ese correo, ocurrida
  el 13 de marzo de 2024, motivó la apertura de la Causa Especial nº
  20557/2024 ante la Sala Segunda del Tribunal Supremo contra el
  entonces Fiscal General del Estado Álvaro García Ortiz y la
  entonces Fiscal Jefa Provincial de Madrid Pilar Rodríguez
  Fernández. En la causa contra García Ortiz, Carlos Neira ejerce
  como letrado de la acusación particular, posición ocupada por su
  cliente Alberto González Amador. La Sentencia 1000/2025 del
  Tribunal Supremo, firme desde el 26 de febrero de 2026, condena a
  García Ortiz a indemnizar al perjudicado Alberto González Amador
  con diez mil euros y al pago de las costas de la acusación
  particular.
