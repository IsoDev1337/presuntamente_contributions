biografia_corta: |
  Teresa Palacios Criado es una magistrada española de la Carrera
  Judicial, presidenta de la Sección Cuarta de la Sala de lo Penal de
  la Audiencia Nacional. En esa condición preside y es ponente del
  tribunal de enjuiciamiento de la pieza separada nº 7 de las
  Diligencias Previas 96/2017 (Operación Kitchen), cuyo juicio oral
  se inició el 6 de abril de 2026.
