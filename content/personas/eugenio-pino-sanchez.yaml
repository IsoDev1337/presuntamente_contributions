biografia_corta: |
  Eugenio Pino Sánchez es un alto cargo policial español que se
  desempeñó como Director Adjunto Operativo (DAO) de la Dirección
  General de la Policía durante el mandato del ministro del Interior
  Jorge Fernández Díaz. Por auto del magistrado instructor del
  Juzgado Central de Instrucción nº 6 de la Audiencia Nacional fue
  investigado y, por auto posterior del mismo órgano, procesado en
  la pieza separada conocida mediáticamente como Operación Kitchen
  por su presunta participación en la coordinación operativa del
  dispositivo policial atribuido al Ministerio del Interior. Rige el
  principio de presunción de inocencia mientras no recaiga sentencia
  firme en contrario.
