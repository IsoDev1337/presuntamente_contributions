biografia_corta: |
  Abogado español. Presidente ejecutivo de Inassa, sociedad cabecera
  de Canal de Isabel II Gestión en América Latina, contratado por
  el Canal en 2006. Previamente, en 2004, su despacho Rodríguez
  Sobrino Abogados fue contratado por el Canal para «asesoramiento
  jurídico y control de las inversiones de Canal en Latinoamérica».
  Según cobertura periodística, recibió por ambos contratos un
  total acumulado próximo a los 700.000 euros entre 2004 y 2009.
  Detenido en la operación policial del 19 de abril de 2017 en el
  marco del caso Lezo y posteriormente procesado por el magistrado
  Manuel María García-Castellón García-Lomas en la pieza Emissao
  (auto de 18 de noviembre de 2019). Figura igualmente entre los
  veintidós procesados de la pieza Inassa, cuya vista oral se
  inició ante la Sección Segunda de la Sala de lo Penal de la
  Audiencia Nacional el 24 de mayo de 2023. Su nombre apareció
  asimismo en los llamados «Papeles de Panamá» en relación con
  sociedades offshore en Hong Kong. Le es de aplicación la
  presunción de inocencia.
