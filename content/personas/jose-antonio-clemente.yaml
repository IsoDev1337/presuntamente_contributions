biografia_corta: |
  Empresario español. Socio de la sociedad Tecnoconcret Proyectos
  de Ingeniería (TCT) junto con Pablo Manuel González González y
  Juan José Caballero Escudier, hermano y cuñado respectivamente
  del ex presidente de la Comunidad de Madrid Ignacio González
  González. Figura como procesado en la pieza del campo de golf
  del caso Lezo seguida ante la Sección Segunda de la Sala de lo
  Penal de la Audiencia Nacional, cuyo juicio oral está señalado
  entre el 13 y el 30 de septiembre de 2027. La Fiscalía
  Anticorrupción solicita seis años de prisión y multa de 550.000
  euros para él en su escrito de acusación. Le es de aplicación la
  presunción de inocencia.
