biografia_corta: |
  Empresario español del sector tecnológico y de transformación digital.
  Fundador y consejero de varias compañías ligadas al asesoramiento
  empresarial. Codirige, junto a Begoña Gómez, la Cátedra Extraordinaria
  de Transformación Social Competitiva de la Universidad Complutense de
  Madrid. Su rol en relación con cartas de recomendación firmadas en
  2020 y con la adjudicación de contratos públicos por más de diez
  millones de euros a sociedades vinculadas a su grupo es uno de los
  objetos de la causa que instruye el Juzgado de Instrucción nº 41 de
  Madrid.
