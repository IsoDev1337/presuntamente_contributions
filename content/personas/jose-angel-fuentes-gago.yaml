biografia_corta: |
  José Ángel Fuentes Gago es un inspector español del Cuerpo Nacional
  de Policía, descrito en la cobertura del procedimiento como persona
  de confianza del ex Director Adjunto Operativo Eugenio Pino Sánchez.
  Por auto del Juzgado Central de Instrucción nº 6 de la Audiencia
  Nacional fue investigado y, por auto del mismo órgano del 29 de
  julio de 2021, procesado en la pieza separada nº 7 de las
  Diligencias Previas 96/2017 (Operación Kitchen). La Fiscalía
  Especial contra la Corrupción y la Criminalidad Organizada, en su
  escrito de acusación, retiró la imputación al no apreciar indicios
  suficientes; las acusaciones populares y particulares personadas
  en la causa mantienen reproches penales. Rige el principio de
  presunción de inocencia mientras no recaiga sentencia firme en
  contrario.
