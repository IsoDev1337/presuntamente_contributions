biografia_corta: |
  Susana Polo García es magistrada española. Ingresó en la
  carrera judicial en 1985 con primeros destinos en juzgados de
  San Sebastián de los Reyes, Barcelona, Fuenlabrada y Madrid; en
  1988 fue promovida a magistrada (Juzgado de Primera Instancia e
  Instrucción nº 6 de Alicante; en 1990, Juzgado de Instrucción
  nº 4 de Madrid). Entre 1997 y 2013 desempeñó su labor en la
  Audiencia Provincial de Madrid, primero en la Sección Segunda
  y luego como presidenta de la Sección 26. En abril de 2013 fue
  nombrada magistrada de la Sala Civil y Penal del Tribunal
  Superior de Justicia de Madrid y, por Real Decreto 1079/2018
  de 24 de agosto (BOE-A-2018-12414), promovida a la Sala Segunda
  (de lo Penal) del Tribunal Supremo, donde tomó posesión en
  septiembre de 2018. Especialista en violencia de género, ponente
  de la sentencia del Tribunal Supremo en el caso conocido como
  "La Manada". Integra el tribunal de siete magistrados que
  enjuicia la Causa Especial nº 20557/2024 contra el entonces
  Fiscal General del Estado Álvaro García Ortiz y formula, junto
  a la magistrada Ana María Ferrer García, voto particular
  conjunto disidente defendiendo la libre absolución del condenado.
