biografia_corta: |
  Álvaro García Ortiz es un fiscal español, licenciado en Derecho por
  la Universidad de Valladolid, con plaza en el Ministerio Fiscal
  desde 1998. Desempeñó su carrera en Mahón, en el área de Santiago
  de Compostela y como especialista de medio ambiente en la Fiscalía
  del Tribunal Superior de Justicia de Galicia, llegando en 2020 a
  Fiscal de Sala de la Secretaría Técnica de la Fiscalía General del
  Estado. Por Real Decreto del 2 de agosto de 2022 fue nombrado
  Fiscal General del Estado a propuesta del Gobierno presidido por
  Pedro Sánchez. Por Sentencia 1000/2025 de la Sala Segunda del
  Tribunal Supremo de 9 de diciembre de 2025 fue condenado, en causa
  especial seguida ante el órgano competente por razón de su cargo
  aforado, como autor responsable de un delito de revelación de
  datos reservados del artículo 417.1 del Código Penal a multa de
  doce meses con cuota diaria de veinte euros, a inhabilitación
  especial para el cargo de Fiscal General del Estado durante dos
  años y a indemnizar al perjudicado en diez mil euros, con voto
  particular disidente de dos magistradas. La condena devino firme
  el 26 de febrero de 2026, tras la desestimación de los incidentes
  de nulidad. El 24 de noviembre de 2025 presentó su dimisión y por
  Real Decreto 1138/2025 de 9 de diciembre fue cesado en el cargo,
  reintegrándose a la carrera fiscal en la Sala de lo Social del
  Tribunal Supremo. Es el primer Fiscal General del Estado de la
  democracia española condenado por sentencia firme estando todavía
  en activo en el cargo. La causa, pese a estar firme en la
  jurisdicción ordinaria, sigue abierta en amparo ante el Tribunal
  Constitucional por sendos recursos presentados por el propio
  condenado y por el Ministerio Fiscal en abril de 2026.
