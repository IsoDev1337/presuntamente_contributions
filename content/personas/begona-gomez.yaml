biografia_corta: |
  María Begoña Gómez Fernández, nacida en Bilbao el 24 de marzo de 1971,
  es esposa del presidente del Gobierno de España, Pedro Sánchez, desde
  2006. Es especialista en marketing y dirección de organizaciones no
  lucrativas. Ha desarrollado su trayectoria profesional en consultoría
  de externalización comercial (grupo Inmark, 2000-2018) y en el ámbito
  académico privado. Entre 2018 y 2022 dirigió el África Center del
  Instituto de Empresa. Codirige una cátedra extraordinaria en la
  Universidad Complutense de Madrid centrada en transformación social
  competitiva.
