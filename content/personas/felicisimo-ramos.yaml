biografia_corta: |
  Ex directivo español del sector de la construcción. Ocupó el
  cargo de director de Control de Gestión del grupo OHL
  (Obrascón Huarte Lain, hoy OHLA) durante más de veinte años,
  hasta su jubilación en 2013. Figura como procesado en la pieza
  separada nº 3 del caso Lezo por auto de apertura del juicio
  oral del 4 de junio de 2021 del titular del Juzgado Central
  de Instrucción nº 6 de la Audiencia Nacional Manuel María
  García-Castellón García-Lomas, en relación con la presunta
  adjudicación irregular en 2007 por el Consorcio Regional de
  Transportes de Madrid de las obras del tren ligero Móstoles
  Central-Navalcarnero a la unión temporal de empresas liderada
  por OHL. La Fiscalía Anticorrupción solicita para él seis años
  y medio de prisión por presuntos delitos de tráfico de
  influencias, cohecho, falsedad en documento mercantil y fraude
  a las administraciones públicas. Según el escrito de
  acusación, presuntamente ordenó por instrucción de su
  superior Rafael Martín de Nicolás la transferencia desde
  cuentas de OHL en Banco Santander de aproximadamente 2,5
  millones de dólares a cuentas en México bajo concepto presunto
  de devolución de un préstamo ficticio y participó en la
  emisión de facturas mercantiles presuntamente falsas a una
  sociedad panameña. Le es de aplicación el principio de
  presunción de inocencia mientras no recaiga resolución firme.
