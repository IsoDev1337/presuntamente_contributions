nombre_completo: "Roberto Roselli"
es_figura_publica: true
biografia_corta: |
  Director ejecutivo (CEO) de la aerolínea Plus Ultra Líneas Aéreas.
  Detenido por la UDEF el 11 de diciembre de 2025 durante el registro de
  la sede de la compañía y posteriormente puesto en libertad con
  medidas cautelares. Su condición de figura pública deriva del cargo
  ejecutivo en la empresa beneficiaria del préstamo de 53 millones de
  euros concedido por la SEPI en marzo de 2021.
