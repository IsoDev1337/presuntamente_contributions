biografia_corta: |
  Político español del Partido Popular. Fue vicepresidente de la
  Comunidad de Madrid bajo los gobiernos de Esperanza Aguirre
  (2003-2012) y presidente del mismo gobierno autonómico entre el
  26 de septiembre de 2012 y el 25 de junio de 2015. Posteriormente
  fue senador por designación de la Asamblea de Madrid hasta su
  renuncia al acta el 9 de mayo de 2017, días después de su
  detención en el marco de la Operación Lezo. El 19 de abril de
  2017 fue detenido por agentes de la Unidad Central Operativa de
  la Guardia Civil; el 22 de abril del mismo año el titular del
  Juzgado Central de Instrucción nº 6 de la Audiencia Nacional,
  Eloy Velasco, acordó su prisión provisional incondicional. Está
  procesado en varias piezas separadas del caso Lezo; la pieza
  relativa a las adjudicaciones del campo de golf del Canal de
  Isabel II ha sido señalada para juicio oral entre el 13 y el 30
  de septiembre de 2027 ante la Sección Segunda de la Sala de lo
  Penal de la Audiencia Nacional. Le es de aplicación la presunción
  de inocencia.
