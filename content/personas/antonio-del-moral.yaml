biografia_corta: |
  Antonio del Moral García es magistrado español, procedente del
  Ministerio Fiscal, incorporado a la Sala Segunda (de lo Penal)
  del Tribunal Supremo en 2012 durante la presidencia del CGPJ
  por Carlos Dívar, en plaza del turno de juristas de reconocida
  competencia. Integra el tribunal de siete magistrados que
  enjuicia la Causa Especial nº 20557/2024 contra el entonces
  Fiscal General del Estado Álvaro García Ortiz, votando con la
  mayoría condenatoria.
