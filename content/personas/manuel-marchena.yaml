biografia_corta: |
  Manuel Marchena Gómez es magistrado español, integrante de la
  Sala Segunda (de lo Penal) del Tribunal Supremo desde 2007 y
  presidente de la misma entre el 10 de octubre de 2014 (Real
  Decreto 891/2014, BOE-A-2014-10914) y el 6 de diciembre de 2024,
  fecha en que expiró su mandato. Tras pasar al estatuto de
  magistrado de la Sala sin presidencia, integra el tribunal de
  siete magistrados que enjuicia la Causa Especial nº 20557/2024
  contra el entonces Fiscal General del Estado Álvaro García
  Ortiz, votando con la mayoría condenatoria. Licenciado en
  Derecho con premio extraordinario por la Universidad de Deusto,
  doctor en Derecho cum laude. Procedente del Ministerio Fiscal:
  fiscal en la Audiencia Territorial de Las Palmas (1985), Fiscal
  de la Secretaría Técnica de la Fiscalía General del Estado
  (1992), Fiscal del Tribunal Supremo en su sección penal
  (2004-2007). Presidió la sala del juicio del procés en 2019.
