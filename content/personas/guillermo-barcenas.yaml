biografia_corta: |
  Guillermo Bárcenas Iglesias es un ciudadano español, hijo de Luis
  Bárcenas Gutiérrez y de Rosalía Iglesias Villar, conocido
  públicamente como vocalista del grupo musical Taburete. En la pieza
  separada nº 7 de las Diligencias Previas 96/2017 del Juzgado
  Central de Instrucción nº 6 de la Audiencia Nacional, conocida
  mediáticamente como Operación Kitchen, figura como acusación
  particular junto a sus padres, en relación con la presunta
  operación parapolicial atribuida al Ministerio del Interior contra
  el entorno familiar del ex tesorero del Partido Popular entre 2013
  y 2015.
