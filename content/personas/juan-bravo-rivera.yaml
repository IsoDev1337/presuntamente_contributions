biografia_corta: |
  Político español y funcionario público nacido en Londres.
  Licenciado en Derecho por la Universidad Complutense de Madrid e
  integrante del Cuerpo Técnico de Administración General de la
  Comunidad de Madrid. Concejal del Ayuntamiento de Madrid en los
  equipos de gobierno de Alberto Ruiz-Gallardón y Ana Botella; fue
  el único concejal madrileño que acompañó a Ruiz-Gallardón al
  Ministerio de Justicia cuando éste fue nombrado ministro en
  diciembre de 2011. Figura como procesado en la pieza Inassa del
  caso Lezo, cuya vista oral se inició ante la Sección Segunda de
  la Sala de lo Penal de la Audiencia Nacional el 24 de mayo de
  2023. La Fiscalía Anticorrupción solicita para él siete años de
  prisión y quince años de inhabilitación absoluta por presuntos
  delitos de malversación de caudales públicos en concurso con
  prevaricación. Le es de aplicación la presunción de inocencia.
