biografia_corta: |
  Pilar Rodríguez Fernández es fiscal española, durante varios años
  Fiscal Jefa Provincial de Madrid. Investigada inicialmente en la
  Causa Especial nº 20557/2024 de la Sala Segunda del Tribunal
  Supremo junto al entonces Fiscal General del Estado Álvaro García
  Ortiz por presunto delito de revelación de datos reservados en
  relación con la filtración del correo electrónico del 2 de febrero
  de 2024 del abogado Carlos Neira, fue sobreseída provisionalmente
  respecto de su actuación por auto de la Sala de lo Penal del 29 de
  julio de 2025, en el que la Sala estimó insuficientes los indicios
  de su intervención en la filtración. Tras el sobreseimiento fue
  promovida a una plaza de Fiscal del Tribunal Supremo en la Sala de
  lo Social. Rige el principio de presunción de inocencia respecto
  de la imputación inicial, que decayó con el sobreseimiento.
