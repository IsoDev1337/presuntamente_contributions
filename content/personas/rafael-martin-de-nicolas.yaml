biografia_corta: |
  Directivo español del sector de la construcción. Ocupó la
  condición de consejero ejecutivo del grupo OHL (Obrascón Huarte
  Lain, hoy OHLA) y dirigió la División de Construcción Nacional
  de la compañía. Figura como procesado en la pieza separada
  nº 3 del caso Lezo por auto de apertura del juicio oral del 4
  de junio de 2021 del titular del Juzgado Central de
  Instrucción nº 6 de la Audiencia Nacional Manuel María
  García-Castellón García-Lomas, en relación con la presunta
  adjudicación irregular en 2007 por el Consorcio Regional de
  Transportes de Madrid de las obras del tren ligero Móstoles
  Central-Navalcarnero a la unión temporal de empresas liderada
  por OHL. La Fiscalía Anticorrupción solicita para él seis años
  y medio de prisión por presuntos delitos de tráfico de
  influencias, cohecho, falsedad en documento mercantil y fraude
  a las administraciones públicas. Según el escrito de
  acusación, presuntamente ideó junto con el consejero Francisco
  Javier López Madrid el plan para asegurar la adjudicación y
  ordenó a la dirección de Control de Gestión de la compañía la
  emisión de facturas presuntamente falsas. Le es de aplicación
  el principio de presunción de inocencia mientras no recaiga
  resolución firme.
