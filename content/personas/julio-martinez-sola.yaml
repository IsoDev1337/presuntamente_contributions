biografia_corta: |
  Empresario español, fundador, presidente y dueño de la aerolínea Plus
  Ultra Líneas Aéreas, sociedad constituida en 2011. Es figura pública
  por su condición de presidente de la compañía beneficiaria del
  préstamo de 53 millones de euros concedido por la SEPI en marzo de
  2021. Detenido por la UDEF el 11 de diciembre de 2025 en la sede de
  Plus Ultra y posteriormente puesto en libertad con medidas cautelares.
