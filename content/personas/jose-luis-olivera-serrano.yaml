biografia_corta: |
  José Luis Olivera Serrano es un alto cargo policial español que se
  desempeñó como jefe de la Unidad de Delincuencia Económica y Fiscal
  (UDEF) de la Dirección General de la Policía y, posteriormente, como
  director del Centro de Inteligencia contra el Terrorismo y el
  Crimen Organizado (CITCO) del Ministerio del Interior. Por auto del
  Juzgado Central de Instrucción nº 6 de la Audiencia Nacional fue
  investigado y, por auto del mismo órgano del 29 de julio de 2021,
  procesado en la pieza separada nº 7 de las Diligencias Previas
  96/2017 (Operación Kitchen). La Fiscalía Especial contra la
  Corrupción y la Criminalidad Organizada, en su escrito de
  acusación, retiró la imputación al no apreciar indicios suficientes;
  las acusaciones populares y particulares personadas en la causa
  mantienen reproches penales. Rige el principio de presunción de
  inocencia mientras no recaiga sentencia firme en contrario.
