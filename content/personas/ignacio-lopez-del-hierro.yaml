biografia_corta: |
  Ignacio López del Hierro Bravo es un empresario y consultor español,
  esposo de María Dolores de Cospedal García, secretaria general del
  Partido Popular entre 2008 y 2018 y ministra de Defensa del Reino
  de España entre 2016 y 2018. Por auto del magistrado instructor del
  Juzgado Central de Instrucción nº 6 de la Audiencia Nacional fue
  investigado en la pieza separada nº 7 de las Diligencias Previas
  96/2017 (Operación Kitchen). Por auto del mismo órgano del 29 de
  julio de 2021 se acordó el sobreseimiento provisional respecto de
  él, confirmado por auto del 7 de diciembre de 2022, decisión que
  devino firme en la fase de instrucción por auto de la Sección
  Tercera de la Sala de lo Penal de la Audiencia Nacional del 24 de
  febrero de 2023, que desestimó los recursos de apelación de la
  Fiscalía Anticorrupción, de Unidas Podemos y del Partido Socialista
  Obrero Español en su condición de acusaciones populares. La
  condición de desimputado no implica pronunciamiento sobre el fondo;
  rige el principio de presunción de inocencia.
