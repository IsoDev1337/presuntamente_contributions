biografia_corta: |
  Marcelino Martín-Blas Aritio es un comisario español del Cuerpo
  Nacional de Policía que se desempeñó como jefe de la Unidad de
  Asuntos Internos (UAI) de la Dirección General de la Policía durante
  el mandato del ministro del Interior Jorge Fernández Díaz y la
  primera fase del dispositivo policial conocido mediáticamente como
  Operación Kitchen. Por auto del Juzgado Central de Instrucción nº 6
  de la Audiencia Nacional fue investigado y, por auto del mismo
  órgano del 29 de julio de 2021, procesado en la pieza separada nº
  7 de las Diligencias Previas 96/2017. La Fiscalía Especial contra
  la Corrupción y la Criminalidad Organizada solicita en su escrito
  de acusación una pena de dos años y seis meses de prisión. Rige el
  principio de presunción de inocencia mientras no recaiga sentencia
  firme en contrario.
