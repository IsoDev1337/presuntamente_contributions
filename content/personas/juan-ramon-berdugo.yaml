biografia_corta: |
  Juan Ramón Berdugo Gómez de la Torre es magistrado español,
  nacido en 1959, licenciado en Derecho por la Universidad de
  Valladolid. Carrera judicial desde 1979, magistrado desde 1983.
  Integrante de la Sala Segunda (de lo Penal) del Tribunal Supremo
  desde 2004. Integra el tribunal de siete magistrados que enjuicia
  la Causa Especial nº 20557/2024 contra el entonces Fiscal General
  del Estado Álvaro García Ortiz, votando con la mayoría
  condenatoria.
