biografia_corta: |
  Enrique García Castaño es un comisario español del Cuerpo Nacional
  de Policía que se desempeñó como jefe de la Unidad Central de Apoyo
  Operativo (UCAO) de la Dirección General de la Policía. Por auto
  del Juzgado Central de Instrucción nº 6 de la Audiencia Nacional
  fue investigado y, por auto del mismo órgano del 29 de julio de
  2021, procesado en la pieza separada nº 7 de las Diligencias
  Previas 96/2017 (Operación Kitchen). En 2022 sufrió un ictus que
  derivó en incapacidad mental sobrevenida apreciada en la fase de
  enjuiciamiento, por lo que la Sección Cuarta de la Sala de lo Penal
  de la Audiencia Nacional acordó no incluirlo en el banquillo del
  juicio oral iniciado el 6 de abril de 2026. Rige el principio de
  presunción de inocencia mientras no recaiga sentencia firme en
  contrario.
