  Francisca María Ramis Rosselló es una magistrada española de la
  Carrera Judicial, integrante de la Sección Cuarta de la Sala de lo
  Penal de la Audiencia Nacional y miembro del tribunal de
  enjuiciamiento de la pieza separada nº 7 de las Diligencias
  Previas 96/2017 (Operación Kitchen), cuyo juicio oral se inició el
  6 de abril de 2026.
