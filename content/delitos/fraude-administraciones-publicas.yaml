id: fraude-administraciones-publicas
nombre_tipico: "Fraude a las administraciones públicas"
articulos_cp:
  - "art. 436 CP"
familia: contra_administracion_publica
descripcion_breve: |
  Tipo penal que sanciona a la autoridad o funcionario público que,
  interviniendo por razón de su cargo en cualesquiera de los actos
  de las modalidades de contratación pública o en liquidaciones de
  efectos o haberes públicos, se concertare con los interesados o
  usare cualquier otro artificio para defraudar a cualquier ente
  público. La pena puede extenderse a los particulares que se
  concierten con el funcionario para los mismos fines, conforme a la
  doctrina jurisprudencial sobre comunicabilidad de elementos
  típicos en los delitos de funcionario (extraneus).
enlace_boe: "https://www.boe.es/buscar/act.php?id=BOE-A-1995-25444"
