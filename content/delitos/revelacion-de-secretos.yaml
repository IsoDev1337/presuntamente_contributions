id: revelacion-de-secretos
nombre_tipico: "Revelación de secretos por funcionario público"
articulos_cp:
  - "art. 417 CP"
  - "art. 417.1 CP"
familia: contra_administracion_publica
descripcion_breve: |
  Tipo penal que sanciona a la autoridad o funcionario público que
  revelare secretos o informaciones de los que tenga conocimiento por
  razón de su oficio o cargo y que no debieran ser divulgados. El
  apartado 1 del artículo 417 castiga la conducta básica con pena de
  multa y suspensión o inhabilitación especial. Si de la revelación
  resultare grave daño para la causa pública o para terceros, la pena
  es de prisión.
enlace_boe: "https://www.boe.es/buscar/act.php?id=BOE-A-1995-25444&tn=1&p=20240419#a417"
