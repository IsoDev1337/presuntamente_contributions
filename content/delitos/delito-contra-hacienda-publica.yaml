id: delito-contra-hacienda-publica
nombre_tipico: "Delito contra la Hacienda Pública"
articulos_cp:
  - "art. 305 CP"
  - "art. 305 bis CP"
familia: contra_patrimonio_y_orden_socioeconomico
descripcion_breve: |
  El Código Penal sanciona a quien, por acción u omisión, defrauda a la
  Hacienda Pública estatal, autonómica, foral o local, eludiendo el pago
  de tributos, cantidades retenidas o que se hubieran debido retener o
  ingresos a cuenta, obteniendo indebidamente devoluciones o disfrutando
  beneficios fiscales de la misma forma, siempre que la cuantía de la
  cuota defraudada, el importe no ingresado de las retenciones o
  ingresos a cuenta o de las devoluciones o beneficios fiscales
  indebidamente obtenidos o disfrutados exceda de 120.000 euros. El
  artículo 305 bis tipifica como subtipo agravado, con pena de dos a
  seis años de prisión, los supuestos en que la cuantía defraudada
  exceda de 600.000 euros, se cometa en el seno de una organización o
  grupo criminal, o se utilicen personas, negocios o instrumentos
  fiduciarios que oculten la identidad del responsable.
enlace_boe: "https://www.boe.es/buscar/act.php?id=BOE-A-1995-25444"
