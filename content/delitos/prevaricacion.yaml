id: prevaricacion
nombre_tipico: "Prevaricación administrativa"
articulos_cp:
  - "art. 404 CP"
familia: contra_administracion_publica
descripcion_breve: |
  Tipo penal que sanciona a la autoridad o funcionario público que, a
  sabiendas de su injusticia, dictare una resolución arbitraria en un
  asunto administrativo. La pena prevista es de inhabilitación especial
  para empleo o cargo público y para el ejercicio del derecho de
  sufragio pasivo por tiempo de nueve a quince años. Cuando la
  prevaricación se comete por juez o magistrado el tipo aplicable es
  el de los artículos 446 y 447 del Código Penal.
enlace_boe: "https://www.boe.es/buscar/act.php?id=BOE-A-1995-25444&tn=1&p=20240419#a404"
