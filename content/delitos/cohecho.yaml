descripcion_breve: |
  Tipo penal que sanciona a la autoridad o funcionario público que, en
  el ejercicio de su cargo, recibe, solicita o acepta dádiva, favor o
  retribución para realizar u omitir un acto contrario a los deberes
  inherentes a su función, así como a quien ofrece, da o promete tal
  dádiva. Las penas oscilan entre prisión, multa e inhabilitación
  especial según la modalidad. Está regulado en los artículos 419 a
  426 del Código Penal en su versión vigente tras la reforma operada
  por la Ley Orgánica 5/2010 y modificaciones sucesivas.
