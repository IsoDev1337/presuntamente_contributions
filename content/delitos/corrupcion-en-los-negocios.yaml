id: corrupcion-en-los-negocios
nombre_tipico: "Corrupción en los negocios"
articulos_cp:
  - "art. 286 bis CP"
  - "art. 286 ter CP"
  - "art. 286 quater CP"
familia: contra_patrimonio_y_orden_socioeconomico
descripcion_breve: |
  El Código Penal castiga, dentro de los delitos contra el patrimonio y
  el orden socioeconómico, las prácticas de corrupción entre
  particulares. Sanciona a quienes, en el ejercicio de una actividad
  económica empresarial, prometan, ofrezcan, concedan, reciban o
  soliciten un beneficio o ventaja no justificados, de cualquier
  naturaleza, para sí o para un tercero, como contraprestación para
  favorecer indebidamente a otro en la adquisición o venta de
  mercancías, o en la contratación de servicios o relaciones
  comerciales.
enlace_boe: "https://www.boe.es/buscar/act.php?id=BOE-A-1995-25444"
