  - documento_id: elindependiente-desimputacion-guemes-goyache-bg-2025-05-16
    pasaje: "La Audiencia excluye los hechos relativos a esa contratación por exceder del objeto de la instrucción, al no existir indicios de que su vinculación con IE estuviera relacionada con su condición de esposa del presidente del Gobierno."
  - documento_id: infobae-apertura-diligencias-bg-2024-04-24
    pasaje: "La denuncia de Manos Limpias hace referencia al contrato de 2018 entre IE Business School y la empresa Quirón Prevención para la contratación de Begoña Gómez como directora del Africa Center."
notas: "La posición en el Africa Center del IE Business School figura en la denunciacia de Manos Limpias como antecedente del posterior vínculo con la Cátedra UCM. La Audiencia Provincial de Madrid, por auto de 13 de mayo de 2025, excluyó los hechos relativos a este contrato del objeto de la instrucción. La fecha de inicio (2018) es la que consta en la causa; el año exacto de cese se estima en 2022 con precisión anual."
