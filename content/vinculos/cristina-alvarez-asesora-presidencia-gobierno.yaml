    pasaje: "Cristina Álvarez, asesora de Begoña Gómez en el Complejo de la Moncloa, es procesada por presunta malversación al haberse utilizado indiciariamente medios públicos vinculados a su puesto de asesora para tareas de la actividad privada de Gómez."
notas: "El cargo de asesora en el Gabinete de la Presidencia del Gobierno es la pieza central del delito de malversación atribuido a Cristina Álvarez: el instructor considera indiciariamente que empleó medios públicos adscritos a ese cargo para actividades vinculadas a la Cátedra UCM de Begoña Gómez. Sin BOE de nombramiento nominal localizado (el personal eventual de Gabinete no siempre se publica nominalmente en BOE). La UCO certifica la fecha de incorporación como 2018-07-16 y el nivel 26 en el Gabinete de la Presidencia (fuente: informe UCO referenciado en Libertad Digital 2025-10-01)."
