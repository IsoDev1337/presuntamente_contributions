notas: "La afiliación de Güemes al PP es relevante para el caso porque aporta el contexto de un directivo académico con pasado político opuesto al partido del gobierno que designó a Begoña Gómez como codirectora de la cátedra UCM, lo que ilustra que la causa no se circunscribe a un único entorno político. La militancia se documenta por cobertura N4 cruzada (Newtral + El Independiente) que lo identifica como 'exconsejero de Esperanza Aguirre (PP)'. La fecha `hasta` corresponde al cese en la Consejería de Sanidad CM; se desconoce si continúa afiliado al partido tras su etapa académica."
