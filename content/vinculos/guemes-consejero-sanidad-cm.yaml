  - documento_id: elindependiente-desimputacion-guemes-goyache-bg-2025-05-16
    pasaje: "Varapalo al juez Peinado: desimputa al rector de la Complutense y a Güemes, exconsejero de la Comunidad de Madrid."
notas: "El cargo de consejero de la CM bajo Aguirre es relevante para el caso en tanto que Güemes proviene de una trayectoria pública ligada al PP, lo que aporta el contexto institucional de una persona que luego ostentó un cargo directivo en IE Business School (institución que contrató a Begoña Gómez en 2018 como directora del Africa Center). La AP Madrid desimputó a Güemes en mayo de 2025 al considerar que la contratación de Gómez por el IE excedía del objeto de la instrucción."
