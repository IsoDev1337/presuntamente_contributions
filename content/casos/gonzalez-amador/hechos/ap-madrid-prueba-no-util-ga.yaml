id: ga-ap-madrid-prueba-no-util
caso_id: gonzalez-amador
enunciado: |
  Por auto del 7 de noviembre de 2025, la Sección Tercera de la
  Audiencia Provincial de Madrid considera que las diligencias de
  prueba propuestas por la defensa de Alberto González Amador y de
  Maxwell Cremona Ingeniería y Procesos S.L. "no resultan
  estrictamente necesarias ni útiles para esclarecer los hechos", y
  desestima por ello el recurso de apelación frente al auto del
  Juzgado de Instrucción nº 19 de Madrid del 29 de mayo de 2025,
  manteniendo el procesamiento y la apertura del juicio oral.
