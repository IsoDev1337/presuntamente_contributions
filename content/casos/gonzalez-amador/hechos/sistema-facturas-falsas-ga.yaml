id: ga-sistema-facturas-falsas
caso_id: gonzalez-amador
enunciado: |
  Conforme al instructor, indiciariamente entre los ejercicios 2020 y
  2021 la mercantil Maxwell Cremona Ingeniería y Procesos S.L., de la
  que Alberto González Amador es administrador único, habría deducido
  en su Impuesto sobre Sociedades gastos amparados en facturas
  emitidas por personas vinculadas a la sociedad que "no se
  correspondían con los servicios efectivamente prestados". El sistema
  habría reducido indebidamente su tributación. Maximiliano Eduardo
  Niederer González habría intervenido como "cooperador necesario" en
  la emisión de las facturas de mayor importe; David Herrera Lobato y
  los hermanos Agustín y José Miguel Carrillo Saborido habrían
  participado de la emisión de facturas adicionales. Rige el
  principio de presunción de inocencia.
