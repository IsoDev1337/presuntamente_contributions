id: ga-cuantificacion-perjuicio-aeat
caso_id: gonzalez-amador
enunciado: |
  Conforme al expediente de inspección remitido por la AEAT a la
  Fiscalía Provincial de Madrid el 22 de enero de 2024, el perjuicio
  cuantificado a la Hacienda Pública por la tributación irregular de
  Maxwell Cremona Ingeniería y Procesos S.L. en los ejercicios 2020 y
  2021 del Impuesto sobre Sociedades asciende a 350.951 euros. El
  auto del Juzgado de Instrucción nº 19 de Madrid del 29 de mayo de
  2025 toma esta cifra como base de la cuantificación del presunto
  delito contra la Hacienda Pública.
