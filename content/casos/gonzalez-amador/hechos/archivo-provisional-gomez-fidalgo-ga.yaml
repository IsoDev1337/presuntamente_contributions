id: ga-archivo-provisional-gomez-fidalgo
caso_id: gonzalez-amador
enunciado: |
  Por auto del Juzgado de Instrucción nº 19 de Madrid del 29 de mayo
  de 2025 la magistrada Inmaculada Iglesias acuerda el sobreseimiento
  provisional de la causa respecto al abogado fiscalista Javier Luis
  Gómez Fidalgo, citado como investigado en abril de 2025, por
  considerar que no concurren indicios suficientes de su participación
  material en el sistema indiciario de facturas ficticias. El
  sobreseimiento es provisional y susceptible de reapertura si
  aparecieran nuevos elementos. Rige plenamente respecto a Gómez
  Fidalgo el principio de presunción de inocencia.
