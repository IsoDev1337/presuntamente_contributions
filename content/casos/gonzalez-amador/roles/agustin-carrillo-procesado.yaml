notas: |
  Por auto del Juzgado de Instrucción nº 19 de Madrid del 29 de mayo
  de 2025 Agustín Carrillo Saborido queda procesado por su presunta
  participación en la emisión de facturas ficticias por importes
  superiores a 41.000 euros utilizadas por Maxwell Cremona
  Ingeniería y Procesos S.L. para minorar su tributación. Rige el
  principio de presunción de inocencia mientras no recaiga
  resolución firme.
