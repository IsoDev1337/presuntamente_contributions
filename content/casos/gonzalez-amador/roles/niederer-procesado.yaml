notas: |
  Por auto del Juzgado de Instrucción nº 19 de Madrid del 29 de mayo
  de 2025 Maximiliano Eduardo Niederer González queda procesado por
  su presunta participación como cooperador necesario en la emisión
  de facturas que no se corresponderían con servicios efectivamente
  prestados, utilizadas por Maxwell Cremona Ingeniería y Procesos
  S.L. para minorar su tributación. La condición de procesado no
  implica valoración de culpabilidad: rige el principio de presunción
  de inocencia mientras no recaiga resolución firme.
