notas: |
  Julián Salto Torres, fiscal de la Sección de Delitos Económicos de
  la Fiscalía Provincial de Madrid, asume la dirección de la acción
  penal en el procedimiento tras la remisión por la AEAT del
  expediente de inspección de Maxwell Cremona el 22 de enero de
  2024. La Fiscalía y la Abogacía del Estado han mantenido a lo
  largo de la instrucción la calificación indiciaria de dos delitos
  contra la Hacienda Pública en concurso medial con falsedad en
  documento mercantil, con petición de 3 años y 9 meses de prisión.
