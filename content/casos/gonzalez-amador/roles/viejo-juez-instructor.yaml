notas: |
  El magistrado Antonio Viejo asume la titularidad del Juzgado de
  Instrucción nº 19 de Madrid en octubre de 2025 por designación de
  la Comisión Permanente del Consejo General del Poder Judicial,
  hereda la instrucción del procedimiento y, conforme a la cobertura
  periodística disponible, mantiene la fase intermedia abierta a la
  espera del señalamiento de juicio oral. Este rol queda abierto.
