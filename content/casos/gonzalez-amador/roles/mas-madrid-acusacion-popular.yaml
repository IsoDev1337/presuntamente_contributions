fecha_inicio: "2024-04-16"
notas: |
  Más Madrid se personó como acusación popular en el procedimiento
  seguido ante el Juzgado de Instrucción nº 19 de Madrid. Según
  cobertura del live-blog de elDiario.es del 16 de abril de 2024,
  la jueza de instrucción Inmaculada Iglesias aceptó la personación
  de Más Madrid en torno a esa fecha. En su escrito de acusación,
  conjuntamente con el PSOE, solicita 5 años de prisión y multa
  por presuntos delitos contra la Hacienda Pública en concurso
  medial con falsedad en documento mercantil, delito contable
  continuado y pertenencia a grupo criminal.

  `fecha_inicio` se modela como `2024-04-16` por aproximación
  basada en la fecha del artículo de elDiario.es; el auto exacto
  del JI nº 19 que admite la personación de Más Madrid como
  acusación popular no se ha localizado en fuente oficial. Los
  autos de instrucción de los Juzgados ordinarios no se publican
  en CENDOJ ni hay nota CGPJ de este tipo de resolución procesal.
  `hito_origen_id` se mantiene vacío hasta localizar el auto: la
  denuncia AEAT del 22-ene-2024 no es el hito de admisión de la
  personación, era un hito incorrecto al que apuntaba la versión
  anterior del rol.
