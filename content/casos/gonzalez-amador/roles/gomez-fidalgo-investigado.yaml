notas: |
  Por auto del Juzgado de Instrucción nº 19 de Madrid del 14 de abril
  de 2025 la magistrada Inmaculada Iglesias cita a Javier Luis Gómez
  Fidalgo como investigado por su presunta participación como
  cooperador necesario en la elaboración de las autoliquidaciones
  impugnadas. El rol queda cerrado por el sobreseimiento provisional
  acordado en el auto del 29 de mayo de 2025.
