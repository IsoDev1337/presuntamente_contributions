notas: |
  La Agencia Estatal de Administración Tributaria remitió a la
  Sección de Delitos Económicos de la Fiscalía Provincial de Madrid el
  22 de enero de 2024 el expediente de inspección de Maxwell Cremona
  Ingeniería y Procesos S.L. correspondiente a los ejercicios 2020 y
  2021 del Impuesto sobre Sociedades, apreciando indicios de la
  comisión de dos delitos contra la Hacienda Pública y uno
  continuado de falsedad en documento mercantil. Cuantifica el
  perjuicio en 350.951 euros. El rol queda abierto: la AEAT continúa
  como parte denunciante en el procedimiento.
