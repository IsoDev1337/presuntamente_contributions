notas: |
  Carlos Neira Crespo dirige la defensa letrada de Alberto González
  Amador en el procedimiento seguido ante el Juzgado de Instrucción
  nº 19 de Madrid por presunto fraude fiscal y falsedad documental
  desde la apertura de la causa a partir de la denuncia de la AEAT
  a la Fiscalía Provincial de Madrid del 22 de enero de 2024. Fue
  autor material del correo electrónico del 2 de febrero de 2024
  proponiendo a la Fiscalía un acuerdo de conformidad, correo cuya
  filtración a un medio de comunicación motivó la apertura de la
  causa autónoma ante el Tribunal Supremo contra el entonces Fiscal
  General del Estado (caso Fiscal General del Estado, conectado a
  este por relación factual derivada). Como letrado de la defensa
  ha firmado los escritos del 19 de febrero de 2026 invocando la
  sentencia firme contra el Fiscal General como vulneración del
  derecho a un proceso justo en el procedimiento principal.
