notas: |
  Por auto del Juzgado de Instrucción nº 19 de Madrid del 29 de mayo
  de 2025 la magistrada Inmaculada Iglesias acuerda el sobreseimiento
  provisional de la causa respecto a Javier Luis Gómez Fidalgo al no
  apreciar indicios suficientes de su participación material en los
  hechos. Rige el principio de presunción de inocencia; la causa
  continúa respecto de los cinco procesados principales pero no
  respecto al asesor fiscal. Este rol queda abierto como condición
  procesal vigente en relación con este procedimiento.
