notas: |
  El Partido Socialista Obrero Español se personó como acusación
  popular en el procedimiento seguido ante el Juzgado de Instrucción
  nº 19 de Madrid. En su escrito de acusación —tras la apertura del
  juicio oral del 22 de septiembre de 2025— solicita 5 años de
  prisión y multa por presuntos delitos contra la Hacienda Pública
  en concurso medial con falsedad en documento mercantil, delito
  contable continuado y pertenencia a grupo criminal. La fecha de
  inicio aquí es aproximada (mes / año estimado); el auto exacto de
  admisión del PSOE como acusación popular queda pendiente de
  localizar para PR posterior.
