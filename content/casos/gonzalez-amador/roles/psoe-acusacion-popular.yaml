id: psoe-acusacion-popular-ga-2024
caso_id: gonzalez-amador
sujeto_tipo: organizacion
sujeto_organizacion_id: psoe
rol: acusacion_popular
fecha_inicio: "2024-04-01"
notas: |
  El Partido Socialista Obrero Español se personó como acusación
  popular en el procedimiento seguido ante el Juzgado de Instrucción
  nº 19 de Madrid en torno al 1 de abril de 2024 según cobertura
  cruzada de El Español (1-abr-2024), El Debate (1-abr-2024) y The
  Objective (1-abr-2024). En su escrito de acusación —tras la
  apertura del juicio oral del 22 de septiembre de 2025— solicita 5
  años de prisión y multa por presuntos delitos contra la Hacienda
  Pública en concurso medial con falsedad en documento mercantil,
  delito contable continuado y pertenencia a grupo criminal.

  `fecha_inicio` se modela como `2024-04-01` por aproximación basada
  en la cobertura periodística citada; el auto exacto del JI nº 19
  que admite la personación del PSOE como acusación popular no se
  ha localizado en fuente oficial (los autos de instrucción de los
  Juzgados ordinarios no se publican en CENDOJ ni hay nota CGPJ de
  este tipo de resolución procesal). `hito_origen_id` se mantiene
  vacío hasta localizar el auto: la denuncia AEAT del 22-ene-2024
  no es el hito de admisión de la personación, era un hito
  incorrecto al que apuntaba la versión anterior del rol.
