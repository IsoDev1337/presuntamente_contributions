titulo: "El Juzgado de Instrucción nº 19 de Madrid acuerda el sobreseimiento provisional respecto al asesor fiscal Javier Gómez Fidalgo por considerar insuficientes los indicios de su participación"
descripcion: |
  En el mismo auto del 29 de mayo de 2025 por el que se cierra la
  instrucción contra los cinco principales investigados, la magistrada
  Inmaculada Iglesias acuerda el sobreseimiento provisional de la
  causa respecto al abogado fiscalista Javier Luis Gómez Fidalgo al
  considerar que no concurren indicios suficientes de su participación
  material en la elaboración del sistema indiciario de facturas
  ficticias. El sobreseimiento es provisional: en caso de aparecer
  elementos nuevos podría reabrirse. Rige el principio de presunción
  de inocencia.
