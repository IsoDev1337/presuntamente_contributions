titulo: "La Sección Tercera de la Audiencia Provincial de Madrid desestima el recurso de apelación de las defensas y ratifica el procesamiento y la apertura del juicio oral"
descripcion: |
  Por auto del 7 de noviembre de 2025 la Sección Tercera de la
  Audiencia Provincial de Madrid desestima el recurso de apelación
  interpuesto por la defensa de Alberto González Amador y de la
  mercantil Maxwell Cremona Ingeniería y Procesos S.L. contra el auto
  del Juzgado de Instrucción nº 19 de Madrid del 29 de mayo de 2025.
  La Sala considera que las diligencias de prueba pedidas por la
  defensa "no resultan estrictamente necesarias ni útiles para
  esclarecer los hechos" y ratifica tanto el procesamiento como la
  apertura del juicio oral acordada el 22 de septiembre de 2025.
  Conforme al principio de presunción de inocencia, la confirmación
  del procesamiento no implica valoración de culpabilidad y persiste
  mientras no recaiga resolución firme en contrario.
