titulo: "El Juzgado de Instrucción nº 19 de Madrid cierra la instrucción y propone el enjuiciamiento de González Amador y otros cuatro investigados por dos delitos contra la Hacienda Pública en concurso medial con falsedad en documento mercantil"
descripcion: |
  La magistrada Inmaculada Iglesias, titular del Juzgado de
  Instrucción nº 19 de Madrid, dicta auto del 29 de mayo de 2025 por
  el que da por concluida la instrucción y propone el enjuiciamiento
  de Alberto González Amador, Maximiliano Eduardo Niederer González,
  David Herrera Lobato, Agustín Carrillo Saborido y José Miguel
  Carrillo Saborido por dos presuntos delitos contra la Hacienda
  Pública (Impuesto sobre Sociedades de los ejercicios 2020 y 2021 de
  Maxwell Cremona Ingeniería y Procesos S.L.) en concurso medial con
  un delito continuado de falsedad en documento mercantil. Conforme
  al instructor, los hechos indiciariamente acreditados consisten en
  un sistema de facturas emitidas por personas vinculadas a la
  mercantil "que no se correspondían con los servicios efectivamente
  prestados", a través del cual Maxwell Cremona habría deducido
  gastos ficticios minorando indebidamente su tributación. Conforme
  al principio de presunción de inocencia, la condición de procesados
  no implica valoración de culpabilidad y persiste mientras no recaiga
  resolución firme en contrario.
