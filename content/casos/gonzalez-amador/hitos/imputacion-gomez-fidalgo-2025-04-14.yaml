titulo: "El Juzgado de Instrucción nº 19 de Madrid cita como investigado al asesor fiscal de González Amador, Javier Gómez Fidalgo"
descripcion: |
  La magistrada Inmaculada Iglesias, titular del Juzgado de
  Instrucción nº 19 de Madrid, acuerda el 14 de abril de 2025 citar
  como investigado al abogado fiscalista Javier Luis Gómez Fidalgo
  por su presunta participación como cooperador necesario en la
  elaboración de las autoliquidaciones del Impuesto sobre Sociedades
  de Maxwell Cremona Ingeniería y Procesos S.L. correspondientes a
  los ejercicios 2020 y 2021. Conforme al instructor, Gómez Fidalgo
  habría tenido un papel determinante en la preparación de las
  declaraciones tributarias en cuya regularización la AEAT cuantificó
  el perjuicio a la Hacienda Pública en 350.951 euros. Rige el
  principio de presunción de inocencia.
