titulo: "El Juzgado de Instrucción nº 19 de Madrid acuerda la apertura del juicio oral contra Alberto González Amador y otros cuatro procesados"
descripcion: |
  Por auto del 22 de septiembre de 2025 la magistrada Inmaculada
  Iglesias, titular del Juzgado de Instrucción nº 19 de Madrid,
  acuerda la apertura del juicio oral contra Alberto González Amador,
  Maximiliano Eduardo Niederer González, David Herrera Lobato, Agustín
  Carrillo Saborido y José Miguel Carrillo Saborido por dos presuntos
  delitos contra la Hacienda Pública en concurso medial con un delito
  continuado de falsedad en documento mercantil. La Fiscalía
  Provincial de Madrid y la Abogacía del Estado solicitan 3 años y 9
  meses de prisión y multa superior a 600.000 euros; las acusaciones
  populares del PSOE y Más Madrid elevan la petición a 5 años de
  prisión y multa añadiendo delito contable continuado y pertenencia
  a grupo criminal. Conforme al principio de presunción de inocencia,
  la apertura del juicio oral no implica valoración alguna de
  culpabilidad.
