titulo: "Álvaro García Ortiz presenta su dimisión como Fiscal General del Estado cuatro días después de la lectura del fallo condenatorio del Tribunal Supremo"
descripcion: |
  Cuatro días después de la lectura del fallo condenatorio del 20 de
  noviembre de 2025, Álvaro García Ortiz presenta el 24 de noviembre
  de 2025 su renuncia al cargo de Fiscal General del Estado. La
  renuncia se formaliza como salida "a petición propia", a la espera
  de la tramitación del Real Decreto de cese y del nombramiento de
  sucesor.
