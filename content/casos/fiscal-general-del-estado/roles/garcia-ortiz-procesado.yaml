notas: |
  Por auto del magistrado instructor del 9 de junio de 2025 se
  transforma el procedimiento a abreviado y se procesa a Álvaro
  García Ortiz por presunto delito de revelación de secretos. La
  Sala de Apelaciones del Tribunal Supremo confirma el procesamiento
  por auto del 29 de julio de 2025 al desestimar el recurso de
  apelación del entonces Fiscal General. La condición de procesado
  no implica valoración de culpabilidad: rige el principio de
  presunción de inocencia. El rol se cierra el 20 de noviembre de
  2025 con la lectura del fallo condenatorio que abre el rol
  consecutivo de condenado no firme.
