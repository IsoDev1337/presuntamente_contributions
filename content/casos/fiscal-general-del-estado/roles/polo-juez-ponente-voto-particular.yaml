notas: |
  Magistrada de la Sala Segunda (de lo Penal) del Tribunal Supremo
  integrante del tribunal de siete magistrados que enjuicia la
  Causa Especial nº 20557/2024. Formula, junto a la magistrada Ana
  María Ferrer García, voto particular conjunto disidente a la
  Sentencia 1000/2025, defendiendo que la nota informativa
  publicada por la Fiscalía el 14 de marzo de 2024 "solo contenía
  consideraciones neutrales, exactas, y veraces, y se le dio
  publicidad en un contexto de interés general" y proponiendo "la
  libre absolución del Fiscal General del Estado del delito por el
  que se le condena" (voto particular, conclusión V, p. 237). Se
  modela como `juez_ponente` por ser autora-ponente del voto
  particular, en coherencia con el modelo: el voto particular es
  un texto firmado y argumentado del que ella es responsable
  directa, paralelo al fallo mayoritario.
