notas: |
  Por Sentencia 1000/2025 de la Sala Segunda del Tribunal Supremo de
  9 de diciembre de 2025, leído el fallo el 20 de noviembre de 2025,
  Álvaro García Ortiz queda condenado como autor responsable de un
  delito de revelación de datos reservados del artículo 417.1 del
  Código Penal a multa de doce meses con cuota diaria de veinte
  euros, inhabilitación especial para el cargo de Fiscal General
  del Estado por dos años e indemnización al perjudicado de diez
  mil euros, por mayoría de cinco votos frente a dos, con voto
  particular disidente de las magistradas Ana María Ferrer García y
  Susana Polo García. La presunción de inocencia formal subsiste
  hasta la firmeza, pendiente de la resolución de los incidentes de
  nulidad de actuaciones planteados por la defensa y por el
  Ministerio Fiscal. El rol se cierra el 26 de febrero de 2026 con
  la desestimación de los incidentes de nulidad.
