notas: |
  Alberto González Amador comparece como acusación particular en
  la Causa Especial nº 20557/2024 tras la presentación, el 3 de
  abril de 2024, de querella por presunto delito de revelación de
  secretos contra los responsables del Ministerio Fiscal por la
  filtración del correo electrónico del 2 de febrero de 2024 de su
  letrado Carlos Neira. La querella, admitida inicialmente por el
  Tribunal Superior de Justicia de Madrid (auto del 7 de mayo de
  2024) y luego elevada al Tribunal Supremo por exposición razonada
  del 15 de julio de 2024 al recaer la condición de aforado en el
  Fiscal General del Estado, sostiene la acción penal y la civil.
  La Sentencia 1000/2025, firme desde el 26 de febrero de 2026,
  reconoce su condición de perjudicado e impone al condenado el
  pago de las costas procesales incluyendo las de la acusación
  particular y de diez mil euros de indemnización por daños
  morales. Al ser González Amador simultáneamente investigado en
  otro procedimiento penal autónomo (caso González Amador, ante el
  Juzgado de Instrucción nº 19 de Madrid), su condición de
  acusación particular en el caso FGE no se ve afectada por aquel
  otro procedimiento, que se sustancia sobre delitos distintos y
  con presunción de inocencia plenamente vigente.
