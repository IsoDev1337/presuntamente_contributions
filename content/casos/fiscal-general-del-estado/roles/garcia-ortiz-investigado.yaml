notas: |
  Por acuerdo de la Sala Segunda del Tribunal Supremo del 15 de
  octubre de 2024 se abre causa especial contra Álvaro García Ortiz
  por presunto delito de revelación de secretos del artículo 417 del
  Código Penal y se designa instructor al magistrado Ángel Luis
  Hurtado. La condición de investigado no implica valoración de
  culpabilidad: rige el principio de presunción de inocencia. El rol
  se cierra el 9 de junio de 2025 con el auto de procedimiento
  abreviado dictado por el instructor, que abre el rol consecutivo
  de procesado.
