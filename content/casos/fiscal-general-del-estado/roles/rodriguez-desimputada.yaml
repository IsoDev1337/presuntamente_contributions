notas: |
  Por auto de la Sala de Apelaciones del Tribunal Supremo del 29 de
  julio de 2025, se acuerda el sobreseimiento provisional de la
  causa respecto de Pilar Rodríguez Fernández por estimar
  insuficientes los indicios de su intervención en la filtración
  del correo electrónico del 2 de febrero de 2024. La desimputación
  reabsorbe plenamente la presunción de inocencia. Tras esta
  resolución y la jubilación del cargo de Fiscal Jefa Provincial de
  Madrid, Rodríguez Fernández fue promovida posteriormente a una
  plaza de Fiscal del Tribunal Supremo en la Sala de lo Social.
