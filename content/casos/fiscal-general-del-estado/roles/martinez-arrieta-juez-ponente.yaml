notas: |
  Presidente de la Sala Segunda (de lo Penal) del Tribunal Supremo,
  integra el tribunal de siete magistrados que enjuicia la Causa
  Especial nº 20557/2024 y asume la ponencia final de la Sentencia
  1000/2025 tras un cambio de ponencia motivado por la presentación
  de votos particulares disidentes durante la deliberación. La
  sentencia, dictada por mayoría de cinco votos frente a dos, lleva
  fecha de 9 de diciembre de 2025 y fue notificada a las partes en
  esa misma fecha. La fecha de inicio del rol se aproxima a la
  designación formal del tribunal de enjuiciamiento (25 de
  septiembre de 2025).
