notas: |
  El Sindicato Colectivo de Funcionarios Manos Limpias ejerce la
  acusación popular en la Causa Especial nº 20557/2024 en virtud del
  artículo 125 de la Constitución y de los artículos 101 y 270 de la
  Ley de Enjuiciamiento Criminal. Manos Limpias presentó dos
  querellas autónomas contra el Fiscal General del Estado por los
  mismos hechos (Causa Especial nº 003/21116/2024, instada por
  Miguel Bernad Remón como secretario del sindicato, y Causa
  Especial nº 003/21258/2024, instada por el propio sindicato),
  ambas acumuladas a la causa principal nº 20557/2024 promovida por
  la querella de Alberto González Amador.
