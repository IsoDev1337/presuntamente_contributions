notas: |
  El fiscal Julián Salto Torres es querellado por Alberto González
  Amador, junto con la entonces Fiscal Jefa Provincial Pilar Rodríguez
  Fernández, ante la Sala Civil y Penal del Tribunal Superior de
  Justicia de Madrid por presunto delito de revelación de secretos
  (art. 417 CP) en relación con la divulgación del correo electrónico
  remitido el 2 de febrero de 2024 por el letrado Carlos Neira
  proponiendo un acuerdo de conformidad penal. La querella se admite
  a trámite el 7 de mayo de 2024 designando instructor al magistrado
  Francisco José Goyena Salgado.

  El rol se cierra el 15 de octubre de 2024 cuando la Sala Segunda
  del Tribunal Supremo asume la competencia por razón del aforamiento
  del entonces Fiscal General del Estado y abre causa especial dirigida
  únicamente contra Álvaro García Ortiz y Pilar Rodríguez Fernández;
  Julián Salto Torres queda excluido del objeto de la causa principal
  elevada al TS.

  La condición de investigado no implica valoración de culpabilidad:
  rige el principio de presunción de inocencia.
