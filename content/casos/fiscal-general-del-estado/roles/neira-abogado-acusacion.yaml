notas: |
  Carlos Neira Crespo dirige la representación letrada de la
  acusación particular ejercida por Alberto González Amador en la
  Causa Especial nº 20557/2024 desde la presentación de la querella
  inicial ante el Tribunal Superior de Justicia de Madrid el 3 de
  abril de 2024. Es a la vez el autor material del correo
  electrónico del 2 de febrero de 2024 cuya filtración constituye
  el hecho enjuiciado en la causa. Como letrado de la acusación
  particular sostiene en escritos posteriores a la firmeza de la
  sentencia, entre ellos el del 30 de enero de 2026, la
  consistencia del fallo condenatorio frente a las alegaciones de
  vulneración de derechos planteadas por la defensa del condenado.
