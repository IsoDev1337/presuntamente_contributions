notas: |
  La Asociación Profesional e Independiente de Fiscales ejerce la
  acusación popular en la Causa Especial nº 20557/2024 en virtud
  del artículo 125 de la Constitución y de los artículos 101 y 270
  de la Ley de Enjuiciamiento Criminal. La personación de APIF
  introduce en el procedimiento la voz corporativa de una de las
  asociaciones profesionales representativas de la Carrera Fiscal,
  cuyas posiciones sobre la disciplina interna del Ministerio Fiscal
  son relevantes para la valoración del comportamiento atribuido al
  superior jerárquico.
