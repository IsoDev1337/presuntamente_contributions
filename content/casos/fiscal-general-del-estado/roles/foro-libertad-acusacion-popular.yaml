notas: |
  La Fundación Foro Libertad y Alternativa ejerce la acusación
  popular en la Causa Especial nº 20557/2024 en virtud del artículo
  125 de la Constitución y de los artículos 101 y 270 de la Ley de
  Enjuiciamiento Criminal. La personación se aproxima en fecha a la
  apertura de la causa por la Sala Segunda del Tribunal Supremo en
  octubre de 2024; el auto específico de admisión de la acusación
  popular no se ha localizado con URL canónica a fecha de PR1.
