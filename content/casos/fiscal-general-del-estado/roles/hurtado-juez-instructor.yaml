notas: |
  Designado por acuerdo de la Sala Segunda del Tribunal Supremo del
  15 de octubre de 2024 como magistrado instructor de la Causa
  Especial nº 20557/2024 contra el entonces Fiscal General del
  Estado, Álvaro García Ortiz. Tramita la fase de instrucción entre
  octubre de 2024 y septiembre de 2025, dictando los autos clave del
  9 de junio de 2025 (procedimiento abreviado y procesamiento) y del
  9 de septiembre de 2025 (apertura de juicio oral). Al pasar el
  procedimiento a la fase de juicio oral, el instructor cesa en su
  función y el conocimiento corresponde al tribunal de siete
  magistrados de la propia Sala Segunda.
