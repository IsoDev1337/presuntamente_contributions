notas: |
  El Ilustre Colegio de la Abogacía de Madrid presentó el 20 de
  marzo de 2024 ante el Tribunal Superior de Justicia de Madrid
  denuncia por presunto delito de revelación de secretos en relación
  con la filtración del correo electrónico del 2 de febrero de 2024
  redactado por el letrado colegiado Carlos Neira en el ejercicio
  de su función defensiva. La denuncia, junto con la querella
  posterior de Alberto González Amador, motivó la apertura de la
  causa que el 15 de octubre de 2024 fue asumida por la Sala Segunda
  del Tribunal Supremo por razón del aforamiento del Fiscal General
  del Estado. El ICAM mantuvo su condición de parte en el
  procedimiento.
