notas: |
  Magistrado de la Sala Segunda (de lo Penal) del Tribunal Supremo
  desde 2012. Integrante del tribunal de siete magistrados que
  enjuicia la Causa Especial nº 20557/2024 y firmante de la
  Sentencia 1000/2025 con la mayoría condenatoria (cinco votos
  frente a dos). Se modela como `juez_ponente` por ser firmante
  de la sentencia, con la salvedad editorial de que la ponencia
  formal recayó en Andrés Martínez Arrieta.
