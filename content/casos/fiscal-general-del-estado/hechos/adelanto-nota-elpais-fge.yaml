id: adelanto-nota-elpais-fge
caso_id: fiscal-general-del-estado
enunciado: |
  La Sentencia 1000/2025 declara probado que la nota informativa
  oficial de la Fiscalía Provincial de Madrid sobre el caso
  González Amador, redactada por la directora de comunicación de
  la Fiscalía General del Estado bajo dictado del propio Fiscal
  General y prevista para su difusión a las 10:00 horas del 14 de
  marzo de 2024, fue publicada por el diario EL PAÍS «adelantándose
  tres horas a su difusión oficial» tras haber sido obtenida
  «proporcionada con autorización del Fiscal General del Estado»
  (Hechos Probados, p. 21). La sentencia subraya que esta
  publicación anticipada en un medio concreto, sin que las propias
  fiscalías hubieran difundido aún la nota, integra junto con la
  filtración del correo electrónico del 2 de febrero la unidad de
  acción típica del delito de revelación de datos reservados del
  art. 417.1 del Código Penal por el que el Tribunal Supremo
  condena al acusado (FJ Tercero, apartado 3.1, p. 147: «La nota consolida
  la filtración iniciada por el correo, en realidad la
  «oficializa»»).
tipo: acreditado
