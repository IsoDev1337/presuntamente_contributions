id: indemnizacion-gonzalez-amador-fge
caso_id: fiscal-general-del-estado
enunciado: |
  La Sentencia 1000/2025 condena adicionalmente a Álvaro García
  Ortiz a indemnizar al perjudicado Alberto González Amador en diez
  mil euros por los daños morales causados por la revelación de
  datos reservados. La indemnización se fija en concepto de
  responsabilidad civil derivada del delito, sin que la sentencia
  cuantifique daño patrimonial autónomo. El Tribunal Supremo ordena
  el 17 de diciembre de 2025 la ejecución de la sentencia y remite
  la causa a la Fiscalía a los efectos oportunos, debiendo el
  condenado depositar los importes pecuniarios en la cuenta de
  consignaciones del Tribunal Supremo.
