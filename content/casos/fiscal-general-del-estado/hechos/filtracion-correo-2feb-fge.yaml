id: filtracion-correo-2feb-fge
caso_id: fiscal-general-del-estado
enunciado: |
  La Sentencia 1000/2025 de la Sala Segunda del Tribunal Supremo,
  firme tras la desestimación del incidente de nulidad el 26 de
  febrero de 2026, declara que Álvaro García Ortiz, o persona de su
  entorno con su conocimiento, filtró a un medio de comunicación, en
  la noche del 13 de marzo de 2024, el contenido del correo
  electrónico remitido el 2 de febrero de 2024 por el abogado Carlos
  Neira a la Fiscalía Provincial de Madrid, en el que se proponía a
  la Fiscalía un acuerdo de conformidad reconociendo la existencia
  de dos delitos contra la Hacienda Pública cometidos por Alberto
  González Amador. Conforme al fallo, la conducta es subsumible en
  el delito de revelación de datos reservados del artículo 417.1 del
  Código Penal y quebranta un "reforzado deber de reserva" que
  pesaba sobre el entonces Fiscal General del Estado. Dos votos
  particulares disidentes, de las magistradas Ana María Ferrer
  García y Susana Polo García, sostienen que no existe prueba
  suficiente que permita atribuir la autoría de la filtración al
  condenado más allá de toda duda razonable. La sentencia es
  recurrida en amparo ante el Tribunal Constitucional.
