id: amparo-tc-pendiente-fge
caso_id: fiscal-general-del-estado
enunciado: |
  Tras la firmeza de la condena en la jurisdicción ordinaria, se han
  presentado ante el Tribunal Constitucional dos recursos de amparo
  contra la Sentencia 1000/2025: uno por el Ministerio Fiscal el 10
  de abril de 2026, alegando la vulneración de cinco derechos
  fundamentales del condenado; y otro por la propia defensa de
  Álvaro García Ortiz el 13 de abril de 2026, planteando
  vulneración del derecho a la presunción de inocencia y del
  derecho a un proceso con todas las garantías. A la fecha de
  redacción de esta ficha, los recursos están pendientes de
  resolución sobre admisibilidad; la presentación del amparo no
  suspende automáticamente la ejecución de la pena de
  inhabilitación.
