id: penas-impuestas-fge
caso_id: fiscal-general-del-estado
enunciado: |
  El fallo dispositivo de la Sentencia 1000/2025 de la Sala Segunda
  del Tribunal Supremo, dictada por mayoría de cinco votos frente a
  dos, impone a Álvaro García Ortiz como autor responsable de un
  delito de revelación de datos reservados del artículo 417.1 del
  Código Penal una pena de multa de doce meses con una cuota diaria
  de veinte euros, equivalente a siete mil doscientos euros en
  total, y la pena de inhabilitación especial para el cargo de
  Fiscal General del Estado por tiempo de dos años, con condena en
  costas procesales incluyendo las de la acusación particular. La
  sentencia es firme desde el 26 de febrero de 2026 y la
  inhabilitación se ejecuta desde el cese efectivo del condenado el
  10 de diciembre de 2025.
