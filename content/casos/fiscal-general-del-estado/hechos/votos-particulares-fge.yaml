id: votos-particulares-fge
caso_id: fiscal-general-del-estado
enunciado: |
  Las magistradas Ana María Ferrer García y Susana Polo García
  formulan sendos votos particulares disidentes a la Sentencia
  1000/2025 de la Sala Segunda del Tribunal Supremo. Ambas
  magistradas sostienen, en síntesis recogida por el propio tribunal
  y por la cobertura periodística cruzada, que la prueba indiciaria
  practicada en el juicio no permite atribuir más allá de toda duda
  razonable la autoría material o intelectual de la filtración al
  condenado, y que el estándar de prueba aplicado por la mayoría
  rebaja la exigencia constitucional de la presunción de inocencia
  en perjuicio del Fiscal General del Estado en activo. Los votos
  particulares no afectan a la firmeza ni a la ejecutividad de la
  sentencia, pero alimentan los recursos de amparo presentados
  posteriormente ante el Tribunal Constitucional.
