titulo: "El juez Pedraz levanta parcialmente el secreto del sumario y mantiene bajo reserva la pieza de contratos públicos un mes más (1 junio 2026)"
descripcion: |
  El 1 de junio de 2026 el magistrado Santiago Pedraz, del JCI nº 5 de la Audiencia Nacional,
  dicta auto levantando de forma parcial el secreto de las actuaciones de la causa conocida
  como caso Leire Díez. El magistrado razona que "ya se han practicado gran parte de las
  diligencias que motivaron el secreto de la causa", por lo que procede el levantamiento
  parcial. No obstante, mantiene bajo reserva durante el plazo de un mes una pieza del
  procedimiento —la relativa a presuntas irregularidades en contratos públicos, en la que
  figuran como investigados María Leire Díez Castro, el expresidente de la SEPI Vicente
  Fernández Guerrero y el empresario Antxon Alonso— para no perjudicar las diligencias de
  investigación pendientes. Según la cobertura periodística, el contenido del sumario podría
  tardar varios días en ser accesible materialmente a las partes. La rama cuyo secreto se
  levanta es la relativa a la presunta estructura orientada a desestabilizar procedimientos
  judiciales que afectaran al PSOE o al Gobierno. Rige el principio de presunción de inocencia
  respecto a todos los investigados.
