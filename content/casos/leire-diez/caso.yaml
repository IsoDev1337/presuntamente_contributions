id: leire-diez
nombre_oficial: "Pieza separada del Juzgado Central de Instrucción nº 5 de la Audiencia Nacional, magistrado Santiago Pedraz, sobre presunta financiación irregular y obstrucción de la Justicia"
nombre_mediatico: "Caso Leire Díez"
nombres_alternativos:
  - "caso Ferraz"
  - "caso Hirurok"

descripcion_corta: |
  Procedimiento instruido por el JCI nº 5 de la Audiencia Nacional (juez Santiago Pedraz)
  en el que María Leire Díez Castro figura como investigada por su presunta participación
  en una estructura denominada "Hirurok", orientada a obtener comisiones ilegales en
  contratos públicos y ayudas SEPI (2021–2023), con ramificaciones hacia la sede federal
  del PSOE. En paralelo, el JI nº 9 de Madrid investiga presuntos delitos de cohecho y
  tráfico de influencias.

sintesis_caso:
  que_se_investiga: |
    Si María Leire Díez Castro y otras personas investigadas habrían participado en una
    estructura orientada a obtener comisiones ilegales, canalizar pagos presuntamente
    falsos e interferir en procedimientos judiciales.
  hechos_clave:
    - "Se investiga si la red Hirurok habría actuado en contratos públicos y ayudas SEPI por importe superior a 700.000 euros entre 2021 y 2023."
    - "El auto Pedraz del 26 de mayo de 2026 abre pieza separada e incluye entre los investigados a Santos Cerdán, Gaspar Zarrías y cinco personas más, y autoriza la entrada de la UCO en la sede federal del PSOE."
    - "La UCO realizó un registro de 12 horas en la sede federal del PSOE (Ferraz) el 27 de mayo de 2026 en busca de documentación."
    - "Se investiga si se habrían ofrecido 50.000 euros a una empresaria para que modificara su declaración judicial, y si se buscó información sensible sobre jueces y mandos UCO."
  estado_actual: |
    El 1 de junio de 2026 el juez Pedraz levantó parcialmente el secreto del sumario, al
    considerar practicadas gran parte de las diligencias que lo motivaron, y mantuvo bajo
    reserva un mes más una pieza del procedimiento —la relativa a presuntas irregularidades
    en contratos públicos, en la que figuran como investigados Leire Díez, el expresidente de
    la SEPI Vicente Fernández Guerrero y el empresario Antxon Alonso— para no perjudicar
    diligencias pendientes. La rama cuyo secreto se levanta es la relativa a la presunta
    estructura orientada a desestabilizar procedimientos judiciales que afectaran al PSOE o
    al Gobierno. La causa sigue en fase de instrucción ante el JCI nº 5 de la Audiencia
    Nacional. El auto del 26 de mayo de 2026 sitúa el presunto ofrecimiento de 50.000 euros
    a una empresaria como un intento de que modificara su declaración sobre una entrega de
    dinero en efectivo en la sede del PSOE, materia que la cobertura conecta con el entorno
    del caso Koldo. En paralelo, el magistrado ha solicitado al Juzgado de Instrucción nº 9
    de Madrid que se inhiba a su favor para asumir la causa abierta en 2025, por su
    competencia sobre el presunto delito contra las instituciones del Estado. El 4 de junio
    de 2026 el magistrado rechazó por el momento la personación como acusación particular del
    magistrado jubilado Manuel García-Castellón, al considerar que los hechos que este alega se
    investigan en el Juzgado de Instrucción nº 9 de Madrid y no están aún acumulados a esta
    causa. Rige el principio de presunción de inocencia.
  cifras_clave:
    - "Presunta comisión superior a 700.000 euros en contratos SEPI (2021-2023)"
    - "188.000 euros mínimo documentado en pagos del PSOE a la red (auto Pedraz)"
    - "50.000 euros presuntamente ofrecidos para modificar declaración de testigo"

