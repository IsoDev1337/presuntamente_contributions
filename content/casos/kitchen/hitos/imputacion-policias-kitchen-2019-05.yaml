titulo: "El magistrado instructor del Juzgado Central de Instrucción nº 6 amplía la imputación en la pieza Kitchen al ex secretario de Estado de Seguridad Francisco Martínez y al ex Director Adjunto Operativo de la Policía Eugenio Pino"
descripcion: |
  En el mes de mayo de 2019, en sucesivos autos derivados del avance
  de la instrucción de la pieza separada nº 7 de las Diligencias
  Previas 96/2017 (Operación Kitchen), el magistrado instructor del
  Juzgado Central de Instrucción nº 6 de la Audiencia Nacional
  acuerda la imputación como investigados de Francisco Martínez
  Vázquez, ex secretario de Estado de Seguridad, y de Eugenio Pino
  Sánchez, ex Director Adjunto Operativo de la Dirección General de
  la Policía, ambos en el organigrama del Ministerio del Interior
  durante el periodo de la presunta operación parapolicial atribuida
  contra el ex tesorero del Partido Popular Luis Bárcenas. La fecha
  se modela con precisión de mes mientras no se localice fuente con
  el día concreto de cada auto. La condición de investigados no
  implica valoración de culpabilidad: rige el principio de presunción
  de inocencia mientras no recaiga sentencia firme en contrario.
