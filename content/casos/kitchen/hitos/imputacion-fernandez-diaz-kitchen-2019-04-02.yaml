titulo: "El magistrado instructor del Juzgado Central de Instrucción nº 6 de la Audiencia Nacional acuerda la imputación del ex ministro del Interior Jorge Fernández Díaz como investigado en la pieza Kitchen"
descripcion: |
  Por auto del magistrado instructor del Juzgado Central de Instrucción
  nº 6 de la Audiencia Nacional, dictado el 2 de abril de 2019, se
  acuerda la imputación de Jorge Fernández Díaz, ministro del Interior
  del Reino de España entre el 22 de diciembre de 2011 y el 4 de
  noviembre de 2016, como investigado en la pieza separada nº 7 de
  las Diligencias Previas 96/2017 (Operación Kitchen) por su presunta
  participación en la operación parapolicial atribuida al Ministerio
  del Interior contra el ex tesorero del Partido Popular Luis
  Bárcenas. La condición de investigado no implica valoración de
  culpabilidad: rige el principio de presunción de inocencia mientras
  no recaiga sentencia firme en contrario.
