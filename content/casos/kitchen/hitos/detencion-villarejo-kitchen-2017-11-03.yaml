titulo: "Detención del comisario jubilado José Manuel Villarejo Pérez, hecho que da origen a las Diligencias Previas 96/2017 del Juzgado Central de Instrucción nº 6 de la Audiencia Nacional y, en su día, a la pieza séptima conocida como Operación Kitchen"
descripcion: |
  El 3 de noviembre de 2017 el Cuerpo Nacional de Policía detiene en
  Madrid al comisario jubilado José Manuel Villarejo Pérez, hecho a
  partir del cual se incoan las Diligencias Previas 96/2017 del
  Juzgado Central de Instrucción nº 6 de la Audiencia Nacional,
  conocidas mediáticamente como Caso Tándem y desplegadas a lo largo
  de los años siguientes en más de treinta piezas separadas. La
  séptima de esas piezas separadas se conocería desde 2018 como
  Operación Kitchen, en relación con la presunta operación
  parapolicial atribuida al Ministerio del Interior contra el ex
  tesorero del Partido Popular Luis Bárcenas. Rige el principio de
  presunción de inocencia respecto de todos los investigados en estas
  diligencias previas y sus piezas.
