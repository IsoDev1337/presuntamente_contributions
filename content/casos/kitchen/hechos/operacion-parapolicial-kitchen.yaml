id: operacion-parapolicial-kitchen
caso_id: kitchen
enunciado: |
  Según el auto del magistrado instructor del Juzgado Central de
  Instrucción nº 6 de la Audiencia Nacional del 29 de julio de 2021 y
  la cobertura cruzada de elDiario.es e Infobae sobre dicho auto, se
  atribuye al Ministerio del Interior del Reino de España la presunta
  organización, entre 2013 y 2015, de un dispositivo parapolicial
  conocido mediáticamente como Operación Kitchen y dirigido —según el
  instructor— a obtener documentación sensible en poder del entonces
  ex tesorero del Partido Popular Luis Bárcenas, en un contexto en
  que se sustanciaban paralelamente diligencias judiciales sobre la
  financiación irregular de la formación. La atribución corresponde
  al instructor en el auto de procesamiento y no constituye
  declaración de hechos probados; rige el principio de presunción de
  inocencia respecto de todos los procesados mientras no recaiga
  sentencia firme en contrario.
