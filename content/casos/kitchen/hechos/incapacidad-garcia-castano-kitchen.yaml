id: incapacidad-garcia-castano-kitchen
caso_id: kitchen
enunciado: |
  El comisario procesado Enrique García Castaño, ex jefe de la Unidad
  Central de Apoyo Operativo (UCAO) de la Dirección General de la
  Policía, sufrió un ictus en 2022 que derivó en incapacidad mental
  sobrevenida apreciada por la Sección Cuarta de la Sala de lo Penal
  de la Audiencia Nacional en la fase de enjuiciamiento de la pieza
  separada nº 7 de las Diligencias Previas 96/2017 (Operación
  Kitchen). El tribunal acordó no incluirlo en el banquillo del
  juicio oral iniciado el 6 de abril de 2026, sin perjuicio del
  procedimiento principal frente al resto de procesados. Conforme a
  la cobertura cruzada de la prensa especializada, la Sala de lo
  Penal de la Audiencia Nacional ha rechazado intentos previos del
  propio procesado de librarse del enjuiciamiento por otros motivos,
  confirmando que la condición procesal sobreviniente es la
  incapacidad mental apreciada con posterioridad al ictus.
