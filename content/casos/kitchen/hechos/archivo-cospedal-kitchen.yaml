id: archivo-cospedal-kitchen
caso_id: kitchen
enunciado: |
  Por auto del Juzgado Central de Instrucción nº 6 de la Audiencia
  Nacional del 7 de diciembre de 2022, confirmando el sobreseimiento
  provisional acordado el 29 de julio de 2021, se acordó el archivo
  respecto de María Dolores de Cospedal García y de Ignacio López
  del Hierro Bravo en la pieza separada nº 7 de las Diligencias
  Previas 96/2017 (Operación Kitchen), desestimándose los recursos
  planteados contra el archivo por la Fiscalía Anticorrupción y las
  acusaciones populares personadas. Este sobreseimiento devino firme
  en la fase de instrucción por auto de la Sección Tercera de la
  Sala de lo Penal de la Audiencia Nacional del 24 de febrero de
  2023, que desestimó los recursos de apelación de la Fiscalía
  Especial contra la Corrupción y la Criminalidad Organizada, de
  Unidas Podemos y del Partido Socialista Obrero Español. Posteriores
  intentos de reapertura han sido también rechazados (auto de la
  Sección Cuarta del 7 de abril de 2026 al inicio de la vista oral
  rechazando la petición del PSOE de suspender el juicio para
  reinvestigar a Cospedal).
