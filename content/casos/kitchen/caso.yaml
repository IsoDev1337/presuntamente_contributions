# Caso Kitchen — esqueleto inicial (PR1).
#
# Pieza separada nº 7 de las Diligencias Previas 96/2017 del Juzgado
# Central de Instrucción nº 6 de la Audiencia Nacional, conocidas como
# Caso Tándem, instruidas por el magistrado Manuel García-Castellón
# García-Lomas tras la detención del comisario jubilado José Manuel
# Villarejo Pérez el 3 de noviembre de 2017. La pieza séptima, conocida
# mediáticamente como Operación Kitchen, se incoa por la presunta
# existencia de una operación parapolicial atribuida al Ministerio del
# Interior del Reino de España entre 2013 y 2015, durante el gobierno
# presidido por Mariano Rajoy y bajo la titularidad del ministro Jorge
# Fernández Díaz, presuntamente dirigida —según el instructor— a obtener
# documentación sensible en poder del entonces ex tesorero del Partido
# Popular Luis Bárcenas. Por auto del Juzgado Central de Instrucción nº
# 6 de la Audiencia Nacional de 29 de julio de 2021 se dictó procesamiento
# contra Jorge Fernández Díaz, Francisco Martínez Vázquez, Eugenio Pino
# Sánchez, José Manuel Villarejo Pérez y otros agentes y se acordó el
# sobreseimiento provisional respecto de María Dolores de Cospedal
# García y de Ignacio López del Hierro; este último archivo fue
# confirmado por auto del mismo órgano el 7 de diciembre de 2022 y
# posteriormente revocado en 2023 por la Sala de Apelaciones de la
# Audiencia Nacional, que ordenó la reincorporación de la causa contra
# Cospedal y López del Hierro. La causa se encuentra en fase
# intermedia, pendiente de la celebración del juicio oral.

