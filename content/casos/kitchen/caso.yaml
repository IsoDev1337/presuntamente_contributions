descripcion_corta: |
  Pieza separada nº 7 de las Diligencias Previas 96/2017 del Juzgado
  Central de Instrucción nº 6 de la Audiencia Nacional, instruidas por
  el magistrado Manuel García-Castellón. La pieza séptima, conocida
  mediáticamente como Operación Kitchen, se incoó por la presunta
  existencia de una operación parapolicial atribuida al Ministerio del
  Interior del Reino de España entre 2013 y 2015, durante el gobierno
  presidido por Mariano Rajoy y bajo la titularidad del ministro Jorge
  Fernández Díaz, presuntamente dirigida —según el instructor— a
  obtener documentación sensible en poder del entonces ex tesorero del
  Partido Popular Luis Bárcenas. Por auto del Juzgado Central de
  Instrucción nº 6 de 29 de julio de 2021 se transformó el
  procedimiento a abreviado y se procesó a Jorge Fernández Díaz,
  Francisco Martínez Vázquez, Eugenio Pino Sánchez, José Manuel
  Villarejo Pérez y otros agentes, acordándose simultáneamente el
  sobreseimiento provisional respecto de María Dolores de Cospedal
  García y de Ignacio López del Hierro. El sobreseimiento de Cospedal
  y López del Hierro fue confirmado por auto del mismo órgano de 7 de
  diciembre de 2022 y posteriormente revocado en 2023 por la Sala de
  Apelaciones de la Audiencia Nacional, que ordenó reincorporar la
  causa contra ambos. La causa se encuentra en fase intermedia y
  pendiente de juicio oral. Rige el principio de presunción de
  inocencia respecto de los procesados mientras no recaiga sentencia
  firme en contrario.

