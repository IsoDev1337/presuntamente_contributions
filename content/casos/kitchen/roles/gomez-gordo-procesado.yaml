notas: |
  Por auto del 29 de julio de 2021 del Juzgado Central de Instrucción
  nº 6 de la Audiencia Nacional se procesa a Andrés Manuel Gómez
  Gordo. La Fiscalía Especial contra la Corrupción y la Criminalidad
  Organizada solicita en su escrito de acusación pena de prisión e
  inhabilitación absoluta por presuntos delitos de encubrimiento,
  malversación de caudales públicos y contra la intimidad. La
  condición de procesado no implica valoración de culpabilidad: rige
  el principio de presunción de inocencia mientras no recaiga
  sentencia firme en contrario.
