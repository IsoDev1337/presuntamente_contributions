notas: |
  Por auto del magistrado instructor del Juzgado Central de Instrucción
  nº 6 de la Audiencia Nacional, José Luis Olivera Serrano queda
  investigado en la pieza separada nº 7 de las Diligencias Previas
  96/2017 (Operación Kitchen) por su presunta participación, en su
  condición de jefe de la UDEF y posteriormente director del CITCO,
  en la operación parapolicial atribuida al Ministerio del Interior
  contra el entorno familiar del ex tesorero del PP Luis Bárcenas
  entre 2013 y 2015. La fecha exacta del auto se modela con precisión
  de mes mientras no se localice fuente con día concreto. La
  condición de investigado no implica valoración de culpabilidad:
  rige el principio de presunción de inocencia. El rol se cierra el
  29 de julio de 2021 con el auto de transformación a procedimiento
  abreviado del mismo órgano, que abre el rol consecutivo de
  procesado.
