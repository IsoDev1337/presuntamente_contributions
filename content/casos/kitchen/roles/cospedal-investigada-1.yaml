notas: |
  Por auto del magistrado instructor del Juzgado Central de Instrucción
  nº 6 de la Audiencia Nacional dictado en septiembre de 2019, María
  Dolores de Cospedal García queda investigada en la pieza separada
  nº 7 de las Diligencias Previas 96/2017 (Operación Kitchen). La
  fecha exacta del auto se modela con precisión de mes mientras no
  se localice fuente con el día concreto. La condición de investigada
  no implica valoración de culpabilidad: rige el principio de
  presunción de inocencia. El rol se cierra el 29 de julio de 2021
  con el auto de transformación a procedimiento abreviado del mismo
  órgano, que en esa fecha acuerda simultáneamente el sobreseimiento
  provisional respecto de ella y de Ignacio López del Hierro, lo que
  abre el rol consecutivo de desimputada.
