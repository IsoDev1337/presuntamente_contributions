notas: |
  Teresa Palacios Criado preside el tribunal de enjuiciamiento de la
  pieza séptima de las Diligencias Previas 96/2017 (Operación Kitchen)
  como presidenta de la Sección Cuarta de la Sala de lo Penal de la
  Audiencia Nacional, y es ponente del juicio iniciado el 6 de abril
  de 2026. Su intervención en el procedimiento es estrictamente
  jurisdiccional.
