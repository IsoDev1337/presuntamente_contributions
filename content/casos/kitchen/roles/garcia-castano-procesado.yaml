notas: |
  Por auto del 29 de julio de 2021 del Juzgado Central de Instrucción
  nº 6 de la Audiencia Nacional se procesa a Enrique García Castaño.
  En 2022 sufrió un ictus que derivó en incapacidad mental sobrevenida
  apreciada en la fase de enjuiciamiento, por lo que la Sección
  Cuarta de la Sala de lo Penal de la Audiencia Nacional acordó no
  incluirlo en el banquillo del juicio oral iniciado el 6 de abril
  de 2026, sin perjuicio del procedimiento principal frente al resto
  de procesados. La condición de procesado no implica valoración de
  culpabilidad: rige el principio de presunción de inocencia mientras
  no recaiga sentencia firme en contrario.
