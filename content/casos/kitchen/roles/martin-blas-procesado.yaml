notas: |
  Por auto del 29 de julio de 2021 del Juzgado Central de Instrucción
  nº 6 de la Audiencia Nacional se procesa a Marcelino Martín-Blas
  Aritio. La Fiscalía Especial contra la Corrupción y la Criminalidad
  Organizada solicita en su escrito de acusación una pena de dos años
  y seis meses de prisión. La condición de procesado no implica
  valoración de culpabilidad: rige el principio de presunción de
  inocencia mientras no recaiga sentencia firme en contrario.
