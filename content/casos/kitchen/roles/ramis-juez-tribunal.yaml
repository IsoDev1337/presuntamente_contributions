notas: |
  Francisca María Ramis Rosselló integra el tribunal de enjuiciamiento
  de la pieza séptima de las Diligencias Previas 96/2017 (Operación
  Kitchen) como magistrada de la Sección Cuarta de la Sala de lo
  Penal de la Audiencia Nacional. Aunque el rol se etiqueta como
  `juez_ponente` por convención del enum del schema (que no contempla
  el rol de magistrada integrante del tribunal sin función ponente),
  la posición editorial es la de magistrada del tribunal de
  enjuiciamiento, no la ponente formal. Su intervención en el
  procedimiento es estrictamente jurisdiccional.
