notas: |
  Por auto del 29 de julio de 2021 del Juzgado Central de Instrucción
  nº 6 de la Audiencia Nacional se procesa a Bonifacio Díez Sevillano.
  La Fiscalía Especial contra la Corrupción y la Criminalidad
  Organizada retiró posteriormente su acusación al no apreciar
  indicios suficientes; las acusaciones populares (PSOE, Unidas
  Podemos) y particulares (familia Bárcenas) mantienen reproches
  penales en el juicio iniciado el 6 de abril de 2026. La condición
  de procesado no implica valoración de culpabilidad: rige el
  principio de presunción de inocencia mientras no recaiga sentencia
  firme en contrario.
