notas: |
  Por auto del Juzgado Central de Instrucción nº 6 de la Audiencia
  Nacional del 29 de julio de 2021 se acuerda el sobreseimiento
  provisional respecto de Ignacio López del Hierro Bravo en la pieza
  separada nº 7 de las Diligencias Previas 96/2017 (Operación
  Kitchen), simultáneo al sobreseimiento de su esposa María Dolores
  de Cospedal García y a la transformación a procedimiento abreviado
  y procesamiento del resto. El sobreseimiento es confirmado por auto
  del mismo órgano del 7 de diciembre de 2022 y deviene firme en la
  fase de instrucción por auto de la Sección Tercera de la Sala de lo
  Penal de la Audiencia Nacional del 24 de febrero de 2023, que
  desestima los recursos de apelación de la Fiscalía Anticorrupción,
  Unidas Podemos y el PSOE como acusaciones populares. El rol
  permanece vigente.
