notas: |
  Por auto del magistrado instructor del Juzgado Central de Instrucción
  nº 6 de la Audiencia Nacional del 2 de abril de 2019, Jorge
  Fernández Díaz queda investigado en la pieza separada nº 7 de las
  Diligencias Previas 96/2017 (Operación Kitchen). La condición de
  investigado no implica valoración de culpabilidad: rige el principio
  de presunción de inocencia. El rol se cierra el 29 de julio de 2021
  con el auto de transformación a procedimiento abreviado dictado por
  el mismo órgano, que abre el rol consecutivo de procesado.
