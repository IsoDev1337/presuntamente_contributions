notas: |
  Por auto del 29 de julio de 2021 del Juzgado Central de Instrucción
  nº 6 de la Audiencia Nacional se procesa a Francisco Martínez
  Vázquez por su presunta participación en la operación parapolicial
  conocida mediáticamente como Operación Kitchen durante su mandato
  como secretario de Estado de Seguridad. La condición de procesado
  no implica valoración de culpabilidad: rige el principio de
  presunción de inocencia mientras no recaiga sentencia firme en
  contrario.
