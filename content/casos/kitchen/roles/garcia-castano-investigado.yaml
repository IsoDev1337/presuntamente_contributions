notas: |
  Por auto del magistrado instructor del Juzgado Central de Instrucción
  nº 6 de la Audiencia Nacional, Enrique García Castaño queda
  investigado en la pieza separada nº 7 de las Diligencias Previas
  96/2017 (Operación Kitchen) por su presunta función, como jefe de
  la Unidad Central de Apoyo Operativo (UCAO) de la Dirección General
  de la Policía, en la coordinación de las vigilancias atribuidas
  contra el entorno familiar del ex tesorero del PP Luis Bárcenas.
  La fecha exacta del auto se modela con precisión de mes. La
  condición de investigado no implica valoración de culpabilidad:
  rige el principio de presunción de inocencia. El rol se cierra el
  29 de julio de 2021 con el auto de transformación a procedimiento
  abreviado.
