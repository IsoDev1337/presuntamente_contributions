notas: |
  Por auto del Juzgado Central de Instrucción nº 6 de la Audiencia
  Nacional del 29 de julio de 2021, simultáneo a la transformación a
  procedimiento abreviado y al procesamiento de los demás
  investigados, se acuerda el sobreseimiento provisional respecto de
  María Dolores de Cospedal García en la pieza separada nº 7 de las
  Diligencias Previas 96/2017 (Operación Kitchen). El sobreseimiento
  es confirmado por auto del mismo órgano del 7 de diciembre de 2022
  y deviene firme en la fase de instrucción por auto de la Sección
  Tercera de la Sala de lo Penal de la Audiencia Nacional del 24 de
  febrero de 2023, que desestima los recursos de apelación
  interpuestos por la Fiscalía Anticorrupción, Unidas Podemos y el
  PSOE como acusaciones populares. Posteriores intentos de reapertura
  (PSOE 7 de abril de 2026 al inicio de la vista oral) han sido
  rechazados por la Sección Cuarta de la Sala de lo Penal. El rol
  permanece vigente.
