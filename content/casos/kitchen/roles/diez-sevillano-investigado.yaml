notas: |
  Por auto del magistrado instructor del Juzgado Central de Instrucción
  nº 6 de la Audiencia Nacional, Bonifacio Díez Sevillano queda
  investigado en la pieza separada nº 7 de las Diligencias Previas
  96/2017 (Operación Kitchen) en su condición de inspector del
  Cuerpo Nacional de Policía próximo profesionalmente al entonces
  Director Adjunto Operativo Eugenio Pino Sánchez. La fecha exacta
  del auto se modela con precisión de mes. La condición de
  investigado no implica valoración de culpabilidad: rige el
  principio de presunción de inocencia. El rol se cierra el 29 de
  julio de 2021 con el auto de transformación a procedimiento
  abreviado.
