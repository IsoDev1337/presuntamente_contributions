notas: |
  Manuel García-Castellón García-Lomas, magistrado titular del Juzgado
  Central de Instrucción nº 6 de la Audiencia Nacional, es el
  magistrado instructor de las Diligencias Previas 96/2017 (Caso
  Tándem) y de su pieza separada nº 7 conocida mediáticamente como
  Operación Kitchen desde la apertura formal de la pieza el 19 de
  julio de 2018. Su intervención en la pieza, como instructor, es
  estrictamente jurisdiccional.
