notas: |
  Por auto de la Sala de Apelaciones de la Audiencia Nacional dictado
  en julio de 2023 se revoca el sobreseimiento provisional respecto
  de María Dolores de Cospedal García y se ordena la reincorporación
  de la causa contra ella en la pieza separada nº 7 de las Diligencias
  Previas 96/2017 (Operación Kitchen). La reapertura de la
  investigación contra Cospedal no implica valoración de culpabilidad:
  rige el principio de presunción de inocencia mientras no recaiga
  sentencia firme en contrario. La fecha exacta del auto se modela
  con precisión de mes mientras no se localice fuente con el día
  concreto. El rol permanece vigente; la posición procesal definitiva
  de Cospedal en la fase intermedia (procesada o sobreseída con
  carácter firme) está pendiente de resolución por el órgano
  instructor.
