notas: |
  Podemos (bajo la denominación de coalición Unidas Podemos en parte
  del periodo) ejerce la acusación popular en la pieza separada nº 7
  de las Diligencias Previas 96/2017 (Operación Kitchen). La fecha
  exacta de la personación inicial se modela apuntando al hito de
  apertura de la pieza, mientras no se localice fuente con día
  concreto del auto de admisión específico. La formación planteó
  recurso de apelación contra el sobreseimiento provisional de
  Cospedal y López del Hierro (desestimado por la Sección Tercera el
  24 de febrero de 2023). En la fase de apertura del juicio oral
  pretendió incluir el delito de pertenencia a organización criminal,
  que fue excluido por el auto rectificador del 23 de enero de 2024
  por superar el límite de pena establecido para el procedimiento
  abreviado.
