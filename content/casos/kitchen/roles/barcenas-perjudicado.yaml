notas: |
  Luis Bárcenas Gutiérrez figura como presunto perjudicado en la
  pieza separada nº 7 de las Diligencias Previas 96/2017 del Juzgado
  Central de Instrucción nº 6 de la Audiencia Nacional (Operación
  Kitchen), por la presunta operación parapolicial atribuida al
  Ministerio del Interior y dirigida —según el instructor— a la
  obtención de documentación sensible en su poder. La condición de
  perjudicado se refleja a efectos procesales y no presupone la
  determinación firme de los hechos, que está pendiente de juicio
  oral.
