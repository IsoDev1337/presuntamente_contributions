notas: |
  Por auto del magistrado instructor del Juzgado Central de Instrucción
  nº 6 de la Audiencia Nacional del 29 de julio de 2021 se transforma
  el procedimiento a abreviado y se procesa a Jorge Fernández Díaz
  por su presunta participación en la operación parapolicial conocida
  mediáticamente como Operación Kitchen. La condición de procesado no
  implica valoración de culpabilidad: rige el principio de presunción
  de inocencia mientras no recaiga sentencia firme en contrario. El
  rol permanece vigente a la espera del señalamiento y celebración
  del juicio oral.
