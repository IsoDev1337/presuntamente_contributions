notas: |
  Francisco Ballesteros integra el tribunal de enjuiciamiento de la
  pieza séptima de las Diligencias Previas 96/2017 (Operación
  Kitchen) como magistrado de la Sección Cuarta de la Sala de lo
  Penal de la Audiencia Nacional. Aunque el rol se etiqueta como
  `juez_ponente` por convención del enum del schema (que no contempla
  el rol de magistrado integrante del tribunal sin función ponente),
  la posición editorial es la de magistrado del tribunal de
  enjuiciamiento, no la ponente formal. Su intervención en el
  procedimiento es estrictamente jurisdiccional.
