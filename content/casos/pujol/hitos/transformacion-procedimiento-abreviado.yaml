titulo: "Auto de transformación a procedimiento abreviado contra la familia Pujol"
descripcion: >-
  El 16 de julio de 2020 el magistrado instructor José de la Mata dictó el auto
  que concluyó la instrucción y transformó la causa en procedimiento abreviado,
  dejando a los miembros de la familia Pujol a las puertas del juicio oral por
  presunta organización criminal y blanqueo de capitales, entre otros delitos.
