titulo: "Apertura de juicio oral contra la familia Pujol"
descripcion: >-
  El 15 de junio de 2021 el juez Santiago Pedraz, titular del Juzgado Central de
  Instrucción nº 5 de la Audiencia Nacional, dictó el auto de apertura de juicio
  oral contra Jordi Pujol Soley, sus siete hijos y otras personas acusadas, con
  la Fiscalía Anticorrupción ejerciendo la acusación pública. La causa pasó a la
  fase de juicio oral pendiente de señalamiento.
