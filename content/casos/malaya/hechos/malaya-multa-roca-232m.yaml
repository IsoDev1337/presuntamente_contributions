id: malaya-multa-roca-232m
caso_id: malaya
enunciado: |
  La instrucción y las sentencias documentan que Juan Antonio Roca
  habría ejercido como «alcalde de hecho» en el Ayuntamiento de
  Marbella, decidiendo de facto la concesión de licencias urbanísticas
  ilegales junto con los altos cargos municipales a cambio de
  comisiones y dádivas a particulares. A través de su testaferro
  Montserrat Corulla, habría controlado parte del dinero procedente de
  los impuestos municipales de Marbella, invirtiéndolo en coches de
  lujo, propiedades inmobiliarias de alto valor en Madrid y obras de
  arte. El blanqueo de capitales atribuido a la red se ha cifrado en
  distintas fuentes periodísticas en cantidades de hasta centenares de
  millones de euros, sin que conste una cuantía única confirmada en el
  texto íntegro de la sentencia.
