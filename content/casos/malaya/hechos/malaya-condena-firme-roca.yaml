id: malaya-condena-firme-roca
caso_id: malaya
enunciado: |
  La sentencia firme del Tribunal Supremo de 27 de julio de 2015
  eleva la condena de Juan Antonio Roca de 11 a 17 años de prisión,
  añadiendo un delito contra la Hacienda Pública de 2002 (2 años y
  6 meses adicionales) y agravando el blanqueo de capitales (de 5 a
  7 años). Asimismo, la sentencia reduce la condena de Marisol Yagüe
  de 7 años y 9 meses a 5 años y 6 meses, y la de Isabel García
  Marcos de 4 a 3 años y 6 meses. El Tribunal Supremo absuelve a
  cuatro de los 52 condenados en primera instancia (Joaquín Martínez
  Vilanova, Julio de Marco, José María Pérez Lozano y Francisco
  Soriano), reduciendo el total a 48 condenados. La sentencia gana
  firmeza con esta resolución del alto tribunal. Según la cobertura
  periodística, la pena de multa habría rondado los 232 millones de
  euros, cifra aún no confirmada contra el texto íntegro de la
  sentencia (pendiente de localización en CENDOJ).
tipo: acreditado
# Promovido a 'acreditado' el 2026-05-30 (rev. maintainer V-04).
# Respaldo: nota oficial CGPJ (N1) sobre sentencia TS de 27-jul-2015, accesible
# en poderjudicial.es. La nota confirma expresamente: 17 años a Roca (3,5 cohecho
# + 2,5 delito contra Hacienda + 7 blanqueo), reducción de 52 a 48 condenados,
# penas de Yagüe y García Marcos. Firmeza: la sentencia del TS es la instancia
# de casación; no cabe ulterior recurso ordinario. Nota: el importe de 232 M€
# de multa proviene de cobertura N4 cruzada; pendiente confirmar cifra exacta
# en texto íntegro de la sentencia TS (ver importe_nota).
