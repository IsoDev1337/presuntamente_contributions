titulo: "La defensa de Begoña Gómez presenta escrito de conclusiones provisionales pidiendo su absolución y proponiendo más de treinta testigos"
descripcion: |
  La defensa de Begoña Gómez, dirigida por el ex ministro de
  Interior Antonio Camacho, presenta el 18 de mayo de 2026 ante el
  Juzgado de Instrucción nº 41 de Madrid el escrito de
  conclusiones provisionales en respuesta a la providencia de 5 de
  mayo de 2026 por la que se abrió plazo de cinco días a las
  partes para pronunciarse sobre la apertura de juicio oral. El
  escrito solicita la libre absolución de la investigada respecto
  de los cuatro delitos por los que fue procesada el 13 de abril de
  2026 (tráfico de influencias, corrupción en los negocios,
  malversación de caudales públicos y apropiación indebida) y pide,
  con carácter accesorio, la imposición de costas a las
  acusaciones por presunta temeridad y mala fe. La defensa
  argumenta que la colaboración de Gómez con la Universidad
  Complutense comenzó en 2012, antes de que su cónyuge ostentase
  responsabilidad pública alguna, y que "los hechos expuestos no
  son constitutivos de delito alguno". El escrito propone como
  prueba testifical una lista de más de treinta personas que
  incluye, entre otros, al rector de la Complutense Joaquín
  Goyache, al directivo de Google España Miguel Escassi, al
  empresario Rosauro Varo y a representantes de Reale Seguros
  (Ignacio Mariscal), Fundación La Caixa (Marc Simón), Indra y
  Telefónica. Conforme al principio de presunción de inocencia,
  rige la inocencia mientras no recaiga resolución firme en
  contrario.
