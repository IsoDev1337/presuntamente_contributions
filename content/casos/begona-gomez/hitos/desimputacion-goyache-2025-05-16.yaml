titulo: "La Audiencia Provincial de Madrid revoca la condición de investigado del rector de la UCM Joaquín Goyache y del directivo del IE Juan José Güemes"
descripcion: |
  La Audiencia Provincial de Madrid, conociendo de los recursos de
  apelación interpuestos contra las imputaciones acordadas por el
  Juzgado de Instrucción nº 41 de Madrid, dicta auto fechado el 13
  de mayo de 2025 y conocido públicamente el 16 de mayo, por el que
  estima los recursos del rector de la Universidad Complutense de
  Madrid, Joaquín Goyache, y del presidente del Centro Internacional
  de Gestión Emprendedora del IE Business School, Juan José Güemes,
  y deja sin efecto la condición de investigado de ambos al
  considerar que no concurren indicios racionales de criminalidad.
  Respecto de Güemes, los magistrados sostienen que el exconsejero
  manifestó conocer a Begoña Gómez desde 2017 y valoró su
  experiencia para el cargo en el Africa Center del IE, "sin que
  existan indicios de que su contratación estuviera relacionada
  con su condición de esposa del presidente". La resolución, de 24
  páginas, excluye además del procedimiento los hechos relativos a
  esa contratación en 2018 al considerar que "esta diligencia
  resulta innecesaria porque excede de lo que es objeto de esta
  investigación". El auto cierra el rol procesal de imputación de
  Goyache y de Güemes, que recuperan su condición ordinaria en
  relación con esta causa. Conforme al principio de presunción de
  inocencia, rige la inocencia mientras no recaiga resolución firme
  en contrario.
