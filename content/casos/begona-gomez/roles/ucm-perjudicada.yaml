notas: |
  La Universidad Complutense de Madrid se persona como perjudicada
  en el procedimiento del Juzgado de Instrucción nº 41 de Madrid el
  6 de octubre de 2025, tras el ofrecimiento formal de personación
  acordado por el instructor mediante auto del 3 de octubre de
  2025. La decisión se asienta en el posible perjuicio económico que
  la propia universidad habría sufrido como consecuencia de los
  hechos imputados a Begoña Gómez en relación con la titularidad
  del software de la Cátedra Extraordinaria de Transformación
  Social Competitiva; la universidad cuantifica indiciariamente
  ese perjuicio en 113.509,32 euros (escrito de 27 de enero de
  2026).
