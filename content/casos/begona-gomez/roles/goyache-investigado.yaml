notas: |
  Joaquín Goyache, rector de la Universidad Complutense de Madrid, es
  citado como investigado por el Juzgado de Instrucción nº 41 de
  Madrid el 22 de julio de 2024, tras haber comparecido como testigo
  el 5 de julio de 2024. La citación obedece a su presunta
  responsabilidad como máxima autoridad académica de la UCM en la
  creación y financiación de la Cátedra Extraordinaria de
  Transformación Social Competitiva codirigida por Begoña Gómez. La
  fecha exacta del auto específico de imputación queda pendiente de
  localización en CENDOJ o nota institucional; `2024-07-22` es la
  fecha de la cobertura periodística cruzada que documenta la
  citación. La condición de investigado se extinguió el 16 de mayo
  de 2025 cuando la Audiencia Provincial de Madrid revocó la
  imputación al no apreciar indicios racionales de criminalidad. La
  condición de investigado no implicó valoración de culpabilidad:
  rigió en todo momento el principio de presunción de inocencia.
