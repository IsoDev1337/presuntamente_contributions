notas: |
  La asociación Iustitia Europa se persona como acusación popular en
  el procedimiento del Juzgado de Instrucción nº 41 de Madrid en
  fechas próximas al 29 de abril de 2024, conforme a la cobertura
  periodística que sitúa la personación "días después" de la
  apertura del 24 de abril. Se adopta provisionalmente `2024-04-29`
  como fecha de inicio, conforme a la mejor estimación cruzada; el
  auto específico del juzgado que admite la personación queda
  pendiente de localización en PR3.
