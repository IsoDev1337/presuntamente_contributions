notas: |
  Por auto de la Audiencia Provincial de Madrid de 13 de mayo de
  2025 (conocido públicamente el 16 de mayo) Juan José Güemes deja
  de tener la condición de investigado al no apreciar el tribunal
  indicios racionales de criminalidad y al excluir del procedimiento
  los hechos relativos a la contratación de Begoña Gómez por el IE
  Business School en 2018. Rige el principio de presunción de
  inocencia; la causa continúa por los demás investigados pero no
  respecto del directivo del IE. Este rol queda abierto como
  condición procesal vigente de Güemes en relación con este
  procedimiento.
