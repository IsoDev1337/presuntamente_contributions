notas: |
  Juan José Güemes, presidente del Centro Internacional de Gestión
  Emprendedora del IE Business School y ex consejero de la Comunidad
  de Madrid, es citado como investigado por el Juzgado de
  Instrucción nº 41 de Madrid el 18 de noviembre de 2024. La citación
  obedece a presuntas contradicciones indiciariamente apreciadas
  por el instructor en su declaración como testigo respecto de la
  contratación de Begoña Gómez como directora del Africa Center del
  IE en 2018. La Fiscalía Provincial de Madrid recurre la imputación
  el 3 de diciembre de 2024 por entender que no se ha especificado
  el delito concreto atribuido. La condición de investigado se
  extingue el 16 de mayo de 2025 cuando la Audiencia Provincial de
  Madrid revoca la imputación al no apreciar indicios racionales de
  criminalidad y excluir del procedimiento los hechos relativos a
  esa contratación. La condición de investigado no implicó
  valoración de culpabilidad: rigió en todo momento el principio de
  presunción de inocencia.
