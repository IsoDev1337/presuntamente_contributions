notas: |
  El partido político Vox se persona como acusación popular en el
  procedimiento del Juzgado de Instrucción nº 41 de Madrid el 29 de
  abril de 2024, conforme a la cobertura periodística de la apertura
  del caso. La admisión de la personación queda documentada de forma
  cruzada por al menos dos medios; el auto específico del juzgado
  que la admite no se ha localizado todavía con URL canónica.
