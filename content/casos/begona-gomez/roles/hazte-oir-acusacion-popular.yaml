notas: |
  La asociación HazteOír.org se persona como acusación popular en el
  procedimiento del Juzgado de Instrucción nº 41 de Madrid en torno
  al 29 de abril de 2024, conforme a la cobertura cruzada que sitúa
  las personaciones de Hazte Oír, Vox e Iustitia Europa "días
  después" de la apertura del 24 de abril. El auto específico del
  juzgado que admite la personación queda pendiente de localización
  en PR3.
