id: bg-desimputacion-goyache-2025-05-16
caso_id: begona-gomez
enunciado: |
  Consta en el auto de la Audiencia Provincial de Madrid de 13 de
  mayo de 2025 (conocido públicamente el 16 de mayo) que el tribunal
  estima los recursos de apelación interpuestos por las defensas del
  rector de la Universidad Complutense de Madrid, Joaquín Goyache,
  y del presidente del Centro Internacional de Gestión Emprendedora
  del IE Business School, Juan José Güemes, y revoca su condición
  de investigados en el procedimiento al considerar que no concurren
  indicios racionales de criminalidad. La resolución, además,
  excluye del procedimiento los hechos relativos a la contratación
  de Begoña Gómez por el IE en 2018 como directora del Africa
  Center al considerar que "esta diligencia resulta innecesaria
  porque excede de lo que es objeto de esta investigación". Cierra
  el rol procesal de imputación de ambos y deja sin efecto las
  diligencias dirigidas personalmente contra ellos. Conforme al
  principio de presunción de inocencia, rige la inocencia mientras
  no recaiga resolución firme en contrario.
