descripcion_corta: |
  Macrocausa en instrucción y fase intermedia ante el Juzgado Central
  de Instrucción nº 6 de la Audiencia Nacional sobre presunta corrupción
  política y desvío de fondos públicos en la gestión de la empresa
  pública Canal de Isabel II durante los gobiernos del Partido Popular
  en la Comunidad de Madrid. Origen en la cooperación judicial
  internacional con Andorra y otros países que detectó movimientos
  patrimoniales atribuidos al ex presidente madrileño Ignacio González
  González. La operación policial coordinada por la Unidad Central
  Operativa de la Guardia Civil del 19 de abril de 2017 supuso la
  detención de González y de una docena de personas más; tres días
  después el entonces titular del JCI nº 6 Eloy Velasco acordó prisión
  provisional incondicional para González. Tras el relevo en la
  titularidad del juzgado a favor del magistrado Manuel García-Castellón
  en julio de 2017, la causa se ramificó en piezas separadas. La pieza
  relativa a las adjudicaciones realizadas en 2003-2004 por el Canal
  de Isabel II para la construcción y explotación del campo de golf
  ubicado en terrenos de la empresa, en la que figuran como acusados
  Ignacio González, su hermano Pablo Manuel González González, su
  cuñado Juan José Caballero Escudier, el socio José Antonio Clemente
  Marín y el ex director gerente del Canal Ildefonso de Miguel
  Rodríguez, ha sido señalada para juicio oral entre el 13 y el 30 de
  septiembre de 2027 ante la Sección Segunda de la Sala de lo Penal
  de la Audiencia Nacional. La Fiscalía Anticorrupción solicita seis
  años de prisión y multa de 550.000 euros para cada uno de los cinco
  acusados; la Comunidad de Madrid, personada como acusación
  particular, eleva la petición de pena para Ignacio González a
  dieciséis años. Tras la jubilación forzosa por edad de
  García-Castellón el 2 de septiembre de 2024 (BOE-A-2024-17653) y la
  asunción provisional de las causas por la magistrada María Tardón,
  ocupa la titularidad del JCI nº 6 desde el 8 de enero de 2025
  Antonio Piña Alonso (Real Decreto 1271/2024, BOE-A-2025-350). Las
  restantes piezas siguen en distintas fases: la pieza Emissao
  (compra en 2013 por el Canal de la sociedad brasileña Emissao por
  unos 30 millones de dólares), con auto de procesamiento del
  18 de noviembre de 2019 que sienta en el banquillo a Ignacio
  González, Edmundo Rodríguez Sobrino y otros, queda pendiente de
  señalamiento de juicio oral. La regla de presunción de inocencia
  rige en todas las piezas no firmes.

