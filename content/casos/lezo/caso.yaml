resumen_cifras: |
  La pieza del campo de golf del Canal de Isabel II atribuye a la
  sociedad familiar TCT (Tecnoconcret Proyectos de Ingeniería) más
  de 3 millones de euros derivados de modificaciones contractuales y
  504.780 euros adicionales por gestión y explotación, distribuidos
  según el escrito de acusación de la Fiscalía Anticorrupción en
  «cuarenta y nueve entregas en sobres de efectivo» (cobertura
  cruzada eldiario.es y Confilegal, diciembre de 2025). La Fiscalía
  Anticorrupción solicita 6 años de prisión y 550.000 euros de multa
  para cada uno de los cinco acusados; la Comunidad de Madrid,
  personada como acusación particular, eleva la petición de pena
  para Ignacio González a 16 años. En piezas separadas pendientes de
  juicio oral, Anticorrupción mantiene peticiones de 8 años de
  prisión y 19 años de inhabilitación para Ignacio González por la
  compra en 2013 de la sociedad brasileña Emissao por el Canal de
  Isabel II por un sobreprecio estimado próximo a los 9,7 millones
  de euros (cobertura cruzada de Público y El Diario, 2019-2020).

