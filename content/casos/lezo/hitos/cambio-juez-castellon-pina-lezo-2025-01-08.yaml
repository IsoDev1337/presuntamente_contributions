titulo: "Antonio Piña Alonso sucede a Manuel García-Castellón como titular del Juzgado Central de Instrucción nº 6 tras la jubilación forzosa por edad de éste y la asunción interina por la magistrada María Tardón"
descripcion: |
  Por Acuerdo de 20 de junio de 2024 de la Comisión Permanente
  del Consejo General del Poder Judicial, publicado en el
  «Boletín Oficial del Estado» del 2 de septiembre de 2024
  (BOE-A-2024-17653), se declaró la jubilación forzosa por edad
  del magistrado don Manuel María García-Castellón García-Lomas,
  titular del Juzgado Central de Instrucción nº 6 de la
  Audiencia Nacional, «por cumplir con la edad legalmente
  establecida el día 2 de septiembre de 2024», con efectos
  desde esa fecha. La magistrada María Tardón, titular del
  Juzgado Central de Instrucción nº 3, asumió interinamente las
  causas pendientes de García-Castellón hasta la designación de
  sucesor. Por Real Decreto 1271/2024, de 10 de diciembre,
  publicado en el «Boletín Oficial del Estado» del 8 de enero
  de 2025 (BOE-A-2025-350), el magistrado don Antonio Piña
  Alonso, anterior presidente de la Audiencia Provincial de
  Ourense, pasó a desempeñar la plaza del JCI nº 6 de la
  Audiencia Nacional con preferencia sobre los magistrados con
  mejor número de escalafón (art. 340 LOPJ), asumiendo desde
  entonces la instrucción del procedimiento Lezo y de las
  restantes macrocausas tramitadas en el juzgado.
