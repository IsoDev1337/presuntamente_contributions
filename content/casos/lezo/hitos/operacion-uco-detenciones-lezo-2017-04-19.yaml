titulo: "La Unidad Central Operativa de la Guardia Civil ejecuta la operación Lezo y detiene al ex presidente Ignacio González y a una docena de personas más"
descripcion: |
  Agentes de la Unidad Central Operativa de la Guardia Civil bajo
  el mando del coronel Manuel Sánchez Corbí ejecutan la operación
  policial coordinada con el Juzgado Central de Instrucción nº 6
  de la Audiencia Nacional, cuyo titular es el magistrado Eloy
  Velasco. En la operación quedan detenidos el ex presidente y
  entonces senador por designación autonómica Ignacio González
  González (Jaime Ignacio González González en su forma oficial),
  el ex director gerente del Canal de Isabel II Ildefonso de
  Miguel Rodríguez y una decena larga de personas más. La
  investigación se atribuye a presuntos delitos de organización
  criminal, prevaricación, malversación de caudales públicos,
  cohecho, blanqueo de capitales, fraude a las administraciones
  públicas, falsedad documental y corrupción en los negocios. La
  detención no implica valoración de culpabilidad: rige la
  presunción de inocencia.
