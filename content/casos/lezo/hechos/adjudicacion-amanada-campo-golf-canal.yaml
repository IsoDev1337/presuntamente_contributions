id: adjudicacion-amanada-campo-golf-canal
caso_id: lezo
enunciado: |
  La Fiscalía Anticorrupción atribuye en su escrito de acusación
  que en 2003 el Canal de Isabel II adjudicó originalmente a
  ACS-Dragados un contrato de obras vinculado a la construcción
  del campo de golf ubicado en terrenos de la empresa pública y
  que durante 2004 el entonces vicepresidente de la Comunidad de
  Madrid Ignacio González González, conjuntamente con el director
  gerente del Canal Ildefonso de Miguel Rodríguez, habría
  modificado sustancialmente las condiciones del proyecto para
  beneficiar a familiares del primero mediante una subcontrata con
  la sociedad Tecnoconcret Proyectos de Ingeniería (TCT) — en la
  que figuran como socios el hermano del ex presidente Pablo
  Manuel González González, su cuñado Juan José Caballero
  Escudier y José Antonio Clemente Marín —. La participación de
  los familiares en TCT, según el relato de la acusación, se
  habría ocultado deliberadamente para evitar cualquier veto
  derivado de los vínculos familiares. La condición de procesados
  no implica valoración de culpabilidad: rige el principio de
  presunción de inocencia mientras no recaiga resolución firme.
