id: compra-emissao-desvio-2013
caso_id: lezo
enunciado: |
  La Fiscalía Anticorrupción atribuye en el auto de procesamiento
  de 18 de noviembre de 2019 dictado por el magistrado Manuel
  María García-Castellón García-Lomas que en el ejercicio de 2013
  la sociedad Inassa, filial latinoamericana de Canal de Isabel
  II presidida por Edmundo Rodríguez Sobrino, adquirió la
  sociedad brasileña Emissao por aproximadamente treinta
  millones de dólares, cuantía considerada notablemente superior
  al valor real de la operación. La acusación atribuye al ex
  presidente de la Comunidad de Madrid Ignacio González González
  la organización de la compraventa con la finalidad de desviar
  fondos públicos del Canal a cuentas privadas, cuantificando
  ese desvío en hasta nueve millones seiscientos mil euros, y
  solicita por estos hechos ocho años de prisión y diecinueve
  años de inhabilitación. Un ex directivo de Inassa declaró ante
  el magistrado instructor haber participado en un reparto
  próximo a los cinco millones y medio de euros con el ex
  presidente madrileño en relación con esta operación. La
  condición de procesados no implica valoración de culpabilidad:
  rige el principio de presunción de inocencia mientras no
  recaiga resolución firme.
