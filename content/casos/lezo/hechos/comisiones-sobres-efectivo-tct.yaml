id: comisiones-sobres-efectivo-tct
caso_id: lezo
enunciado: |
  La Fiscalía Anticorrupción atribuye que como resultado de la
  modificación contractual descrita la sociedad TCT habría
  ingresado del Canal de Isabel II más de tres millones de euros
  por las obras del proyecto modificado y, adicionalmente,
  504.780 euros por la gestión y explotación del campo de golf,
  distribuidos según el escrito de acusación en cuarenta y nueve
  entregas en sobres de efectivo. La acusación particular ejercida
  por la Comunidad de Madrid eleva la valoración del perjuicio
  patrimonial a la empresa pública y solicita por estos hechos
  dieciséis años de prisión para Ignacio González frente a los
  seis años solicitados por la Fiscalía Anticorrupción para cada
  uno de los cinco procesados. La condición de procesados no
  implica valoración de culpabilidad: rige el principio de
  presunción de inocencia mientras no recaiga resolución firme.
