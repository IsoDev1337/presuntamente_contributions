notas: |
  Adrián de la Joya Ruiz de Velasco figura procesado en la pieza
  separada nº 3 del caso Lezo por el auto del 4 de junio de
  2021 del titular del Juzgado Central de Instrucción nº 6 de la
  Audiencia Nacional Manuel María García-Castellón
  García-Lomas que acuerda la apertura del juicio oral. La
  Fiscalía Anticorrupción solicita para él tres años y medio de
  prisión, la petición más baja entre los seis procesados de
  esta pieza. Según el escrito de acusación, presuntamente
  habría participado en el circuito financiero a través del cual
  habrían transitado aproximadamente 1,4 millones de euros
  destinados al pago de comisiones ilícitas, incluida la
  utilización de la sociedad panameña Lauryn Group Inc. de la
  que la cobertura periodística cruzada le atribuye la
  titularidad. En declaración prestada ante el instructor,
  según la misma cobertura, sostuvo que la cantidad recibida
  correspondía a un cobro de deuda previa de OHL por gestiones
  comerciales anteriores en África. La condición de procesado
  no implica valoración de culpabilidad: rige el principio de
  presunción de inocencia mientras no recaiga resolución firme.
