notas: |
  Magistrado titular del Juzgado Central de Instrucción nº 6 de
  la Audiencia Nacional desde el 8 de enero de 2025 por Real
  Decreto 1271/2024, de 10 de diciembre, publicado en el
  «Boletín Oficial del Estado» del 8 de enero de 2025
  (BOE-A-2025-350) como consecuencia del concurso resuelto por
  la Comisión Permanente del Consejo General del Poder Judicial.
  Sucede en la instrucción del procedimiento Lezo y de las
  restantes macrocausas tramitadas en el juzgado al magistrado
  Manuel María García-Castellón García-Lomas, jubilado
  forzosamente por edad el 2 de septiembre de 2024.
