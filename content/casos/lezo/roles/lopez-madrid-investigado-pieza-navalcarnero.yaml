notas: |
  Francisco Javier López Madrid figura como investigado en la
  pieza separada nº 3 del caso Lezo (presunta adjudicación
  irregular en 2007 del tren ligero Móstoles Central-Navalcarnero
  por el Consorcio Regional de Transportes de Madrid a la unión
  temporal de empresas liderada por OHL). La cobertura indica
  citación formal por el titular del Juzgado Central de
  Instrucción nº 6 de la Audiencia Nacional Manuel María
  García-Castellón García-Lomas el 22 de octubre de 2020 en
  condición de investigado en la pieza específica de
  Navalcarnero. La fecha de imputación originaria en el caso
  Lezo puede ser anterior (la cobertura sitúa una declaración
  judicial suya en febrero de 2018 sobre los pagos a Granados),
  pero el hito específico de imputación en la pieza Navalcarnero
  no se ha localizado públicamente; conservadoramente, se ancla
  la apertura del rol a la fecha de citación formal documentada
  y el hito de origen a la operación UCO del 19 de abril de 2017
  como aproximación. El rol se cierra el 3 de junio de 2021,
  víspera del auto de apertura del juicio oral que lo transforma
  en procesado por sucesión del rol
  `lopez-madrid-procesado-pieza-navalcarnero`. La condición de
  investigado no implica valoración de culpabilidad: rige el
  principio de presunción de inocencia.
