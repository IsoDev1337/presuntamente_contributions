notas: |
  Procesado en la pieza del campo de golf del Canal de Isabel II
  en su condición de ex director gerente de la empresa pública.
  Detenido en la operación policial del 19 de abril de 2017 y
  ingresado en prisión provisional eludible con fianza de
  100.000 euros por auto del titular del Juzgado Central de
  Instrucción nº 6 Eloy Velasco del 22 de abril del mismo año.
  La Fiscalía Anticorrupción solicita seis años de prisión y
  multa de 550.000 euros. La fecha exacta del auto de apertura
  de juicio oral por el JCI nº 6 que abre formalmente la fase
  intermedia para esta pieza se ha estimado conservadoramente
  en agosto de 2021 conforme a la cobertura periodística
  disponible. La condición de procesado no implica valoración
  de culpabilidad: rige el principio de presunción de inocencia
  mientras no recaiga resolución firme.
