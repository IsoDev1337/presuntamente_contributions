notas: |
  Procesado en la pieza del campo de golf del Canal de Isabel II
  por su condición de socio de la sociedad Tecnoconcret
  Proyectos de Ingeniería (TCT). La Fiscalía Anticorrupción
  solicita seis años de prisión y multa de 550.000 euros. La
  fecha exacta del auto de apertura de juicio oral por el JCI
  nº 6 que abre formalmente la fase intermedia para esta pieza
  se ha estimado conservadoramente en agosto de 2021 conforme a
  la cobertura periodística disponible. La condición de
  procesado no implica valoración de culpabilidad: rige el
  principio de presunción de inocencia mientras no recaiga
  resolución firme.
