notas: |
  Juan Bravo Rivera figura como uno de los veintidós procesados
  en la pieza Inassa del caso Lezo en su condición de antiguo
  concejal del Ayuntamiento de Madrid y miembro del núcleo
  político del gobierno de Alberto Ruiz-Gallardón en el momento
  de las adjudicaciones controvertidas. La Fiscalía
  Anticorrupción solicita para él, en el escrito de
  calificación provisional presentado el 28 de junio de 2019,
  siete años de prisión y quince años de inhabilitación
  absoluta por presuntos delitos de malversación de caudales
  públicos en concurso con prevaricación. El juicio oral se
  inició el 24 de mayo de 2023 ante la Sección Segunda de la
  Sala de lo Penal de la Audiencia Nacional. La fecha de origen
  del rol se ha fijado en la del escrito de calificación
  provisional de la Fiscalía como aproximación al auto formal
  de procesamiento de esta pieza, pendiente de descarga en PR
  posterior. La condición de procesado no implica valoración
  de culpabilidad: rige el principio de presunción de inocencia
  mientras no recaiga resolución firme.
