notas: |
  Tras la detención del 19 de abril de 2017 en el marco de la
  operación policial coordinada por la Unidad Central Operativa
  de la Guardia Civil, Ignacio González adquirió la condición
  procesal de investigado en las diligencias instruidas por el
  Juzgado Central de Instrucción nº 6 de la Audiencia Nacional.
  El rol se cierra el 18 de noviembre de 2019 con el auto de
  procesamiento dictado por el magistrado Manuel García-Castellón,
  que da paso al rol consecutivo de procesado al menos en la
  pieza Emissao y, posteriormente, en la pieza del campo de golf.
  La condición de investigado no implica valoración de
  culpabilidad: rige el principio de presunción de inocencia.
