notas: |
  Procesado en la pieza separada nº 3 del caso Lezo en su
  condición de ex director gerente de la empresa pública Canal
  de Isabel II por el auto del 4 de junio de 2021 del titular
  del Juzgado Central de Instrucción nº 6 de la Audiencia
  Nacional Manuel María García-Castellón García-Lomas que
  acuerda la apertura del juicio oral. La Fiscalía
  Anticorrupción solicita para él cuatro años de prisión. Según
  el escrito de acusación, su papel presuntamente consistió en
  facilitar desde la dirección gerencial del Canal de Isabel II
  la adjudicación irregular en 2007 por el Consorcio Regional
  de Transportes de Madrid de las obras del tren ligero
  Móstoles Central-Navalcarnero a la unión temporal de empresas
  liderada por OHL, a cambio del reparto de comisiones ilícitas
  presuntamente compartido con Ignacio González. Procesado
  simultáneamente en la pieza del campo de golf del Canal de
  Isabel II. La condición de procesado no implica valoración de
  culpabilidad: rige el principio de presunción de inocencia
  mientras no recaiga resolución firme.
