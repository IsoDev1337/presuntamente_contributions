notas: |
  La Comunidad de Madrid se personó como acusación particular en
  el procedimiento Lezo por su condición de administración
  titular indirecta de la empresa pública Canal de Isabel II,
  perjudicada por las adjudicaciones controvertidas. En la pieza
  del campo de golf eleva la petición de pena para Ignacio
  González a dieciséis años de prisión frente a los seis años
  solicitados por la Fiscalía Anticorrupción. La fecha exacta de
  admisión de la personación por la Audiencia Nacional se ha
  estimado conservadoramente en septiembre de 2017 conforme a la
  cobertura periodística disponible y queda pendiente de
  confirmación con el auto de admisión específico en PR2+.
