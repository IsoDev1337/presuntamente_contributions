notas: |
  Edmundo Rodríguez Sobrino figura procesado en la pieza Emissao
  del caso Lezo por auto del 18 de noviembre de 2019 del titular
  del Juzgado Central de Instrucción nº 6 de la Audiencia
  Nacional, Manuel María García-Castellón García-Lomas, en su
  condición de presidente ejecutivo de la sociedad Inassa,
  filial latinoamericana de Canal de Isabel II. Figura asimismo
  entre los veintidós procesados en la pieza Inassa cuyo juicio
  oral se inició el 24 de mayo de 2023 ante la Sección Segunda
  de la Sala de lo Penal de la Audiencia Nacional. Estuvo
  ingresado en prisión provisional sin fianza por auto del JCI
  nº 6 tras su detención el 19 de abril de 2017. La condición
  de procesado no implica valoración de culpabilidad: rige el
  principio de presunción de inocencia mientras no recaiga
  resolución firme.
