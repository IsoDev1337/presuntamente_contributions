notas: |
  Por auto del titular del Juzgado Central de Instrucción nº 6
  de la Audiencia Nacional Manuel María García-Castellón
  García-Lomas de 30 de mayo de 2019, dictado a petición del
  Ministerio Fiscal, se acordó el sobreseimiento provisional
  de la pieza Inassa del caso Lezo respecto de Ignacio
  González González y otros catorce investigados, entre ellos
  Alberto Ruiz-Gallardón Jiménez. El sobreseimiento provisional
  no implica condena ni absolución y queda sujeto a la
  posibilidad de reapertura si aparecen nuevas pruebas
  relevantes. Este rol es uno de los cuatro tramos procesales
  consecutivos de Ignacio González sobre el mismo caso Lezo:
  investigado (apertura 2017-2019) → procesado en pieza golf
  (auto procesamiento 2019-11-18, vigente) + desimputado en
  pieza Inassa (este rol, 2019-05-30, vigente) + procesado en
  pieza Navalcarnero (auto apertura juicio oral 2021-06-04,
  vigente).
