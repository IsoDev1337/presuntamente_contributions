notas: |
  Manuel Cobo Vega fue citado como investigado en la pieza
  Inassa del caso Lezo en su condición de primer teniente de
  alcalde de Madrid bajo Alberto Ruiz-Gallardón y previamente
  diputado y portavoz del Grupo Popular en la Asamblea de
  Madrid durante el periodo en el que se ejecutó la compra
  en 2001 por Canal de Isabel II del setenta y cinco por
  ciento de la sociedad colombiana Inassa por unos setenta y
  tres millones de dólares. La fecha exacta del hito de
  imputación específico se ha modelado conservadoramente
  apuntando al hito de origen del procedimiento (operación UCO
  de 19-abr-2017) como aproximación hasta localizar el auto
  específico de imputación. El rol se cierra el 30 de mayo de
  2019 con el sobreseimiento provisional acordado por el
  magistrado instructor a petición del Ministerio Fiscal. La
  condición de investigado no implica valoración de
  culpabilidad: rige el principio de presunción de inocencia.
