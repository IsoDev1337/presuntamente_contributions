notas: |
  Pedro Luis Calvo Poch figura como uno de los veintidós
  procesados en la pieza Inassa del caso Lezo en su condición
  de antiguo consejero de Medio Ambiente del gobierno de la
  Comunidad de Madrid presidido por Alberto Ruiz-Gallardón
  (2000-2003), en cuya etapa se ejecutó la compra en 2001 por
  Canal de Isabel II del setenta y cinco por ciento de la
  sociedad colombiana Inassa por unos setenta y tres millones
  de dólares. La Fiscalía Anticorrupción solicita para él, en
  el escrito de calificación provisional presentado el 28 de
  junio de 2019, siete años de prisión y quince años de
  inhabilitación absoluta por presuntos delitos de malversación
  de caudales públicos en concurso con prevaricación. El juicio
  oral se inició el 24 de mayo de 2023 ante la Sección Segunda
  de la Sala de lo Penal de la Audiencia Nacional. La fecha de
  origen del rol se ha fijado en la del escrito de calificación
  provisional de la Fiscalía como aproximación al auto formal
  de procesamiento de esta pieza, pendiente de descarga en PR
  posterior. La condición de procesado no implica valoración de
  culpabilidad: rige el principio de presunción de inocencia
  mientras no recaiga resolución firme.
