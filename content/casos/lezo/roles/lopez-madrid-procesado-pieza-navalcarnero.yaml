notas: |
  Francisco Javier López Madrid figura procesado en la pieza
  separada nº 3 del caso Lezo por el auto del 4 de junio de 2021
  del titular del Juzgado Central de Instrucción nº 6 de la
  Audiencia Nacional Manuel María García-Castellón García-Lomas
  que acuerda la apertura del juicio oral. Según la cobertura
  periodística cruzada del escrito de acusación, en su condición
  de consejero del grupo OHL le es atribuido haber ideado junto
  con el entonces directivo de OHL Rafael Martín de Nicolás
  Martín un plan para asegurar la adjudicación irregular en 2007
  por el Consorcio Regional de Transportes de Madrid de las
  obras del tren ligero Móstoles Central-Navalcarnero a la
  unión temporal de empresas liderada por OHL, presuntamente
  mediante la presentación de una oferta económica
  artificialmente baja, modificados contractuales posteriores y
  el pago de aproximadamente 1,8 millones de euros en comisiones
  ilícitas (cifra alternativa próxima a 2,5 millones de dólares
  según otra línea editorial). La Fiscalía Anticorrupción
  solicita para él seis años y medio de prisión. La condición
  de procesado no implica valoración de culpabilidad: rige el
  principio de presunción de inocencia mientras no recaiga
  resolución firme.
