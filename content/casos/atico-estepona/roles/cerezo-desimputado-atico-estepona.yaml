notas: |
  Por auto del Juzgado de Primera Instancia e Instrucción nº 5
  de Estepona del 14 de julio de 2020 se acordó el
  sobreseimiento provisional del procedimiento respecto de
  Enrique Cerezo Torres al no haberse obtenido indicios sobre
  el origen del dinero utilizado por la sociedad Coast
  Investors para la adquisición del ático ni sobre su
  procedencia en relación con el empresario. El sobreseimiento
  provisional no implica condena ni absolución y queda sujeto
  a la posibilidad de reapertura si aparecen nuevas pruebas
  relevantes.
