titulo: "La UDEF registra la sede de Plus Ultra y detiene al presidente, al CEO y a un empresario implicado"
descripcion: |
  Agentes de la Unidad de Delincuencia Económica y Fiscal (UDEF) de la
  Policía Nacional registran la sede de Plus Ultra Líneas Aéreas en el
  marco de las diligencias previas instruidas a petición de la Fiscalía
  Anticorrupción. En la operación quedan detenidos el presidente y
  dueño de la compañía, Julio Martínez Sola; su director ejecutivo,
  Roberto Roselli; y el empresario Javier Martínez Martínez. El 13 de
  diciembre de 2025, el juez deja en libertad a los tres detenidos con
  medidas cautelares concretas que incluyen la retirada del pasaporte
  y la obligación de comparecer ante el juzgado el día 1 y el día 15
  de cada mes. Los tres pasan a la condición de investigados por
  presunto blanqueo de capitales y otros delitos conexos. La operación
  se realiza bajo autoridad del Juzgado de Instrucción nº 15 de Madrid,
  órgano titular de la causa hasta su posterior traslado a la
  Audiencia Nacional el 3 de marzo de 2026.
