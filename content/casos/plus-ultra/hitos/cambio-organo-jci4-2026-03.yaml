titulo: "La Audiencia Nacional acepta la causa tras la inhibición del Juzgado de Instrucción nº 15 de Madrid"
descripcion: |
  El Juzgado de Instrucción nº 15 de Madrid se inhibe en favor de la
  Audiencia Nacional al apreciar que la complejidad y la dimensión
  internacional del procedimiento exceden de la competencia ordinaria
  del juzgado madrileño. El Juzgado Central de Instrucción nº 4 de la
  Audiencia Nacional, del que es titular el magistrado José Luis
  Calama, acepta la competencia y asume la instrucción del caso Plus
  Ultra. La fecha exacta del auto de aceptación no se ha localizado en
  fuentes oficiales públicas; la nota institucional del Consejo
  General del Poder Judicial del 19 de mayo de 2026 confirma
  retrospectivamente que la asunción se produjo en el mes de marzo.
