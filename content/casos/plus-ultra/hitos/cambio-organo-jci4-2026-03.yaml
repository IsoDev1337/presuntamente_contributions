titulo: "El JCI nº 4 de la Audiencia Nacional acepta la causa tras la inhibición del Juzgado de Instrucción nº 15 de Madrid"
descripcion: |
  El Juzgado de Instrucción nº 15 de Madrid se inhibe en favor de la
  Audiencia Nacional al apreciar que la complejidad y la dimensión
  internacional del procedimiento exceden de la competencia ordinaria
  del juzgado madrileño. El Juzgado Central de Instrucción nº 4 de la
  Audiencia Nacional, del que es titular el magistrado José Luis
  Calama, acepta la competencia el 3 de marzo de 2026 y asume la
  instrucción del caso Plus Ultra. La nota institucional del Consejo
  General del Poder Judicial del 19 de mayo de 2026 confirma
  retrospectivamente la asunción. El auto íntegro de
  inhibición/aceptación no se ha localizado todavía con URL canónica
  en poderjudicial.es ni en CENDOJ; cuando aparezca se incorporará
  como documento N1 propio.
